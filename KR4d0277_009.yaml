body:
  text: 客亭類稿卷九宋楊冠卿撰雜著編三愚慮説重楮幣説夫所謂重楮幣者何也愚聞之物無輕重物物者能為輕重物物者執物之權者也故輕重不隨乎物而物之輕重不得不隨乎我土之與金其貴賤固異也齊髙祖欲使之同價土與金不能自為輕重而輕重之者齊髙也鹿皮之與錢其緩急固殊也漢武帝以方尺之皮直錢四十萬而諸王朝享非此不行鹿皮與錢不能自為輕重而輕重之者武帝也齊之君漢之主執其物物之權故欲重而重欲輕而輕惟所欲耳愚固知執利權以制天下者不患乎物之不我隨也今日楮幣與錢並行凡幾年矣始行之而利今行之且弊亦知其弊之所自來乎且西州之楮幣其便用亦東州之楮幣也東州之銅錢其流通亦西州之鐡錢也何西州用之百年而無弊貿百金之貨走千里之塗卷而懷之皆曰鐡不如楮便也而東州則不然楮日輕錢日重楮日泛濫錢日匱乏冨家大室競以藏鏹為得計而楮幣之行於行都近郡之外則滯而不通有兊折之弊有偽造之弊有售而不樂取之弊蓋戞戞乎難行而反以蠧銅人皆病之何耶蓋嘗思之文帝重粟而天下之民皆力田趙王好劍而門下之士皆説劍所重在此所趍在此惟視夫上意之何如耳人皆曰蜀之鐵與此之銅一也而不知其二也愚聞蜀之父老曰鐡之為質易於盬壞不可以久藏如銅比也是則銅者人之所貴鐡者人之所賤故蜀之鐡與楮並行而無弊今之銅所以日乏者正以冨家巨賈利其所藏而不肯輕用耳其意若曰楮虛也其弊又不可言也錢實也藏之而無弊也況夫上所出之楮日至而無窮民間之輸於上則惟銅幣之為貴吾何苦以吾之實而易彼之虛哉故錢日乏而楮日輕州郡之間執虛劵相授殆有終日而不見百錢者則又何怪其不弊耶或者不原其弊也則曰東南與蜀異也楮之不冝於東南廢之可也愚則曰救之可也廢之非也夫蜀救弊之法東南之所未盡行也何謂未盡行也夫蜀之立法則曰租稅之輸茶鹽酒酤之輸關市澤梁之輸皆許折納以惟民之便此一法也又有一法焉賤則官出金以收之而不使常賤貴則官散之以示其稱提使之勢常平而無此重彼輕之弊夫如是則楮與鐡常相權而公與私常相濟何弊之有哉今此則不然天下之輸稅不責以楮而必責以錢官務之支取既無其錢而徒易以楮至發納上供官則以微價收民之楮以充其數則是我不欲此矣而求民之無輕乎此其勢固不可得也朝廷欲革其弊曩者固嘗令官自出錢比民間兊折之價重其價以收之然其法則一人日支一緡過其數者罪焉胥吏艱阻之態百出民亦何苦費力如是而受無辜之責耶無惑乎今自行都兩浙近郡之外閩廣荆楚楮幣不通之患如昔也夫欲使民之視銅如楮視楮如銅此其原不在乎下而在乎上今為之法曰吾之楮與銅初無輕重也將以相權而行也自今日以往凡逺近之輸於公者錢楮各半否者不納也如是則非特近者重之而逺者亦重之逺者重則近者有所泄楮之價其必無減折之患而銅之重亦變而為輕民之楮雖不支於官其價自與官等矣輕重之權是豈不在我哉嗚呼有諸巳然後可以求諸人無諸巳然後可以非諸人我自輕楮而責之民我自重錢而惟楮之不輕固亦不知事體矣陸贄謂錢重則加鑄而散之使輕錢輕則作法而斂之使重劉秩謂物少則作法布之使多物多則作法收之使少二子之時未有楮幣之患故惟以錢物輕重為言愚請借二子之言以為楮幣之説庶其無弊不下於西州云省兵食説夫所謂省兵食者何也愚聞之侏儒之曹蠧漢倉之粟濫吹之伍叨齊國之祿齊祿漢粟損之以嵗月未覺其害固也然山林之茂野燒之不供江海之泄漏巵之不能實愚又竊為齊漢寒心也天下之事養是人也必欲獲是人之用也徒養之而無所用之徒費也徒費尚足以為天下哉何者吾之廩粟俸錢一毫一粒皆民膏脂也朘膏脂以養無用之物無用之物則利矣病民何如哉嗚呼亦知後世之兵為食之大蠧乎井田鄉遂之制齊微變之內政之法桓公姑以便一時云爾國中之士為兵鄙野之民為農農不知戰而士不知稼權宜也然十五鄉之士不過三萬而北伐山戎南伐楚無不如意不聞其徒養而無濟於用也府兵之法唐因周隋而行之有事而戰事巳而耕大利也開元之主輕變而為彍騎天寶以後邊將益兵寖多調度愈廣每嵗衣用千二十萬匹糧百九十有萬斛一旦范陽有變而六軍之士皆不能受甲嗟乎井田不幸為內政而內政尚未有徒費之兵府兵不幸為彍騎而彍騎非徒無益而又害於事其尚忍言之哉今夫傭一夫於家授若直給若食則必責若事怠而不足供於使令者則逐而斥之此庸人鄙夫之見非有過人之智而後察此也況以天下之財養天下之兵而無補於天下之緩急泛然而無所甄擇也悠然而無所訶責也幸然而不冒於矢石干戈之衝也其孰坐守窮困而不惟此之歸哉蠶之食桑不見其損有時而盡火之然膏不覺其銷有時而竭此主計之臣當塗之士遊談聚議之人所以每歎夫兵之不精食之不足也嗚呼不自其所由耗之處而為之計兵日以不強食日以不裕無所偏就其利而徒兩受其害者亦其事勢之至此無怪乎議論之愈勤督辦之愈急裒斂之愈苛而兵食真若愈不可為也竊嘗論之今日之兵雖以簡中者為額而老弱猶居其半也州郡之廂軍類驅之築城塹供夫役懵然而不之教也至於禁軍雖或使之習干戈聽旗鼓無故不許越境外然才不勝為兵而濫其籍者紛如也推是而言則凡養兵十萬五萬人或無事而食也養兵百萬而五十萬人之食徒費也若之何而怪兵之不強食之不豐哉無事時吾民受其虧有事日國家受其誤嗚呼其亦何便於此也我太祖得周代之兵中外惟一十二萬平蜀之後所擇而留者能幾人乾德中中外之兵止揀十萬太宗盡平宇宙所增不過三十餘萬積而至於真宗全盛之世兵籍不過五六十萬猶慮耗費財用時命減冗當斯之時東征西伐而兵不患不精衣糧有限而財不患不足誠良法也今日之兵仰給大農者亡慮百萬兵非不多也而一旦有警常若不足於用一郡給兵嵗費或至數十餘萬緡財非不厚也而嗷嗷之口猶有未滿其欲之意是亦大異於祖宗之世矣祖宗以全盛之力而所費止如彼今版圖未復職方之舊而費耗於無用者乃如此嗚呼何知而不為之計乎愚願朝廷力戒諸路帥臣及諸州軍監凡廂禁兵違法而役使者置之罪兵官早暮弛教閲之法則削其官冗食無用者則使既揀之又揀之少而弱者使之不得預長征之選老而病者使之自復於齊民之列間有無所歸之人正欲棄之則田子方贖老馬之仁可推也正欲仍之則周世宗所謂無用之物又可鑑也則必削其籍薄給其資俾𨽻百司之役其為費也亦約矣州郡寬匱乏之憂國家收精強之用富國強兵計無易此執事不以其駭俗聽咈人情而難之則沿邊屯戍之兵皆可即此類推矣教車戰説夫所謂教車戰者何也愚聞之楚人不齊語傅之齊人則數年之後可使如莊嶽蜀人不知學化於文翁則數載之間聞風於齊魯天下之人非必生而能之也責人以生知之能而置之於未嘗教之域見其不能是也而遽棄之吁惑矣抑不知楚人無齊人之傅蜀郡不文翁之教則鴂舌之音且將沒其身而不變而詩書禮樂之風亦不能如是之藹藹也愚故知人未有不可教患教之無其術不患教之無其術患夫教之不以其漸而巳矣車戰之法行於古著其效求之今未見其功世之議者皆曰南人長於舟非車之便也又曰江淮之阻車不得方軌車非東南之長技也嗚呼使吾而果安於一隅也則車戰之説誠如或者之議吾欲長驅中原洗清關隴則車戰之法誠非一旦卒然之計寧不預講素練以為必勝之䇿乎大抵天下之理備不立者功不成習不久者用不精而地勢之論不與焉吾非略夫地勢也事固有不逃吾所見者也周人本非能水戰也世宗教以唐人不數嵗而出沒如神北人本非能水戰也我藝祖有昆明之習而終於可用北人之可以舟亦南人之可以車也孰謂車戰之法不可行於今乎則亦移之以漸而巳人之情卒然為之則駭而驚強而為之則勞而憚吾誘之而使安於變則勞而憚之心不作也久而使之習於戰則駭而驚之態不興也若是而磨以嵗月怯者可以使之勇怠者可以使之奮惟吾所欲用如何耳昔吳人僻處江湖之間聞其便於舟楫矣未見其便於車戰也申公巫臣一旦自楚適吳捨偏之兩且留其子使教之乘車射御未幾而吳人盡其技終與齊晉抗衡上國楚人一嵗疲於奔命者七夫吳者亦向之吳也昔不能是而今能是微巫臣之教愚未見其可也使巫臣不留其子而教之以漸則亦未見其得也世儒往往以成敗論事一吹虀於房琯陳濤之敗聞車戰之法則掩耳而不願聽嗚呼亦惑之甚矣棊一也巧者用之而勝拙者用之而不勝弓矢一也精者舉之而中疏者舉之而不中寧可以非其人而咎其器乎琯之車拙者之棊疏者之弓矢也平居口道先王語一旦卒然用於軍旅間事非其所素習也兵非其所素講也而欲以抗方張不制之敵如以肉餧虎以羊驅狼果何益哉嗚呼執琯之事而廢車戰者是欲見不勝者而廢天下之棊見不中者而廢天下之弓矢也其可乎今日幸無以房琯陳濤之事議車戰興水利説夫所謂興水利者何也愚聞之天下之理遏之於此者必導之於彼有以遏之而不知有以導之則其勢必激而生變夫水之為物柔而剛者也方其激激然若有所泄而不能逺潰潰然若有所鬱而不得發縱橫委曲以求騁奔趍之路當是之時吾不能順適其勢以泄其暴使之有所就有所避則其終必至於奔放四出決隄防蕩陵谷潰冒衝突而有可畏之患竊嘗謂治水莫善於導莫不善於遏堯之水鯀治之鯀之心非不切切然於此九載而績用弗成者遏之而激其怒故水之為患益深鯀既殛而禹嗣興其功之成乃及于萬世者鑿龍門決大河導衆流歸之海爾嘗取禹貢一書讀之見其記導水者十有一而言入于海者居其七雖導渭導洛導弱水導菏澤之言不及於海要其理未始不順而導之使歸於海也故孟子曰禹之行水也行其所無事行所無事者謂夫不智乎鑿不逆乎流順適其勢使就于下如是而巳爾今之謀利害者則不然見水之溢於西則遏其西水之溢於東則遏其東曰新田可決也曰舊防可增也曾不知水之下流無所奔趍則吾之用力雖勤而其流益濫矣是以頃嵗蘇杭湖秀之邦春夏之交天作淫雨則川流泛溢決民居害田稼而其暴不可得而禁禦也夫秀之華亭瀕海有泄水之港杭與湖秀之水皆由是港聚歸柘湖以入于海昔時港無所窒嵗雖巨浸而河流不壅故三州之田無虞而吳江雖處下流水勢既分民田亦蒙其利今不加意於是焉何也湖之浦溆瀕湖亦有泄水之漊苕霅之水皆由是漊以歸于太湖昔人浚其漊而深之且於其所視湖水髙下而為啓閉之具以殺其暴故時無水患而民免溝壑之虞詢之故老其遺址尚可考也今乃委而棄之雖瀕湖之民實其漊之半以為種植之地官司漫視不之省復何耶愚願朝廷力戒有司參酌其宜遣長吏率瀕湖丁保疏導之使衆水皆有所趍則瀕湖諸郡嵗免為魚患矣有持首鼠之説者必曰柘湖之瀕海有雲間等三鄉方衆港之通旱嵗則海波逆流為三鄉田苗之害太湖瀕湖之漊時有泥塗之壅嵗役丁保則有妨農之害是未可輕議乎此也嗟夫天下之事有利者必有害善計事者惟擇其利多害少者為之爾且柘湖三鄉之田與四郡之田孰多苟吾之設施得其術使上流有所泄下流不逆行則海波之患夫何慮太湖淒口之役專命一二吏董其事每於農隙之時加工焉民得保其田廬將歡欣鼓舞而從之則妨農之害亦奚疑本朝天禧間江東大水民胥艱食張綸之使東南也請治五渠以泄于海議者謂澤國下流江海與平彼潮者通夜不息沙從而寒欲導焉而何極綸曰不然彼日之潮有損與盈三分其盈損居二焉衆川則乘其損而趍之矣彼沙者嵗月而積闢以農隙民豈安于災而吝乎力哉僉從其謀而蘇秀俱蒙利先正范仲淹不輕許可且以修水利如邵南陽稱美之愚之説綸之説也惟執事深察焉革濫進夫所謂革濫進者何也愚聞之事若咈於人情而理有所當然者朝廷力行之勿恤焉可也夫舉天下事汲汲然惟人情之恤則天下無可舉之事矣且奏補之法祖宗不易之典也仁宗朝則損之遷官之法隋唐不易之制也英宗朝則增之當時之論必謂人情有不樂於此而聖君力行之不顧者誠以清官曹之濫而澄其原苟小有所恤則大有所害焉不可也今日官冗之弊極矣中原版圖未盡復于職方氏而京官合任知縣者動以千百計盡東南二百州屬縣之闕而與之嘗不足以供其求無惑乎吏部注擬之不行紛至沓來而有賢愚同滯歎也將革其弊則如之何曰無恤乎人情之或違惟察其理之所當然不當然足矣今夫天下之士以科舉而進以世賞而進者俾之三削而關升五削而改秩試以親民之職優賢之理當然也彼雜流入仕固宜有限格而豪民之家有濫捧香之澤及以髙資而授妻恩者胡為亦使之改京秩宰大縣而與進士任子等耶且縣令之職於民最親除授得人則利興害除主德宣布或非其人則一邑之間徭役不均刑罰不中民利不作民害不去其為患蓋有不可勝言今之豪民目不知書天資殘刻若寵以子男之任使臨其民彼志在苞苴惟利是徇必剝民之財以奉巳之私監司郡守牽於請託雖目彼之姦贓且畏縮而不敢治百里善良之民三嵗受其殘虐未知其何辜故范仲淹謂固邦本者在乎舉縣令如之何使斯人之徒為民父母以困窮天下其言深有契乎此也竊嘗計之豪民家資不啻百萬今以其百分之一而圖恩澤則可補官又以其補官之直而為苞苴則可覔舉舉主溢格例授京秩矣不數年敘進一官遇郊霈則又霑服色封敘之渥積之嵗月升于員郎且祿其子若孫是朝廷名器之重富者輕捐橐中之金即可探諸其懷而取之享榮祿於無終窮竊意官爵之濫從古無是也今將為之法曰民之由捧香妻恩得官者欲改京秩舉主必倍之薦舉之書必責其明言某舉某人自某塗進為監司若郡守者使其稍有識知視此必唾去不復舉甘心舉之而不辭者則舉主之為人亦可知矣如巳改京秩今則不許轉員郎今或任知縣亦復罷去以祠祿如是則官曹庶或可清流品亦有區别而縣令之官亦須得人不至為民害彼濫於澤者自恃其有遊談之助也聞是説之行必有以貴戚恩澤為言而敗其議者愚則折之曰館陶公主為子求郎而明帝不許蕭太后為親求刺史而宋髙祖不許秦國公主為子求近州刺史而真宗不許爵祿天下公器也必賢而是與誠使爾為貴戚之姻族苟非其才朝廷亦不敢溺以私況爾輩田家子也非其姻族而濫其官今不置之法而全其軀命亦幸矣爾今復何辭彼自知其官之濫而畏其法之臨也將捧頭請命之不暇其或有怨怒之言勿恤焉可也昔周太祖時軍士有流言郊賞薄於唐明宗時者帝責諸將以不顧人主之勤儉不察國之貧乏不思巳之有何功而受賞諸將皆悚恐謝蓋彼之所以怨其上者不直則吾之於其所怨亦可以勿恤矣夫將士國之爪牙也周太祖於郊賞之薄尚不之恤今將清冗流之濫而行其法尚何恤豪民之言為願眀戒有司力行之
