body:
  text: 客亭類稿卷十三宋楊冠卿撰古律編三近體詩庭草庭草凄餘碧江風吹早寒帶圍愁裏減詩律病中寬隱几間留客迎門懶不冠蕭然有真處未易俗人看别襄陽帥淮海棠隂巳著行却移小隊入襄陽江山尚帶戎馬氣齋閣遽聞編簡香自昔聲名滿梁楚向來為政壓龔黃風流髙出山翁上不用擎鞭問葛疆宿前岡鋪老去心猶壯天邊嵗欲除喜行新過路如讀未看書溪水縈回淨人家逺近居梅花正愁絶薄暮雨疏疏暮雨飄飄為客久在在與春期暮雨森寒意花香閟舊枝看成南國老慚誦北山移已誤世緣惡懷哉歸去遲無題鶯語丁寧隔曉忩露翻紅藥鬪新粧玊笙莫作相思調猶恐春歸得見郎記夢欹巖松檜轉龍蛇洞户仙人字少霞炯炯長眉非是畫翠翹斜倚碧桃花問訊人間幾日期謂言何處是瑶池玊杯飲罷夢中醉不記神遊話别時壬午雜詩黃屋非堯意謳歌有啓歸德參羲昊古事與漢唐非喜氣傳千嶂皇風浹九圍功成詎無日智勇舊沈機寒甚王親駕春歸敵請和北軍方擁衆小戍或投戈形勢中朝壯衰離偽境多燕雲可中裂豈限白溝河不逆強鄰詐須當報使回君恩固寬大敵意每嫌猜義舉初難廢兵端莫浪開要知情偽審往事驗方來關內攻城戰淮東却敵兵敗亡初妄作狼狽坐虛名賊勢雖亡命君心實好生不知他日事誰築受降城巳分依人老猶期振袂還有愁供白髮無力買青山北駕方傳蹕西師已度關孤臣憂國泪東首落餘澘寄别友生馬千里秋鴻社燕幾時休萬里無家天盡頭青蒻緑蓑今巳辦江湖歸去老漁舟瘴雨蠻煙道路賖囊書匣劒是生涯海山佳處能相憶好寄新詩鴈字斜齊安寂寞東坡對竹樓兩公陳迹是前修津亭倚柁還商子雪後獨為江上遊隻輪不返笑曹瞞赤壁空臨江水寒想得周郎鐃鼓競小喬相與對春山病後暑退寬作遲留計難期嵗月功方驚鼠輩舞未覺馬群空度暑蘇病骨涉秋悲候蟲長江二千里只欠一帆風甲申嵗作渺渺氷雪盡欣欣花柳蘇江澄炫初日沙潤茁新蔞久客亦勞止我行猶載驅乾坤如許大何處著吾廬急雨來排難餘蒸頓解嚴時蜩鳴露柳客燕度風簾屈指秋無幾安心氣自恬夜涼都不寐落月瑩虛簷讀杜工部集平生忠義不忘君末路升沈付九原千古神交真未泯一時人事可重論摩娑醉眼朝廷在消息他鄉弟妹存獨閲遺編堪墮淚秋忩燈火雨昏昏讀親征詔詔語深醇告萬方便知九鼎不勞扛波臣奔走扶黃屋約束風濤過大江君王神武不恬兵氣讋中原一掃平可笑西江喜歸客便裝行橐待還京塞上雪中雪色迷江國人誰入蔡城忩虛元自白梅破不勝清佳客苦難喚清尊只細傾吾衰便靜退不忍浪談兵代别張憲澤國春強半餘寒燕子飛絶知懸榻久故作買舟歸嵗月空荒老行藏有是非功名遊戲爾此意尚依稀老去安為客春來不著家江湖遂良覿身世入長嗟處死寧無地謀生信有涯分㩦感時節楊柳又藏鴉回紋四時輕風透幕羅衾薄滿萼嬌紅綴小桃明月對愁縈錦字斷絃空暗紫檀槽氷盤瑩靜風簾闔酪粉嘗殘日影曛稜枕印紅斜玊頰碧山揎袖整輕雲紋簟挹香餘汗粉緑眉攢恨舊愁新焚香夜拜初生月暮色忩紗薄霧勻霜驚葉落催寒曉夢破人愁覺夜長香暗折梅初點玊鏡鸞呵手試新粧九里松六言風聲不斷天籟鐘韻初知日曛人語驚飛幽鳥馬蹄踏破輕雲王幹竹枕甚簡古客有得之者為賦二絶榮枯已熟槐安境妄幻敢藏鴻寶書一節黑甜參巳透漆園胡蝶浪分疏夜明已賜虢國姊曲肱又屬東家丘娛寢有人君得計睡鄉留我取通侯吳江道中野色蒼煙濶蓬籠宿雨開湖光與天接林彩覺春回心事歸雙鬢年華付一杯松江元赴海流駛更須催壞郭郊丘裏長橋煙浪問幽花經雨潤獨鳥受風還春水圍叢薄晴雲吐亂山莫將吳越恨添入二毛斑即事歡悰憑淺酌衰相怯單衣詩向貧中好春從雨際歸氣寒憂麥瘦桑濕恐蠶飢豫學田園計他時恐願違人事悲歡裏交情冷暖中山林催晚計顔面久秋風有傳記耆舊無書問子公反關違世久幽事亦忽忽未辦因人出時歌不我過墨泓雲腳亂藥鼎雨聲多三篾閲浮世把茆營懶窠肯將猶在舌容易説干戈讀書憂世終何補忠懷悵不平收回長太息翻作短歌行是事且復置今人誰可盟湘中千樹橘墨墨了餘生題凌波采蓮圖綽約風姿雲霧衣波心新月映明輝更深折得清香去煙靄不知何處歸歸塗春晚待得春歸人亦歸風花撩亂撲征衣清香十里茶䕷路零落珠幢對晚暉點點更籌清夜徂昏昏鄉月瑣忩虛夢回忽聽狂風雨明日前村花更疏暫解征驂野水湄卷衣上馬夜何其客愁政自不堪説殘月一聲聞子規山茶緑葉巃嵸襯渥丹疏林殘雪尚班班先驅特為東君至怕向春風桃李間道間所見窄窄山腰路娟娟屋角花溪回蔽修竹鷗暖戲春沙夾江雨洗山容淨江流塞水通征塗萬煙樹行色一秋蓬黯淡平郊霧清徐邃谷風直須歌緩緩莫作去匆匆麥浪浮濃緑山眉暈逺青光風來婉娩客意獨伶俜回鴈鳴何許輕鷗下逺汀人家總幽隱煙雨竹門扄漫題著雨林花暗敲風檻竹幽翠屏疏得夢紅葉忽驚秋適安旅次山郭蕭條晚秋堂窈窕深輕寒籠暮靄橫吹度疏砧叢竹深藏翠孤雲帶晚陰淹留有幽趣不礙短長吟檻蒲行碧瘦林葉得紅深客子倦長夜居人催暮砧風梢忩紙急月轉藥欄隂高枕已無睡寒螿休苦吟曉思山鳥春猶噎城烏曉亂啼危譙初罷角落月巳催雞地逈來何事家遙夢到迷片懷如許惡深覺負瓜畦雪後野日茅茨短荒村霰雪餘溪流山足裂谷逈鳥聲虛矯首懷新隱歸忩有舊書殘年甘飽飯何必事名譽觀諸園接花果花木聊觀化芳菲觸處同大都知嵗晚各自占春風巧著移根力陰爭造物功化鈞均播埴此理杳冥中寒食雨中無家可耐異鄉何怪底愁邊萬感多今夜雨昏山月暗泪痕元不減金波晚風一再花狼籍春去匆匆不可尋蜂蝶亦如人意薄便無消息到牆陰渡口欲繫孤舟日己斜秋霜一岸著蒹葭若為喚得愁魂醒柱杖穿沙尋酒家絶句東閣官梅巳退粧逺村沙柳發新黃遙知歸去西江路定有飛花觸地香忽憶前時小院歸杏花牆角兩三枝夜香燒斷黃昏月縹眇憐家玊笛吹始覺始覺躬耕晚從誰話此情但能安食息敢復計聲名留滯煩書信驅馳愧友生有懷愁不盡歸鳥暮雲橫自檇李至毗陵道中風捲雲歸雨忽晴月輪安穩上青冥怪來枕底流泉急去去短桅初不停朱槿碧蘆相間栽蓬棚車水過塍來茸茸秋色濃如染己有陂塘似鏡開極目雲天意巳舒迎人草樹緑扶疏望中孤塔松江近便有小船來賣魚滿目江山無限情夫差城郭暮雲平當時不競黃池長一再何由致越兵晉陵城東窣堵坡兩尖髙並下臨河昔年曽醉鄰牆酒卧聽扁舟唱踏歌癸卯春雜用古語繼吳監簿水月即事霜日炫晴晝意行春色隨平林花淡淡荒墅草離離竹徑通幽處山雲薄暮時壺觴情未極飛鞚返青絲為谷隱和虞參議韻誅茅祇合老僧龕一笑欣陪塵尾談天末𡨕鴻方避弋遼東白豕忍懷慚折腰我已宦情薄嚼蠟誰言世味甘萬事轉頭俱夢幻試將此語靜中參谷隱之東芍藥酴醿涉夏尚有存者籜龍頭角且森列于前次前韻呈九江趙使君衣鉢相傳書一龕晴忩時許聽名談詩成與客探囊取句好令人下筆慚别墅經春花未老芳畦過雨薺尤甘明朝更欲從公去玊版堂頭作小參歸自淮右讀楚辭有感憶昔淮山戰骨髙行人持節過臨洮匣中劒氣徒干斗袖裏綸鈎莫釣鼇世事從來兩蝸角男兒不遇一鴻毛功名槐國吾深省痛飲何妨讀楚騷頃嵗如番禺與慶傳十六兄遇上饒後五年胥會于霅時太學增置生試竟不遂志將别去理朱方棹因詠昔人風雨對床之語慨然有感作是詩囊空未辦買山錢壯志隨人祗自憐千里鄉關愁夢裏幾年蹤迹瘴江邊回溪重困南摶翼異縣還尋東去船何日蒼崖結茅屋與君風雨對床眠繼詩社諸友韻休將龜策問窮通往事邯鄲午枕中南郭吹竽羞濫食北山運畚笑愚公酒邊賴有賡酬在客裏還欣臭味同得句不妨頻寄我從今莫效馬牛風復用前韻且約㩦琴尋花下之盟吟箋寫就訊難通人在千巖紫翠中談笑尊罍有餘樂交遊氣概壓羣公忘年許締金蘭好佳處何妨杖屨同我欲㩦琴坐花底乞君妙曲奏松風淮楚春晚病中絶塞驅馳有底忙病餘歸思繞江鄉鴈飛不到楚天逺蝶夢何堪春晝長滿地香紅初過雨一簾風絮正斜陽愁邊賴有新詩在強劈吟箋付錦囊遊交廣用帳幹趙德縱韻家聲久矣愧長楊浪説男兒志四方鼎鼎百年半流落悠悠萬里益凄涼羇懷嶺表芙蓉幕歸夢江南雲水鄉欲訪匡廬近消息試憑征鴈到潯陽琴久不作客問其故戲為説偈昭琴不鼓任虧成澤畔行吟且獨醒自信榮枯本同轍誰云得喪有殊形古今幾見桑田變日月常循晝夜經去去來來祇如此風前别調不須聽代秦幹上刑部張尚書津疇昔持衡氷鑑清議刑今去刻為明坐令几閣文書靜馴致齋居獄訟平疏闊漢朝新禁網風流廷尉舊家聲哀窮悼屈心如砥應笑張湯有重輕平生報國劒鋩寒萬里漂流困一簞貧劇方思毛義檄歸來却戴楚囚冠解驂舊事無人繼慟哭窮途祗自嘆倚伏循環知有待春回寒谷在毫端繼朱叔謙所寄韻湖海三十載窮觀未見書文章耻沿襲體製薄浮虛老去情懷惡生平習氣除交親應笑我術業廢三餘王鷗盟别去久之有詩繼韻急槳衝煙去奚奴喚不譍清吟繼囊錦妙句琢壺氷天逺暮雲碧江寒秋練澄懷人心欲折愁坐對青燈秋日懷松竹舊友松竹隱君子别來安穩不音書遲寄鴈風雨又驚秋金井葉黃落青燈人白頭客懷難著語誰共賦牢愁烏兔不停軌蒹葭鬢巳蒼囊空㩦古錦賦未奏長楊林下松風曲爐邉柏子香朝昏作禪供榮辱巳俱忘倦遊歸去陶彭澤重來丁令威逢場真戲劇閲世識危機蠻雨沾烏帽京塵黯素衣回頭今自笑三十六年非水亭晚坐煙波渺渺白鷗雙逺樹微紅襯夕陽坐久江風起蘋末馮夷借我一襟涼詩僧常不輕以梅花句得名于時雪後踏月相過論詩終夕退得二絶以謝十年袖裏梅花句夢繞江南煙雨村今日相看更愁絶天低雲淡月黃昏荒江落日孤鴻影逺趂幽人踏月來雪屋雲林淡相對月邊依約有寒梅題張安國舍人平沙落鴈圖渚雲低壓雲山暮煙素橫空落日斜秋老江鄉稻粱熟一行征鴈下平沙九江春半雨中寒甚忽見梨花江城一雨春強半寒色著人芳信遲賴有梨花遮病眼一枝帶雨出疏籬乙未秋賦不遂志歸寓水村歸來不負白鷗盟要聽雲山韶濩聲鐘鼎軒裳非我事從教水到自成渠自仙潭治歸舟呈王鷗盟江頭重整舊漁衣觸起眠沙鷗鷺機煙渚蘆花留不住葉舟還趂夕陽歸絶嶂雲煙乍有無蒼崖茅屋近何如西風拍手喚征鴈恐有平安錦字書扁舟夜泊蓼花叢曉挂風帆苕水東擬辦蓋頭茅一把十年湖海浪飄蓬江村煙雨暗霏微正是鷗盟得句時雨後屏山展新緑更煩摹寫送新詩次韻王鷗盟秋日郊居即事老去柴桑晝掩關悠然得意在南山忘言妙處無人解目送孤鴻天際還不貪薏苡與明珠曳屣狂歌信杖扶誰道先生貧徹骨先生清處若氷壺松菊依然繞舊廬西風歸興動鱸魚歸來有酒輒成醉旋摘秋園雨後蔬次李提舉桂花韻緑帷深護黃金粟嫵媚似嫌紅粉粧年來不作廣寒夢喜對孤標時踞床人間初未識奇木子落蟾宫秋政芳託根底事在幽谷要伴清都山水郎春雨未霽有載歌姬遊道場山者濛濛煙雨暗空山驕馬行春翠袖寒待得春風捲雲幕却愁春色又闌珊塞上與鄭將夜飲白髮將軍夜枕戈樓蘭未斬奈愁何挑燈看劍淚如洗那聽蕭蕭易水歌幾年京洛暗飛塵老上龍庭恨未焚安得君王倚天劒提㩦直上決浮雲次韻李提舉秋日雜詠羊坂路歧險燕巢生計疏萍蓬三尺劒衣鉢一床書葉露泣金井櫩牙挂玉鈎魂清了無寐詩思不禁秋次歸耕堂稀字韻精忠貫日古來稀帷幄從容扈六飛風虎雲龍方際會故鄉未許我公歸神京千里鴈書稀關塞傳聞驛騎飛報道天驕遁沙漠衮衣行從翠華歸功業汾陽千載稀龍庭單騎去如飛笑談整頓乾坤了黃鉞金鉦奏凱歸湖山春老杏花稀栁絮漫空作雪飛橫槊賦詩有餘暇不妨倒載送春歸又用韻弱水蓬山到者稀凌空須仗羽輪飛羣仙拍手山頭笑笑我漂零胡不歸窮巷無人車轍稀尋巢燕子故飛飛似嫌茅屋太低小廣厦千間欣有歸杏壇鏗爾瑟聲稀劒佩三千羽蓋飛獨對春風吟咏處從今願學舞雩歸乙巳春次中隱先生韻密勿籌帷今幾春故山猿鶴尚關情中書歷遍令公考樂道要從莘野耕種滿人間桃李春門闌舊物詎忘情江湖若也有間地著我一犁春雨耕挽葉南仲疇昔丈人行典型詩禮家剛方排武叔詞賦敵張華造膝陳經濟凝旒屢嘆嘉他年想遺烈拊髀諒興嗟次韻王宣幹秋懷囊錐脫頴久峥嶸劒氣干霄恨莫平江左方思見王𨗳兒曹誰敢吏淵明悲秋欲賦情難極憂國忘言酒細傾髙卧東山嵗將晚何如一起為蒼生送堵修逺歸湖城十載讀書松竹林壺觴歌詠有知音君今别我市朝去誰伴寒忩擁鼻吟雲卧江村煙樹林懸知出岫本無心亭臯若也有歸鴈得句不妨頻寄音西樓平頭四十誤儒冠獨立西樓憂萬端兩鬢飄蕭半華髮羞將勳業鏡頻看次韻葉無咎梔子花樓石山前薝蔔花品題從昔屬詩家君看五字齊梁句句好當令屈宋衙從郭中隱覔酒併呈張君量百斛龍文鼎可扛揮毫曽寄碧油幢酒兵若有三千騎肯向詩壇築受降又示同志寂寂寥寥揚子居雲山相對一床書無人載酒問奇字自把殘編時卷舒歸途用李泉野韻乾坤萬古幾昏曉兔走烏飛不暫停去日荻花秋索索歸時芳草又青青癸丑生朝舟行有感懸弧初度日鞠育念劬勞未了詩書債見輕兒女曹爭知兩蝸角等是一鴻毛所貴盡忠孝結交英與豪題畫扇斷橋流水小舟橫卧看林梢素月明雙鶴不知何事舞風前時送九皋聲與金陵傅漕余預鄉薦時傅兄持文衡著作承明近玊堂云何持節尚為郎運儲巧思蜀諸葛攬轡澄清漢范滂自昔謀猷資啓沃于今軍國欠平章商巖事業公須繼好趂春風朝未央鄉書憶昔獻賢能姓字曽叨天府登闕里摳衣欣附鳯雲程斂翼愧飛鵬流年自信一彈指末路誰憐三折肱若見金昆問消息為言霜鬢巳鬅鬙繼韓尚書春日舟行韻河水拍堤清且漣堤聮南陌與東阡浮家泛宅苕溪路老却春光又一年蜀魄思歸晝夜啼漆園蝴蝶夢魂飛簞瓢陋巷心如水惟有顔淵殆庶幾與鄂州都統張提刑五雲樓閣武昌宫曽挫曹瞞百萬雄今古興亡付流水江山彈壓賴元戎折衝尊俎笑談裏極目關河指顧中凖擬明年會京洛為君沽酒醉春風貔虎雲屯細柳營旌旗號令轉精明人言郤縠詩書帥自有孫卿仁義兵關塞金湯今奠枕江淮草木舊知名家聲凜凜漢人傑看取籌帷功業成江湖疇昔受恩深嵗晚漂流傷客心雨楫風帆倦行役雪車氷柱少知音價髙肯羡連城璧才謭難希諛墓金但得扁舟從此去成虧寧復問昭琴和京尚書上元日同禁從遊鳯山韻苔封石磴繞層欄欄外行厨薦玊盤座揖湖山詩興逺氣吞雲海酒杯寬籃輿竟日有餘樂蓮市只今無此歡我愧么微難接武飛箋亦欲寄青翰洪溪口短短桃華宿雨餘風輕春水縠紋鋪柁師苦要貪行色不肯繫船尋酒酤臘梅四絶遊蜂辛苦事芳菲嚼蘂偷香釀蜜脾還被東風巧收拾又隨春色上南枝枝上編鐘萬顆垂凌寒傲視雪霜姿從今疏影暗香句不數西湖處士詩塗黃不學漢宫粧一點檀心萬斛香嚼蠟我今忘世味羞將花譜細平章阿嬌厭貯黃金屋洗盡鉛華兒女粧香魂寒夜伴幽獨青燈相對吟胡床同韓吳二寺丞飲西湖梅花下酒酣繼韓韻冉冉山雲薄暮時壺觴歌詠欲忘歸一杯且為梅花醉莫待梅花作雪飛港口野寺雲山逈人家煙火稀水腥漁市近帆落晚風微拂樹昏鴉去迎􅊑白鳥飛吾生樂江海猶恐與心違
