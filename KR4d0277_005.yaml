body:
  text: 客亭類稿卷五宋楊冠卿撰四六編五啟代上虞丞相求差除啟開招賢之閣夙欽漢相之宏規進潔巳之童益見孔門之善誘欲露囊中之頴庸敶堂下之言伏念某鉛槧腐儒詩書習氣有道且賤妄懐聖人之慚没世無稱深虞君子之疾自玷象賢之賞即從膴仕之占一閧之市立之平初服征輸之役千室之邑為之宰繼叨民社之除州縣微勞功名何有竊自窺形而笑影未始隨波而逐流盖仕非為貧時乎為貧固無他事而生我所欲義亦所欲豈敢僥求俄被薦書謬參計幕藹元僚之譽慚非綠水之賓走南粤之區幾殞黄茅之瘴及𤓰而代垂槖而歸適真儒大用之秋正髦士彚征之日謂合浦之珠因人而亦返故豐山之鐘感氣而一鳴恭惟某官柱石宗工股肱元老仁如伊尹慮失匹夫心若元齡不遺一物藝者必庸善者必錄連茹而升勇効其力智効其能聞風而恱矧在門墻之舊詎㤀埏埴之私念嚴君工部之平時辱先正公師之殊奬至如賤子又託化鈞䝉國士之知嗟未酬於智伯借王公之勢敢復儗於昌黎雖馬渤牛溲無待用之才然䑕肝蟲臂惟造物之命恭候進退以卜窮通代賀廣東經畧程直閣啟伏審顯被制函榮分帥鉞緫十連而建屏豈徒體貌之隆倡九牧以阜民實畀藩宣之任上眷彌渥僉言允諧惟祝融之奥區奠天子之南服内制五嶺外控諸蠻蜑俗羣居雖樂衣冠之化鯨波萬里迭興蛇豕之妖故得人則盡治一邉而選帥則常重他鎮正直樂易必求如孔右丞之才文武威風或兼取鄭尚書之望恭惟某官身該數器學眇諸儒自擢秀於賢科即蜚聲於朝路分符剖竹雖江淮草木亦知威名輓粟飛芻給國家餉餽不絶糧道屬朝廷之重外視海邦而選侯爰陞延閣之華更錫介圭之覲徒得君重願毋薄於淮陽以我公歸遂為輔於周室某夙勤仰德兹幸事賢瞻數仞之墻行獲見宗廟之美繼十賢之頌尚博採輿人之謡代賀殿院除侍御啟伏審擢自副端進躋横榻居御史紀綱之府肅天子耳目之司僉曰允諧聞者興起恭惟某官學優而識逺行峻而履方歴觀天朝命數之隆率繇我公名德之著始以竹符之最入登蘭省之華遷秩爰陟於殿中執憲且司於柱下憂國有如饑渴既嘗造膝而盡言嫉惡過於仇讐允藉正繩而深劾宜絲綸之播告致山嶽之動揺潛消魑魅之逄人坐息豺狼之當道一臺正則朝廷治巳措事於隆平庶事康而股肱良盍賡歌於密勿因以慶調元於玉鉉豈惟有落膽之金吾某荷德彌深聆風竊抃數百篇皆可為法夙欽論諫之忠九萬里今方圗南益仰勲庸之盛喜而不寐情見乎辭代謝除軍器所受給官啟跂銓部以奔趨正虞自逺司尚方之出内乃玷恩除挈孤蹤於州縣冗散之餘拜成命於人士覬覦之表望非其素寵至若驚竊惟致治之朝尤重除戎之戒繕甲而輸武庫既遵唐室之規置監而建使名又倣熙寜之制故雖御府亦有司存辨名物之麤良給工徒之衆夥苟非才諝曷副選掄宜得名流以膺劇任如某者緩不及事愚無他長㓜雖讀於父書莫知權變行徒全於世守蔑有文辭頃祈一釣以連鰲屢費三年之刻楮可謂不武無所取材兹辭箠楚之勞妄意鑪錘之託技巧工匠之鮮及方嚴武備之修欂櫨侏儒以兼收遂辱化鈞之播退惟么䯢彌積凌兢兹蓋伏遇某官道覺民先功熙帝載悲醉鄉之徒而嘉良臣之烈此時思識其子孫舉羊舌之似而代中尉之軍君子不以為偏黨軫憐寒逺靡間存亡欲封植栽培使之有成故慰拊矜存無乎不至致令賤子亦冒殊榮某敢不増益未能磨礲其鈍修身矯思必惟弓矢之求復古攘夷庶幾車馬之助代軍器簿謝除監丞啟五材並用務先戎器之修再轉為丞誤拜宸綸之寵望非其素得之若驚竊惟致治之朝尤重除戎之戒繕甲而輸武庫逺稽唐室之規置監而建使名近攷熙寜之制課工徒之衆寡辯名物之麤良各有司存莫如丞貳膺是之寄必惟其人如某者技則五窮慮無一得上既不能徇時而規聞達下又不能枉道而為屈信惟託跡於鈞陶遂脫身於州縣修名未立盛時難逢恃夫特逹之知瀆以頻煩之請韓昌黎三書光範固存仕進之心張師德兩及吾門果消靖退之譽上方務循名而責實公欲以難進而為髙故懇款之誠雖指日望遷而髙明之見必終更後可兹及𤓰而受代旋錫命以揚庭人謂至公巳獨何幸兹蓋伏遇某官功熙帝載道覺民先網羅羣彥以輔太平緫領衆職以稱上意謂文武一道雖堯舜有所不忘必工巧咸精若元成以來鮮及故此序遷之典錄乎簿正之勞鈞播弗遺吏能知勸某敢不恪勤乃職思稱所䝉􅙀甲胄以鍜戈矛協賛規恢之舉修車馬而備器械更歌復㑹之詩惟不負丞是為報德代軍器丞謝除太府寺丞啟干戈載戢方慚戎監之負丞府寺褒遷忽玷宸綸之誤寵得踰望外感越情涯竊以財計司於地官出内繇於太府九賦頒受之政既緫其凡百貨貿遷之宜亦提其要凡居丞屬務簡賢能如某者甘棠之笏僅存大瓠之尊何用傾荷鈞陶之賜遂辭箠楚之勞除戎器以戒不虞蔑有㳙埃之助雖工匠而稱鮮及敢云技巧之精適朝廷需鞭筭之臣期都内收貫朽之效謂官府都鄙之吏將畀以邦用必朝㑹方貢之物皆進之内庭爰陞元祐八品之聮俾佐成周九功之貳退自循省曷副選掄兹蓋伏遇某官槖籥一元甄冶萬類軫憐舊物加惠窮途念昔先人曾是申公之下客今兹小子復陪材館之後塵賜以生成㤀其固陋某敢不恪勤乃職思稱所䝉掌金帛而統尚方豈特奉行於故事問錢榖而責内史庶幾恊賛於大農或知財貨之源流尚冀恩榮於終始賀參政施樞密啟伏審孚號揚廷真儒輔政賛五兵之本方斗運於帝樞翊萬化之機遂山維於國是慶流宗社喜溢緌紳竊惟熙洽之朝並用久長之術决勝千里既資帷幄之留侯為憲萬邦必頼武文之吉甫緫提巨柄允屬耆英恭惟某官學粹而行醇道尊而德貴有謀猷則入告于后非仁義則不陳于王規模由三代以還事業卑兩漢而下演綸西掖文詞摛緯國之華批勑東臺議論有回天之力自任天下之重親結人主之知方神聖之仰成均安危而注意内焉光輔於宥密外焉參秉於事機得君如彼其專在廷無出其右然任之隆則其責也備望之久則其應也難願言造膝以密陳務以上策而自治大而要者既蚤正而素定詳而末者靡敝精而竭神自然國勢之尊馴致治功之立將見八百餘年之過厯邦其永孚于休豈徒二十四考之中書公有無窮之聞舉世所屬惟今其時某夙荷知憐欣聞播告念湛淪於鈞幕曽蔑著於事功大鈞坱圠以無垠或與昆蟲而並列蟠木輪囷而為器庶幾宗廟之見收祈嚮良深剡裁罔既代上提刑程直閣求薦啟執裾求鬻慚非韞匵之珍投贄輸誠覬露處囊之頴囁嚅冒犯俯伏凌兢伏念某志慕古人趣乖時俗自期際遇決不枉尺以負初心若遂陸沉何妨樂陋以安㣲分猥緣饑火強走名塵轗軻半生艱危萬狀竊自窺形而笑影未始隨波而逐流蓋仕非為貧時乎為貧固無他事而生我所欲義亦所欲豈敢僥求寜官負余而余無負官謂巳知人則人亦知巳道之行歟命也我其有所遇焉兹聮入幕之賔始遂事賢之願廣帷裳之聽既辱問其姓名霽斧鉞之威又復假以辭色庸效頑金之自躍以希大冶之兼收恭惟某官心造道原學傳正印藩籬剖破了無物我之私識鍳精明尤重賢能之舉凡預鳬趨之列俱膺鶚表之榮願激波餘均霑浪跡丹青有意或收誤墨之餘工律吕調音㑹見焦桐之奏雅辭謝廣西機幕趙府判啟入芙蓉之幕人欽盛府之元僚歌驪駒之章客整征驂於異縣辱誤知於疇昔未㤀情於去留伏念某乾坤腐儒場屋敗將無尺宅以主祀乏寸田而歸耕激水南溟遐想鵬程於九萬曵𥚑東閣進陪珠履之三千兹聞成命之頒出賛榦方之畧不憚百舍而重趼將同下客以請行念暮隨馬而朝扣門雖脫悲辛之苦然月費錢而歲糜粟久懐愧負之心況惟百憂之餘洊困長淮之役床頭之金巳盡口中之舌僅存所願得一枝以巢深林未免下喬木而入幽谷坐不煖席蓋又將挈挈而東居必擇鄉亦安能鬱鬰於此俗態輕盈於鵝眼世塗巇嶮於羊腸因思平生知巳之難重感十載窮途之惠昔有定交之約今為别路之人實深疲馬戀軒之誠寜㤀綈𫀆故人之意某官學優識逺實茂聲宏若高陽不隕其名在漢庭無出其右布一同之政鳴琴而不下堂擁貳車之轓展驥而有餘地載酬逺業盍寘邇聮何陳掌未侯於今而文仲知賢不立尚屈雲霄之步往參樽爼之謀政恐坐席之未溫巳慶蜚郵之促召某跡雖去於賔館夢猶遶於宫牆二人同心想未替金蘭之義千里命駕悵莫隨杖屨之逰懐德無窮空言難敘賀孫倅就知南雄啟伏審出綸帝扆剖竹侯藩邦國不空巳繼海沂之詠室家相慶復騰襦袴之謡善政可依歡聲載洽恭惟某官氣剛而志烈學老而才雄正笏垂紳凛然有莫犯之色高談雄辯即之皆可用之言使其得志而澤斯民肯若腐儒之敗廼事欲歛藏其材具姑潤色於邦條畏愛交孚聲譽益著爰擁東方之騎就臨南國之棠雖草木亦知威名夙仰同流之惠安田里使無愁歎兹誠共理之良第虞宣室之思賢又整曹裝而入覲某自憐寡與誤辱厚知逖聞成命之行倍劇羣情之喜譽古今而道盛德悵莫綴於賀賔繇郡國以登政塗願舉行於故事代賀淮東運使啟伏審拜恩中禁緫計外臺㳙日之良觀風云始恭惟某官以碩大光明之學負經綸康濟之才憂國愛君未規恢於逺畧渡江擊楫每慨想於中原頃自卿聮出持使節謂上䇿莫如自治而明主可為忠言期追輩於古人爰舉行於故典軍急乎食留武侯渭上之屯兵寓於農有昭義山東之冠兹慰去思之望來膺任舊之圗雖江淮草木亦知威名宜國家餽餉不絶糧道行書異等之效遂慶非常之褒某夙願事賢欣聞頒制衛中國而遣戍役方謬厠於下僚安邉境而立功名或可陪於末議代守臣到任謝臺諫啟邊陲乗障甫拜誤恩甸服承流旋叨易命拊㣲躬而深幸仰盛德以知歸伏念某生也多艱命焉為耗精神於憂患驚歲月之侵尋居懐直道以求伸肯歎修名之未立上方獨化於鈞陶之表時收窘步於奔軼之間念河陽之雲志乎將母近長安之日畀以臨民静言而思夫何能稱兹蓋伏遇某官學優而識逺器博而用宏當盡言無隱之朝立正色不阿之地軫憐寒畯加惠窮途故雖么䯢之蹤亦玷藩宣之選某敢不問民疾苦布政中和務勸農桑少致阜蕃之效俾安田里永消愁歎之聲庶或逭於譴訶用以酬於知遇代合肥宰與鄰邑啟百舍相望未見君子六聮合治兹同官僚善政可依孤蹤何幸巳驅車而就道庸占詞而寓誠伏惟某官學有淵源才高盤錯出宰百里精神折衝猶如一丘歌謡載路今單于絶南下之牧視即墨知東方以寜室廬固而溝洫深田野辟而人民給為晉國之保障巳著茂功拜褒德之侯封當受重賞某帷古之嗜以拙而窮時乎為貧不得巳也使之學製豈曰能之親仁善鄰雖幸假一燈之燭伐柯取則詎敢追三異之休惟有託於帡幪庶少逃於罪悔代王司戶赴任與韋郎中啟效官庾掾未明從政之方歛版鈴齋喜遂事賢之願將委身而受察庸奏記以輸誠伏念某性愚不移學癖自守執經橫浦初謂功名可期亦可為垂翅回谿始知時命在彼不在此晚奉大廷之對均霑湛露之恩白髪青衫來作娵隅之蠻語紅蓮綠水慚非俊逸之參軍惟條教之少寛庶譴訶之或免恭惟某官家紹賢成之相業才高鄒魯之儒宗輟自周行藩于漢室去天尺五既䝉福於京師擊水三千盍摶風於海運入輔真主永基太平某景慕有年趨承不日有司出内豈塵埃箠楚之敢辭夏屋帡幪知風雨震凌之有託代趙應之回溫提㸃啟伏審脂牽問塗㳙辰視篆負丞山邑嘗䝉傾蓋之知分刺江邦復有班荆之便眷惟幸㑹預切欣愉恭惟某官德具剛柔資兼文武敦詩說禮豈記誦云乎哉禦侮折衝顧方畧如何爾尚分班馬十二閑之政未展摶鵬九萬里之程散華山而不復乘巳慶五兵之偃錫康侯而用蕃庶宜膺三接之榮某百舍相望阻馳慶問一緘通好首佩眷私載欽謙德之勤彌激懦𠂻之感代彭守謝臺諫啟修香火之緣久從家食分符竹之寄兹玷上恩拜寵甚優揣躬知懼竊以聖神急郡國之治廟朝揀師帥之臣既考試以功能復精别於淑慝故治理之效卓冠古昔而愁歎之聲潛消里閭矧曰彭門亞夫洛邑湖山清逺民物阜蕃宜需牧人馭衆之才以付宣化承流之任如某者性愚不頴器窳亡庸頃綴班聮謬丞府寺郎官上應列宿雖云越俎以代庖癡兒欲了公家詎意含沙而射影一收朝蹟屢易歲華畀以專城責之共理斯未能信夫豈敢承兹蓋伏遇某官學富而行醇道尊而德貴危言悟主鳴鸞鳯於朝陽正色立朝屏豺狼於當路軫憐寒畯加惠窮途反復安全始終䕶念遂令下走亦冒殊榮某敢不思稱所䝉不負其學勤求民瘼務惟主德之宣清畏人知用酬國士之遇代邑宰求知啟仕為令尹豈無一眚之可論願見相君庶或大訶之能免幸垂靖聽俯鍳危𠂻伏念某資禀甚凡性愚弗頴自使一命于今幾年不學縵豈能安絃未操刀而使製錦青蠅止棘何計避讒赤口燒城無文解祟徒妄意封侯洴澼絖之事誰復知畫史盤礴臝之真蓋人心常徇私情而天下久無公議喜多溢美怒多溢惡奚恤乎理之是非惡之欲死愛之欲生皆由其心之向背故小人中傷善類則君子動遭厚誣樂羊成功幾謗書之篋滿即墨何罪乃毁言之日聞自非深明乎情偽之端未有不惑於疑似之際退惟孤跡傾墮危機起敵國於同舟落䧟穽而下石彼譖人亦巳太甚雖萋斐之遂成今臺評反以為私知幽枉之必達天其或者道將行歟恭惟某官規模繇稷契而來事業陋漢唐而下緫領衆職以稱上意獨運化機網羅羣彥而輔太平共維國是雖膏肓沈痼難於復起猶栽培封植使之有成庸依大冶之陶鎔輒露中心之悃愊周家仁及草木方歌行葦之詩漢將功收桑榆尚奮澠池之翼代囬蔡主簿到任啟伏審顯奉芝函勾稽花縣夙願見於君子兹喜同於官聮伏惟某官奥學家傳異能世濟雷封棲枳尚淹鸞鳯之翔海運摶風行見鵾鵬之化未遑修慶先沭貽書感與愧并意非言盡謝人袖牋啟見訪啟辱迂都騎寵貺長牋以鶢鶋響九奏之音寜無眩視報珠玉乏雙南之寳徒有愧心感著于𠂻言不盡意謝投壽篇啟錫靈均之名字雖恍記於攝提問絳老之紀年詎敢希其甲子兹拜五雲之賜俾為三夀之朋荷眷特深拊躬増懼代回通判啟逖逺簈篂驟更歲籥兹勤誨問殊認眷私何以報之愧乏雙南之寳永為好也第珍什襲之藏回梁司理啟逖違顏采屢閱歲華眷惟俊逸之參軍久遂逍遥於率府士别三日而便當刮目况有能稱伎無全牛而新若發硎方恢游刃宜聞薦召入躋顯榮庶迂軫以相從可盱衡而一笑其為傾傒㒺既剡裁
