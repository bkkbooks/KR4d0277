body:
  text: 客亭類稿巻十一宋楊冠卿撰古律編一古體詩西北有髙樓西北有髙樓氤氲臨大路飛簷轉春風綺忩鏁雲霧姣服者誰子傾城此容與娟娟長眉青不受脂澤汚娉婷惜不嫁恐為蕩子悞冩心汎清瑟獨不怨遲暮東方有一士東方有一士不見心忡忡尺璧未足多夙好良所同永懷不能寐攬衣出房櫳遙夜未渠央取琴和秋蟲豈無時世交諒彼不相容銅雀妓分盡餘香空寶奩罷臨歌舞夜厭厭清蹕不傳虚繡帳洞房月在西陵上玊殿塵埃閑御仗翠眉忍上平臺望宫車一去不復還畫羅金縷尚斑斑赤玉簫玊簫早入凉王墓弓劒衣冠只同處千年邂逅出人間顔色聲音幸如故雲門曲譜不分明趙瑟齊竽各自名傳看樂府無人識此簫收聲甘棄擲秋懷十首微雲淡河漢疎雨滴梧桐為韻寒蟬初停號客燕催將歸吾亦客一世去此復焉依歛衽聽物變著書明化機深參漆園吏渠語甚精微秋風不肯來如挽弓百斤忽然徑排户態度殊不文方深裘褐憂暮雨低行雲焚香快熟睡夢破尚微曛呼船下平湖山如髻鬟瞰物華逼搖落水明天淡淡中藏今古愁嵗月不可勘為語羊征南聲名本來蹔飢來詎堪忍振履商頌歌時人不料理政可著巖阿喻龜且曳尾勸公無渡河一朝失脚去寜得此婆娑古人例躬耕我坐老無㫁勇為梁父唫巳媿杜鵑喚幽幽桃華源尚不知有漢婦子彼何為徒使人意亂月上天無雲樹陰散扶疎秋聲生寂歴涼颸滿吾廬幸此尊有酒敢歌食無魚陶然且一醉世間各賢愚春秧困深寒夏穗仍愍雨書來西江西赤地掃𤓰芋墨數食指多坐羞長袖舞憂憂米如珠南山采薇去晚雲蹔垂陰零露不成滴隣牆幾好樹葉下聲䇿䇿一燈同夜闌此抱誰與適前身豈壁魚甘擅文字癖憂來扺探人衰懷小城孤解圍賴從事幾成不支梧所憂豈其私天髙信難呼努力加餐飯世縁久崎嶇幽花上籬落寒煙婘楸桐絡緯勉婦織暮色凄房櫳日月如跳丸蟲魚不書攻髪黒今益白脫巾成老翁北亭北風無時休荒山路綿綿老馬被吹揚卻立不肯前我僕行且仆竟日數里間悠然欲何適正坐歸無田感事我車昔載脂柳色初濯濯及歸脱征驂柳葉半黄落恍然僅一夢已費十晦朔祗應為客老惘惘不自覺赴城南隠居小集白雨濯青山孤雲靄餘姿溶溶荒江水近岸生清漪扶輿出城府眷此幽人期茅茨倚林麓秀薄相參差欣兹蹔解帶虚白明朝曦向來旅窮徼抑鬱中懷悲相逢輒顧笑觴酒相淋漓春風不日去淹留我何為悲秋秋色遽如許客心徒自驚盈盈露花泣䇿䇿風樹鳴别影詎可吊强懷不能平軒車幾時還惻愴難為情沄沄西江水送我沙邊舟當時送行客勉我無久留晤言宛如昨庭葉忽再秋人生寸心違何以消吾憂夜坐看月南風掃陰翳快若誅神姦日暮天無雲月出房心間幽人倦蒸溽癡坐山中山連連甲子雨幸此天破慳清明皆我有何但窺一斑春泥少曽乾天漏㡬不補冥觀赤烏飛喜見長虹吐脩竹來清風孤光相媚嫵心神濯氷壺何必須起舞更欲尋斷橋前溪有飢虎春夏季孟間草木蔽山骨青蒼靄芳華煙霏相出沒適從憂患場觀化超理窟無心岫間雲有定水中月我方意如如誰尚書咄咄暮景鞍馬來殊方祗園已秋寂虛堂耿清夜卧聽寒雨滴永懷平生願浩蕩誰與適愁心正紛如西風韻鄰笛客行無常期逺適亦有歸家人具膏沐垢髪幸一晞可憐兒時面坐受塞色欺看鏡恍如失功名定何時九日晨風戰枯荷清霜殺髙柳人生俯仰間能得幾重九節序來無停己及黄花酒流落拾遺心西江獨回首寒花有餘馨香醪甜勝蜜紅茰爾相冝飣餖雜梨栗家家事行樂似恐更無日時日豈不佳人意自難詰凄涼少陵老梓州九日詩朝廷入夢想弟妺天一涯我亦困羇旅千古同其悲不忍嗅新菊惟思詠江蘺晚思花意就銷歇芳樹初隂隂薄帷受清吹鳥聲幽院深感此時節改素標不勝簮取酒洗玊船慰我懷古心小醉聣落景歸盟猶可尋久客倦遊歸憇僧坊有懷蓬居梵竺卿寂光常不輕志士長骯髒曲鈎封公侯得喪亦何有賢愚同一丘日月如跳丸少年今白頭胡為浪自苦九折不停輈龎眉碧眼禪一笑萬事休遼鶴我言歸君其來與遊冬半山間忽見桃花客云江梅己芳且約一笑花下縁雲梯逕穿林麓嵗晚山寒風折木司花為我發春妍繁紅㡬樹驚愁目有美人兮在空谷似笑漫山總粗俗淡煙疎雨羅浮村萬里相將跨黄鵠秋日麻姑山擲米作珠璣麻姑巳仙去滄海變桑田乾坤自今古我來訪靈蹤日落青山暮玊殿𤨏清秋霞裾隔煙霧户外黄冠師三問三不顧騎麟翳鳯凰笑指虚無路未至池陽五里有齊山寺寺後巖石巉然縁崕而上絶頂有翠微亭即杜樊川九日㩦壺地也自亭而西憩集仙洞泉石吾膏肓佳處毎忘返㩦壺上翠微一雨秋政晚千巖如獻狀秀色疊層巘縁雲梯逕入危磴石偃蹇洞户訪真仙丹成骨己換羽化今㡬年鸞鵠若在眼自馬當而上至壺口三鍾石蒼崖壁立下瞰層淵湍流急甚釣叟穴其傍往來自若吾恐其為蜚仙也故作是詩千崖削蒼壁萬仞臨深淵老翁立其傍習慣若自然笑歌驚波瀾步武生雲煙我欲從之遊結茅山之巓舉瓢酌天漿醉拍洪崖肩明月夜横玊共看凌波仙古有採鞠茱萸篇而無一語及淵明長房舊事鞠茱於此其亦有憾矣乎九日戯為鞠茱補闕其體則凖之簡文落英拾秋鞠委佩紉芳蘭以其清且芬可服仍可餐呉茱味苦辛奚亦登君盤囊紗縈臂玊恍記汝南山黄鵠招不來僊子何時還茱萸紅塵着脚雙鬢斑折腰五斗真作難巾車一去不復還歸卧柴桑紫翠間東籬悠然見南山欲辯忘言心自閒採鞠又漁社李先生寵以和篇復用韻南國有秋茱芳馨襲椒蘭臞儒山澤間晨霞却朝餐置之紅錦囊薦以黄金盤瓶乳下青雲一笑頺玉山雞犬聽湛浮遼鶴將自還茱萸西風寒巖菊蘂斑索米長安行路難投休倦翼蚤知還袖手歸來三徑間雲屏萬疊匡廬山鶴唳猿啼千古閒採鞠三輔黄圖載趙飛鷰太液池結裾遊宋公雞跖載飛鷰太液池歸風送逺曲俱謂飛鷰欲御風仙去雜用古語戱題於後佽飛挾宸舟彩鷁粲雲母波涵太液秋影動靈鼉吼觀雲棹水擷菱蕖馮夷擊鼓羣龍趨飄飄仙袂隨風舉帝憐飛鷰結纓裾當時得意更深眷承恩日在昭陽殿茲遊奇絶冠平生三十六宫俱健羨太液結裾遊瑶池翠水波粼粼日暮寒生碧草春阿嬌厭貯黄金屋來歌送逺歸風曲仙乎去故而就新歌聲嘹亮遏行雲黄鵠一去無消息人間有情淚沾臆歸風送逺曲秋夜唫洞壺漏澁秋宵永翠梧葉落敲金井錦帳香消枕玊寒驚迴昨夢難重省起來刁斗連營静碧雲飛下征鴻影蠻牋誰遣寄相思鏁忩笑剪并刀冷秋琴詠巖花月彩浮井桐露珠滴悲秋適有念擁琴坐西壁古音拂朱弦一倡千慮滌無雲山雨飛松風寒淅瀝魚龍盡出聽萬籟天地寂秋夜對酒用前韻夜雨急復疎簷溜秋聲滴虛堂夢乍驚青燈餘四壁牢愁推不去濁酒詎能滌蒲萄出西涼瓶耻無餘瀝兀坐倚枯木棲心寄禪寂採芙蓉詞采采芙蓉華雧之以為裳自彼若耶溪登于君子堂馨香壓紉蘭把玩卑瓊芳佩服古無斁懷人思沅湘商婦唫妾本良家子嫁作商人婦蕩子去不歸幽閨長獨守平生松栢心嵗晚柯葉茂飄絮亂因風肯若道傍柳朝來尋姪娣典衣換春酒郵籖訪水程去問夫健否白面誰家郎下馬清溪口却立不肯前邀妾相先後寜知天壤間貴賤從其偶妾身雖同塗妾心終不負少年樂用李賀韻青雲年少歡娯地脆弦繁筦東風裏金狨醉倚玊驄驕歸去畫橋臨緑水釵梁斜嚲雲鬟墜錦帳美人初睡起促上紅茵飜舞袂春愁不展眉峯翠美人在空谷有美人兮在空谷肌膚氷雪顔如玊珠袖輕綃巻翠雲日暮天寒倚脩竹自言乆住黄金屋舞遍霓裳羽衣曲昭陽春盡音信稀傷心暗蹙眉峯緑百年日月雙車轂富貴榮華如轉燭蓬海迢迢天六六馭風歸去騎黄鵠山阿步月唫遊子莫何之攬衣出京華松舟逐桂檝渺然下驚波夜久羣動息明星耿斜河維舟亂石間步月前山阿霞佩凌空僊瑤章方詠歌見我若舊識問訊今如何我欲從之遊長嘯入雲蘿可仰不可攀髙峯鬱嵯峨久雨新霽蚤過松竹道院復以雨歸因用汪彦章一春畧無十日晴之句一春畧無十日晴竈前濈濈鼃黽生晨興登視雲霽平攬衣出門聊意行東風吹拂酒面醒花光掠我雙眼明舉頭還聽鳩婦鳴歸來有酒愁獨傾翌日晴霽復用韻述所見癡雲挾雨雨不晴門外野田春水生登臨一望漭然平滄波十里舟可行農人􅑎腹愁弗醒今朝喜見天日明前村相去幾牛鳴試問誰家廪粟傾趙仲實如呉江扁舟來别因以送之少年結交翰墨場舉頭不覺雙鬢蒼世塗􅇖嶮如羊腸交情耐久無炎凉我今讀書松竹莊君兮去去呉淞江音書莫惜頻寄將新詩分我古錦囊九月二十一夜夢至亂山叢石間出憇道傍拂石坐古榕下仰視木杪蘿蔓凌空興欲蜚舉既覺哦成古篇古榕夾道周老幹參天碧溜雨四十圍下視庭前栢垂根相勾聮敷䕃接南國凌寒不改柯閱人如過客山空秋月明路逺車塵寂清遊記昨夢危坐倚孤石矯首睇雲蘿雙鳬生羽翼秦侯不調累年識者嘆息兹以規恢祕略親簡上知有詔復其官亨衢自此發軔聞之喜甚為作古篇天驕飽肉氣勇決憶昨彎弧射漢月玊闗保障烽燧驚豺狼塞路人蹤絶將軍方着從事衫指揮義士征河南設奇間道依嵩谷百戰崎嶇不解驂攻城陷陣收殊績捷書夜到甘泉北天子興嗟恨見晚俾將樓船護江國將軍擊檝誓中流英風凛凛氣横秋胡為拘縶不得逞歸戴南冠效楚囚一朝奮激肝膽露刺刺羞聞婢子語袖㩦文字㡬千言徑趨閶闔排雲去帝勅天丁下取將玉音誦之聲琅琅侍臣却立屏東箱奇謀創見驚未甞明日北門天子詔似怪十年猶不調盡還故秩問所從豪傑中原資號召我今塵敝黒貂裘藥裹闗心萬事休挑燈看劒夜無寐耿耿猶懷嫠婦憂相期談笑青油幙闗河去展規恢略燕然碣石與天齊為君重勒千丈碑秋日自武林病歸漁社李使君惠以長篇誦之再四沉疴脫然憶昨走京華炎曦晝方赫終日無一欣夢遶舊泉石西風趂驚波兹焉挂帆席千年遼鶴歸客屨户外積雕胡飯新炊雲腴飲甘液杞狗雜苓龜夜吠更晨吸榮華風中煙得喪付兒劇寜復效轅駒長鳴悲伏櫪李侯金閨彦氣與嵩華敵龍門世莫攀氷鑒古無匹駃騠千里駿晨炊共蓐食髙唫動鬼神落筆風雨疾句誦血糢糊妙理難致詰古意渥洼天馬倈虎脊而龍膺追電籋浮雲滅没如流星絡以黄金鞿閑之白玊京王良驂帝御望舒引前旌朝踏交河氷暮清瀚海塵歸憇華山陽談笑静甲兵胡為芻豆拘下與駑駘并羊腸困九折鹽車縶長纓懸金方市駿引脰聊一鳴伯樂肯回顧價其十倍増
