body:
  text: 客亭類稿巻十三宋楊冠卿撰古律編三近體詩庭草庭草凄餘碧江風吹早寒帶圍愁裏減詩律病中寛隠几閑留客迎門懶不冠蕭然有真處未易俗人看别襄陽帥淮海棠隂巳著行却移小隊入襄陽江山尚帶戎馬氣齋閣遽聞編簡香自昔聲名滿梁楚向來為政壓龔黄風流髙出山翁上不用擎鞭問葛疆宿前崗鋪老去心猶壯天邊嵗欲除喜行新過路如讀未看書溪水縈囘浄人家逺近居梅花正愁絶薄暮雨疎疎暮雨飄飄為客久在在與春期暮雨森寒意花香閟舊枝看成南國老慚誦北山移已悞世縁惡懷哉歸去遲無題鶯語丁寧隔曉忩露翻紅藥闘新粧玊笙莫作相思調猶恐春歸得見郎記夢欹巖松檜轉龍蛇洞户仙人字少霞烱烱長眉非是畫翠翹斜倚碧桃花問訊人間㡬日期謂言何處是瑶池玊盃飲罷夢中醉不記神遊話别時壬午雜詩黄屋非堯意謳歌有啟歸德參羲昊古事與漢唐非喜氣傳千嶂皇風浹九圍功成詎無日智勇舊沈機寒甚王親駕春歸敵請和北軍方擁衆小戍或投戈形勢中朝壯衰離偽境多燕雲可中裂豈限白溝河不逆强鄰詐須當報使囘君恩固寛大敵意毎嫌猜義舉初難廢兵端莫浪開要知情偽審往事驗方來闗内攻城戰淮東却敵兵敗亡初妄作狼狽坐虚名賊勢雖亡命君心實好生不知他日事誰築受降城巳分依人老猶期振袂還有愁供白髪無力買青山北駕方傳蹕西師已度闗孤臣憂國泪東首落餘澘寄别友生馬千里秋鴻社燕㡬時休萬里無家天盡頭青蒻緑蓑今巳辦江湖歸去老漁舟瘴雨蠻烟道路賖囊書匣劒是生涯海山佳處能相憶好寄新詩鴈字斜齊安寂寞東坡對竹樓兩公陳跡是前脩津亭倚柁還商子雪後獨為江上遊隻輪不返笑曹瞞赤壁空臨江水寒想得周郎鐃鼔競小喬相與對春山病後暑退寛作遲留計難期嵗月功方驚䑕輩舞未覺馬群空度暑蘇病骨涉秋悲候蟲長江二千里只欠一㠶風甲申嵗作渺渺氷雪盡欣欣花柳蘇江澄炫初日沙潤茁新蔞乆客亦勞止我行猶載驅乾坤如許大何處著吾廬急雨來排難餘蒸頓解嚴時蜩鳴露柳客燕度風簾屈指秋無㡬安心氣自恬夜涼都不寐落月瑩虚簷讀杜工部集平生忠義不忘君末路升沈付九原千古神交真未泯一時人事可重論摩娑醉眼朝廷在消息他鄕弟妹存獨閱遺編堪墮淚秋忩燈火雨昬昬讀親征詔詔語深醇告萬方便知九鼎不勞扛波臣奔走扶黄屋約束風濤過大江君王神武不恬兵氣讋中原一掃平可笑西江喜歸客便裝行橐待還京塞上雪中雪色迷江國人誰入蔡城忩虛元自白梅破不勝清佳客苦難喚清尊只細傾吾衰便静退不忍浪談兵代别張憲澤國春强半餘寒燕子飛絶知懸榻久故作買舟歸嵗月空荒老行藏有是非功名遊戯爾此意尚依稀老去安為客春來不着家江湖遂良覿身世入長嗟處死寜無地謀生信有涯分㩦感時節楊柳又藏鴉回紋四時輕風透幕羅衾薄滿萼嬌紅綴小桃明月對愁縈錦字斷絃空暗紫檀槽氷盤瑩静風簾闔酪粉甞殘日影曛稜枕印紅斜玊頰碧山揎䄂整輕雲紋簟挹香餘汗粉緑眉攢恨舊愁新焚香夜拜初生月暮色忩紗薄霧勻霜驚葉落催寒曉夢破人愁覺夜長香暗折梅初㸃玊鏡鸞呵手試新粧九里松六言風聲不㫁天籟鐘韻初知日曛人語驚飛幽鳥馬蹄踏破輕雲王幹竹枕甚簡古客有得之者為賦二絶榮枯已熟槐安境妄幻敢藏鴻寶書一節黒甜參巳透漆園胡蝶浪分疎夜明已賜虢國姊曲肱又属東家丘娯寢有人君得計睡鄕留我取通侯呉江道中野色蒼煙濶蓬籠宿雨開湖光與天接林彩覺春回心事歸雙鬢年華付一盃松江元赴海流駛更須催壞郭郊丘裏長橋煙浪問幽花經雨潤獨鳥受風還春水圍叢薄晴雲吐亂山莫將呉越恨添入二毛斑即事歡悰憑淺酌衰相怯單衣詩向貧中好春從雨際歸氣寒憂麥瘦桑濕恐蠶饑豫學田園計他時恐願違人事悲懽裏交情冷暖中山林催晚計顔面久秋風有傳記耆舊無書問子公反闗違世久幽事亦忽忽未辦因人出時歌不我過墨泓雲脚亂藥鼎雨聲多三篾閱浮世把茆營懶窠肯將猶在舌容易説干戈讀書憂世終何補忠懷悵不平收囘長太息翻作短歌行是事且復置今人誰可盟湘中千樹橘墨墨了餘生題凌波采蓮圖綽約風姿雲霧衣波心新月映明輝更深折得清香去煙靄不知何處歸歸塗春晚待得春歸人亦歸風花撩亂撲征衣清香十里茶䕷路零落珠幢對晚暉㸃㸃更籌清夜徂昬昬鄕月𤨏忩虚夢囘忽聽狂風雨明日前村花更疎蹔解征驂野水湄巻衣上馬夜何其客愁政自不堪説殘月一聲聞子規山茶緑葉巃嵸襯渥丹疎林殘雪尚班班先驅特為東君至怕向春風桃李間道間所見窄窄山腰路娟娟屋角花谿囘蔽脩竹鷗暖戱春沙夾江雨洗山容净江流塞水通征塗萬􅃄樹行色一秋蓬黯澹平郊霧清徐邃谷風直須歌緩緩莫作去怱怱麥浪浮濃緑山眉暈逺青光風來婉娩客意獨伶俜回鴈鳴何許輕鷗下逺汀人家總幽隠煙雨竹門扄漫題著雨林花暗敲風檻竹幽翠屏疎得夢紅葉忽驚秋適安旅次山郭蕭條晚秋堂窈窕深輕寒籠暮靄横吹度疎砧叢竹深藏翠孤雲帶晚陰淹留有幽趣不礙短長吟檻蒲行碧瘦林葉得紅深客子倦長夜居人催暮砧風梢忩紙急月轉藥欄隂高枕已無睡寒螿休苦吟曉思山鳥春猶噎城烏曉亂啼危譙初罷角落月巳催鷄地逈來何事家遙夢到迷片懷如許惡深覺負𤓰畦雪後野日茅茨短荒村霰雪餘溪流山足裂谷逈鳥聲虚矯首懷新隠歸忩有舊書殘年甘飽飯何必事名譽觀諸園接花菓花木聊觀化芳菲觸處同大都知嵗晚各自占春風巧着移根力陰争造物功化鈞均播埴此理杳冥中寒食雨中無家可耐異鄕何恠底愁邊萬感多今夜雨昬山月暗泪痕元不減金波晚風一再花狼籍春去怱怱不可尋蜂蝶亦如人意薄便無消息到牆陰渡口欲繫孤舟日己斜秋霜一岸着蒹葭若為喚得愁魂醒柱杖穿沙尋酒家絶句東閣官梅巳退粧逺村沙柳發新黄遙知歸去西江路定有飛花觸地香忽憶前時小院歸杏花牆角兩三枝夜香燒斷黄昬月縹緲憐家玊笛吹始覺始覺躬耕晚從誰話此情但能安食息敢復計聲名留滯煩書信驅馳愧友生有懷愁不盡歸鳥暮雲横自檇李至毘陵道中風捲雲歸雨忽晴月輪安穏上青㝠恠來枕底流泉急去去短桅初不停朱槿碧蘆相間栽蓬棚車水過塍來茸茸秋色濃如染己有陂塘似鏡開極目雲天意巳舒迎人草樹緑扶疎望中孤塔松江近便有小舡來賣魚滿目江山無限情夫差城郭暮雲平當時不競黄池長一再何由致越兵晉陵城東􅌥堵坡兩尖髙並下臨河昔年曽醉鄰牆酒卧聽扁舟唱踏歌癸卯春雜用古語繼呉監簿水月即事霜日炫晴晝意行春色隨平林花淡淡荒墅草離離竹徑通幽處山雲薄暮時壺觴情未極飛鞚返青絲為谷隐和虞參議韻誅茅祇合老僧龕一笑欣陪塵尾談天末𡨕鴻方避弋遼東白豕忍懷慚折腰我已宦情薄嚼蠟誰言世味甘萬事轉頭俱夢幻試將此語静中參谷隠之東芍藥酴醿涉夏尚有存者籜龍頭角且森列于前次前韻呈九江趙使君衣鉢相傳書一龕晴忩時許聽名談詩成與客探囊取句好令人下筆慚别墅經春花未老芳畦過雨薺尤甘明朝更欲從公去玊版堂頭作小參歸自淮右讀楚辭有感憶昔淮山戰骨髙行人持節過臨洮匣中劒氣徒干斗䄂裏綸鈎莫釣鼇世事從來兩蝸角男兒不遇一鴻毛功名槐國吾深省痛飲何妨讀楚騷頃嵗如番禺與慶傳十六兄遇上饒後五年胥㑹于霅時太學増置生試竟不遂志將别去理朱方棹因詠昔人風雨對床之語慨然有感作是詩囊空未辦買山錢壯志隨人祗自憐千里鄉闗愁夢裏㡬年踪跡瘴江邊回溪重困南摶翼異縣還尋東去船何日蒼崖結茅屋與君風雨對床眠繼詩社諸友韻休將龜筴問窮通往事邯鄲午枕中南郭吹竽羞濫食北山運畚笑愚公酒邊賴有賡酬在客裏還欣臭味同得句不妨頻寄我從今莫效馬牛風復用前韻且約㩦琴尋花下之盟吟牋寫就訊難通人在千巖紫翠中談笑尊罍有餘樂交遊氣概壓羣公忘年許締金蘭好佳處何妨杖屨同我欲㩦琴坐花底乞君妙曲奏松風淮楚春晚病中絶塞驅馳有底忙病餘歸思遶江鄕鴈飛不到楚天逺蝶夢何堪春晝長滿地香紅初過雨一簾風絮正斜陽愁邊賴有新詩在强劈吟牋付錦囊遊交廣用帳幹趙德縱韻家聲久矣愧長楊浪説男兒志四方鼎鼎百年半流落悠悠萬里益凄涼羇懷嶺表芙蓉幕歸夢江南雲水鄕欲訪匡廬近消息試憑征鴈到潯陽琴久不作客問其故戯為説偈昭琴不鼔任虧成澤畔行唫且獨醒自信榮枯本同轍誰云得喪有殊形古今㡬見桑田變日月常循晝夜經去去來來祇如此風前别調不須聽代秦幹上刑部張尚書津疇昔持衡氷鑑清議刑今去刻為明坐令几閣文書静馴致齋居獄訟平疏闊漢朝新禁網風流廷尉舊家聲哀窮悼屈心如砥應笑張湯有重輕平生報國劒鋩寒萬里漂流困一簞貧劇方思毛義檄歸來却戴楚囚冠解驂舊事無人繼慟哭窮途祗自嘆倚伏循環知有待春回寒谷在毫端繼朱叔謙所寄韻湖海三十載窮觀未見書文章耻沿襲體製薄浮虚老去情懷惡生平習氣除交親應笑我術業廢三餘王鷗盟别去乆之有詩繼韻急槳衝煙去奚奴喚不譍清唫繼囊錦妙句琢壺氷天逺暮雲碧江寒秋練澄懷人心欲折愁坐對青燈秋日懷松竹舊友松竹隠君子别來安穏不音書遲寄鴈風雨又驚秋金井葉黄落青燈人白頭客懷難着語誰共賦牢愁烏兔不停軌蒹葭鬢巳蒼囊空㩦古錦賦未奏長楊林下松風曲爐邉栢子香朝昬作禪供榮辱巳俱忘倦遊歸去陶彭澤重來丁令威逢場真戯劇閱世識危機蠻雨沾烏帽京塵黯素衣回頭今自笑三十六年非水亭晚坐煙波渺渺白鷗雙逺樹微紅襯夕陽坐久江風起蘋末馮夷借我一襟涼詩僧常不輕以梅花句得名于時雪後踏月相過論詩終夕退得二絶以謝十年袖裏梅花句夢遶江南煙雨村今日相看更愁絶天低雲淡月黄昬荒江落日孤鴻影逺趂幽人踏月來雪屋雲林淡相對月邊依約有寒梅題張安國舎人平沙落鴈圖渚雲低壓雲山暮煙素横空落日斜秋老江鄕稻粱熟一行征鴈下平沙九江春半雨中寒甚忽見梨花江城一雨春强半寒色着人芳信遲賴有梨花遮病眼一枝帶雨出疎籬乙未秋賦不遂志歸寓水村歸來不負白鷗盟要聽雲山韶濩聲鐘鼎軒裳非我事從教水到自成渠自仙潭治歸舟呈王鷗盟江頭重整舊漁衣觸起眠沙鷗鷺機煙渚蘆花留不住葉舟還趂夕陽歸絶嶂雲烟乍有無蒼崖茅屋近何如西風拍手喚征鴈恐有平安錦字書扁舟夜泊蓼花叢曉挂風㠶苕水東擬辦盖頭茅一把十年湖海浪飄蓬江村煙雨暗霏微正是鷗盟得句時雨後屏山展新緑更煩摹冩送新詩次韻王鷗盟秋日郊居即事老去柴桑晝掩闗悠然得意在南山忘言妙處無人解目送孤鴻天際還不貪薏苡與明珠曳屣狂歌信杖扶誰道先生貧徹骨先生清處若氷壺松菊依然遶舊廬西風歸興動鱸魚歸來有酒輒成醉旋摘秋園雨後蔬次李提舉桂花韻緑帷深䕶黄金粟嫵媚似嫌紅粉粧年來不作廣寒夢喜對孤標時踞床人間初未識奇木子落蟾宫秋政芳託根底事在幽谷要伴清都山水郎春雨未霽有載歌姬遊道場山者濛濛煙雨暗空山驕馬行春翠袖寒待得春風捲雲幕却愁春色又闌珊塞上與鄭將夜飲白髪將軍夜枕戈樓蘭未斬奈愁何挑燈看劍淚如洗那聽蕭蕭易水歌幾年京洛暗飛塵老上龍庭恨未焚安得君王倚天劒提㩦直上決浮雲次韻李提舉秋日雜詠羊坂路歧險燕巢生計疎萍蓬三尺劒衣鉢一床書葉露泣金井櫩牙挂玉鈎䰟清了無寐詩思不禁秋次歸耕堂稀字韻精忠貫日古來稀帷幄從容扈六飛風虎雲龍方際㑹故鄕未許我公歸神京千里鴈書稀闗塞傳聞驛騎飛報道天驕遁沙漠衮衣行從翠華歸功業汾陽千載稀龍庭單騎去如飛笑談整頓乾坤了黄鉞金鉦奏凱歸湖山春老杏花稀栁絮漫空作雪飛横槊賦詩有餘暇不妨倒載送春歸又用韻弱水蓬山到者稀凌空須仗羽輪飛羣仙拍手山頭笑笑我漂零胡不歸窮巷無人車轍稀尋巢燕子故飛飛似嫌茅屋太低小廣厦千間欣有歸杏壇鏗爾瑟聲稀劒佩三千羽蓋飛獨對春風吟咏處從今願學舞雩歸乙巳春次中隠先生韻宻勿籌帷今㡬春故山猿鶴尚闗情中書歴徧令公考樂道要從莘野耕種滿人間桃李春門闌舊物詎忘情江湖若也有閑地着我一犁春雨耕挽葉南仲疇昔丈人行典型詩禮家剛方排武叔詞賦敵張華造膝陳經濟凝旒屢嘆嘉他年想遺烈拊髀諒興嗟次韻王宣幹秋懷囊錐脱頴乆峥嶸劒氣干霄恨莫平江左方思見王𨗳兒曹誰敢吏淵明悲秋欲賦情難極憂國忘言酒細傾髙卧東山嵗將晚何如一起為蒼生送堵脩逺歸湖城十載讀書松竹林壺觴歌詠有知音君今别我市朝去誰伴寒忩擁鼻吟雲卧江村煙樹林懸知出岫本無心亭臯若也有歸鴈得句不妨頻寄音西樓平頭四十誤儒冠獨立西樓憂萬端兩鬢飄蕭半華髮羞將勲業鏡頻看次韻葉無咎梔子花樓石山前薝蔔花品題從昔属詩家君看五字齊梁句句好當令屈宋衙從郭中隠覔酒併呈張君量百斛龍文鼎可扛揮毫曽寄碧油幢酒兵若有三千騎肯向詩壇築受降又示同志寂寂寥寥揚子居雲山相對一床書無人載酒問奇字自把殘編時巻舒歸途用李泉野韻乾坤萬古㡬昬曉兔走烏飛不暫停去日荻花秋索索歸時芳草又青青癸丑生朝舟行有感懸弧初度日鞠育念劬勞未了詩書債見輕兒女曹争知兩蝸角等是一鴻毛所貴盡忠孝結交英與豪題畫扇斷橋流水小舟横卧看林梢素月明雙鶴不知何事舞風前時送九皋聲與金陵傅漕余預鄕薦時傅兄持文衡著作承明近玊堂云何持節尚為郎運儲巧思蜀諸葛攬轡澄清漢范滂自昔謀猷資啟沃于今軍國欠平章商巖事業公須繼好趂春風朝未央鄕書憶昔獻賢能姓字曽叨天府登闕里摳衣欣附鳯雲程歛翼愧飛鵬流年自信一彈指末路誰憐三折肱若見金昆問消息為言霜鬢巳鬅鬙繼韓尚書春日舟行韻河水拍堤清且漣堤聮南陌與東阡浮家泛宅苕溪路老却春光又一年蜀魄思歸晝夜啼漆園蝴蝶夢魂飛簞瓢陋巷心如水惟有顔淵殆庶幾與鄂州都統張提刑五雲樓閣武昌宫曽挫曹瞞百萬雄今古興亡付流水江山彈壓賴元戎折衝尊俎笑談裏極目闗河指顧中凖擬明年㑹京洛為君沽酒醉春風貔虎雲屯細柳營旌旗號令轉精明人言郤縠詩書帥自有孫卿仁義兵闗塞金湯今奠枕江淮草木舊知名家聲凜凜漢人傑看取籌帷功業成江湖疇昔受恩深嵗晚漂流傷客心雨檝風㠶倦行役雪車氷柱少知音價髙肯羨連城璧才謭難希諛墓金但得扁舟從此去成虧寜復問昭琴和京尚書上元日同禁從遊鳯山韻苔封石磴遶層欄欄外行厨薦玊盤座揖湖山詩興逺氣吞雲海酒盃寛籃輿竟日有餘樂蓮市只今無此歡我愧么微難接武飛牋亦欲寄青翰洪溪口短短桃華宿雨餘風輕春水縠紋鋪柁師苦要貪行色不肯繫舡尋酒酤臘梅四絶遊蜂辛苦事芳菲嚼蘂偷香釀蜜脾還被東風巧收拾又隨春色上南枝枝上編鐘萬顆垂凌寒傲視雪霜姿從今疎影暗香句不數西湖處士詩塗黄不學漢宫粧一㸃檀心萬斛香嚼蠟我今忘世味羞將花譜細平章阿嬌厭貯黄金屋洗盡鉛華兒女粧香䰟寒夜伴幽獨青燈相對吟胡床同韓呉二寺丞飲西湖梅花下酒酣繼韓韻冉冉山雲薄暮時壺觴歌詠欲忘歸一盃且為梅花醉莫待梅花作雪飛港口野寺雲山逈人家煙火稀水腥漁市近帆落晚風微拂樹昬鴉去迎􅊑白鳥飛吾生樂江海猶恐與心違
