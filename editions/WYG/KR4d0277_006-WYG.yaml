body:
  text: 客亭類稿巻六宋楊冠卿撰四六編六啟謝湖守趙舍人斷遣盜斫母氏墓木人啟母兮鞠我睇宰木以興悲伯也執殳率樵青而肆伐傷恩甚矣僉言謂何宜必罰以必懲俾勿剪而勿敗竊以唐記平泉之草木用戒子孫周歌行葦之牛羊貴無踐履矧皇家之忠厚廣惠愛於存亡苑囿與芻蕘者同方布文王之政兒童採荆棘於上肯使雍門之憂入山林斧斤以時為宫室丘木不斬凡曰樵蘇之禁惟嚴􅇕墓之間葢秦步五十有犯則誅而吕刑三千其罪莫大必也蒼官青士為報平安猶如金椀玉杯㒺有缺壊庶風移於民俗獲枕奠於泉扄孰謂近州今罹大患某以外王父之治命奉先慈母於墳廬營夫馬鬛之封得此牛眠之地日月云邁松檟成行蔭寒煙宿草之區佳城鬰鬰奏悲風白楊之韻愁人蕭蕭春秋每慟於祠庭檜栢亦為之變色詎意析薪之子輒興撼樹之謀盜言孔甘既難圖而滋蔓墓木巳拱乃盡去其本根至櫟社之年亦靡全其天雖蓬塊之土不得蔽其冢孤墳暴露行路驚嗟遣長鬚訴於公義非獲巳以強詞奪乎正事豈其然及繫諸縲絏之中稍求於箠楚之下一繩以法遂伏其辜盖人情雖有所徇而或有所欺然天下可欺以暫而莫欺以竟豈以盤根錯節容乎刻木舞文宜二天之庇無私致九原之魂允頼兹盖伏遇某官先生胚胎弱質潤澤枯株萬家桃李以無言千里藜藿之不採爰念參差之孔樹毫末而成胡為蕪沒於鄭鄉寂寥如許人誰無母於汝安乎邦有常刑莫之違也錄其大者撻以記之雖莫能救積薪於未然之前猶可以回狂瀾於既倒之後在名教不為無補若人子其何忍忘某敢不則鍳伐柯報圖結草雖桑梓必恭敬止勉事大夫之賢植枌檟無孤願言力課十年之効庶或昻霄而聳壑可酬嘗膽以卧薪庸慰母心以全孝道過此以往未知所裁代武舉第三名及第謝政府啟清問十行莫賛規恢之畧鴻臚三唱遽叨鼎甲之榮拜寵雖優省躬知懼竊以古今之取士本於文武之同方周重賓興三物必先於射御漢專經術一時亦舉於謀謨自開元備闡於七科至皇祐區分於三等鄉飲如明經進士之法䇿對須逺識善射之能宜多士之朋來致異人之輩出鈐謀中第舉皆卓邁之崔貟福祿永終咸仰令名之尚父逮聖神之繼作設學校以兼收凡預選掄不以次舉内則參華於四衛外焉作屏於十連或緫按於祥刑或訓齊於禁旅盖弛張之道貴乎並用而長久之術戒於或偏經天緯地曰文豈但學專於章句禁暴戢姦以武所期身任於安危故兹入仕之權輿難以非材而僥倖如某者學惟嗜古識昧通今謂權謀之書豈誦說云乎哉於軍旅之事顧方畧如何爾修名未立雖浮家苕霅之間滅冦為期每馳志伊吾之北時哉難得而易失辰乎去速以來遅將求㨗徑於仕途妄意右庠之舍選蓬山在望夫何風引以舟横丹藥欲成可歎骨凡而事逺當慶典誕敷之日乃祥琴未御之時大比興賢幸猥先於衆雋南宫較藝且復占於上㳺兹聮郡國之英入奉宸庭之對遭時遇主而建長策慚無剴切之言平齊下趙而㑹滎陽曷副丁寜之訓敢覬一飛之翼謬塵前列之龜兹盖伏遇某官先生社稷宗工股肱元老運大鈞而播物菁莪樂育於中阿闢數路而得人葑菲不遺於下體遂令賤子亦忝誤恩某敢不警䇿初心淬厲末學再造王室而忠貫日月雖莫繼於前修肅清宫禁而秪謁寢園尚或為於露布庶酬知遇少荅生成過此以還未知攸措代陸安簿謝黄漕薦舉啟鸞枳棲遲方懼譴訶之抵鶴書慰薦遽䝉特達之知寵至若驚愧踰於感盖聞古今薦舉法本至公賢否混淆世或私徇百女蕩而一女正固知正者之可嘉一人冠而九人髽惟憂髽者之能勝矧其間名是而實䘮抑亦有言從而行違矢情獻直者多失之誣阿意取容者不過乎佞真偽紛紛而莫辨黜陟每每以為難繩之三尺則幾無全人責以數善則焉得我輩且舉於内舉於外苟或稱解狐祁午之賢如取以貌取以言猶未免子羽宰我之失儻非洞見乎肺腑未易輕借之齒牙如某者學昧通方志惟泥古誤上儀曹之第來從邉障之逰雖塵埃箠楚以徒勞豈風雨晦明之或巳念人情相咈乃能相濟而官事貴和初不貴同其相與如昵論事如争在昔人有所不免若於利則動見便則奪料君子亦豈樂聞旋攝縣章謬承臺檄爰肆意而妄議務直情而徑行位卑言高烏得無罪才踈命拙祗以為憂寜期受察以受容乃欲使功而使過棄瑕錄善並蓄兼收贈華衮片言之褒増敝帚千金之重恩誠㒺極德又何加兹葢伏遇某官儒林以為指南吾黨之所寄命英鍳得於精神之表和氣見于語黙之間與之以行二三子吾無隱爾洞乎其量數百軰是能容之知財貨本末源流使賢能出長入治回狂狷之徒而歸中庸之學革浮華之俗而返純厚之風桃李有意於栽培草木喜同其臭味謂小過而無咎可恕以情以大道而為公能明其故貸盆成括小有才之失察寗武子不可及之愚反復安全始終䕶念遂令下走亦玷公言某敢不退省其私不負所學舉善人不善人逺矣雖莫稱於言揚遇國士以國士報之庶或酬於恩施過此以往未知所裁代常州守服闋上政府啟分符竹之寄方玷誤恩纒風木之悲遽罹大故偶未填於溝壑敢復覬於陶鎔伏念某姿踸踔以奚堪動􅋂􅏟而可笑雖行乎患難而安之若命然志於寥廓而噤不得施驚半世以胡為悼修名之弗立追想覆蕉之夢肯猶緣木之求西塞扁舟巳辦元真之簑笠東籬三逕莫營靖節之田園頃焉懐組以卧家俄爾茹荼而興愍念昔者聖人之制務適夫天下之中故可立而可與權且無過而無不及兹存餘息甫御祥琴三釡弗洎於親固巳絶於榮望一見而賜之璧尚有徯於隆知葢立身揚名者孝道之先而移孝為忠者臣節之大方叡聖攬賢而虚宁與上相登明而選公錯薪言刈其蔞雖曰羣才之盛采菲無以下體曽微一物之遺欲期匠石之見收庸効頑金之自躍恭惟某官皇家柱石治世蓍龜興雍熙之和躋斯民於仁夀建久長之䇿舉明主於隆平天子恨無官可酬吾君欲舉國以聽運大鈞之坱圠轉一氣於洪濛春風風人而夏雨雨人配天其澤解衣衣我而推食食我惟今其時盖飢者之易為且辰乎而去速公或棄此誰其念之再念某既罹百憂所欠一死顧來日之無幾冀大造之曲成舉手轉之清波或可延於朝夕踐冰待乎白日肯自速於譴訶誓竭毫分仰酬萬一代賜對改官謝執政啟望天威於咫尺謬展愚忠勤帝訓之再三遽叨京秩兹平生夢寐有所弗及顧一介庸陋豈所敢承竊以古昔君臣之間難乎德意志慮之合賈誼謂正朔可改文帝之心乃謙遜未遑唐宗問禮樂何如元齡之徒或議論不到必明良之胥㑹庶事功之有成洪惟熙朝登用吉士遭時遇主而建長䇿左右罔匪正人修身治國而獻六言終始咸有一德宜精誠之黙契於猷為而允臧孰謂么微能知利病如某者微官九品浮食十年慨想知音侵尋暮景兹誤䝉於嚴召無入告之嘉謀修政事以攘夷願鑒時機之失表亷隅而厲俗謂宜名節之崇用人必取於經綸右武務先於韜畧以草茅言天下之事既非素宦於朝而雷霆犯人生之威多見不知其量詎意簡宸旒之聽乃洊承綸㫖之褒有司雖阨以縣章溫詔俾㕘於賔幕乾坤施厚寵至若驚螻蟻命輕報將何以兹盖伏遇某官功熙帝載道覺民先網羅羣彦以輔太平緫領衆職以稱上意三吐哺握髮而下白屋曽不遐遺一舉手投足而轉清波綽有餘地軫念鑪錘之舊力垂造化之私遂致狂言亦膺殊奬某敢不銘肌刻骨誓子及孫亷以律身忠而事上本於義不負所學勉繼前修以其言見於有行用承休渥代赴機幕與交代啟望紫芝之眉宇未契夙心依綠水之芙蓉兹塵交契榮雖欣於附驥愧實重於續貂恭惟某官天賦異能家傳奥學摛文講劒蔚為盛府之元僚揷血厯堦切笑平原之下客既遂奏功於幕府宜聞入賛於籌帷晉復輿圖益恢逺畧某久留京邑行赴戍期莫知從政之方寜免因人之誚大將軍之客亦重幸餘範之可遵舊令尹之政告新庶大訶之或免代副緫管赴任謝留守大學啟賦祿祠庭久從家食緫兵都邑兹玷上恩拜寵若驚循涯増懼竊以聖朝之治莫嚴軍政之修十國為連既列帥垣於外閫諸道置使復存兵副之常員宜得其才俾賛而長如某者幼而多難長則逄尤驚半世以徒勞悼修名之弗立念大父䧟名於元祐之黨經德不回而嚴君死節於靖康之間孤忠未泯爰捨文而從武思述事以建功晩矣㑹逄過於分量遣使臣而送以禮始修睦於殊鄰除戎器以戒不虞旋提綱於中禁靡聞勞効自速譴訶禠帶終朝面觚稜而去國浮家二水手攙柄以歸田徒能書空咄咄奚為哉未知此身漂漂何如爾上方獨化於鈞陶之表時收窘步於奔軼之餘叫閶闔以排雲因厯籲天之懇回邯鄲之夢枕遂叨出綍之榮錫對便朝充貟大府拊微蹤而何幸仰洪造以知歸兹盖伏遇某官治世蓍龜皇家柱石久翊政機於揆路暫分留籥於神臯倡九牧以阜民獨任保釐之重運大鈞而播物曲垂造化之私反覆圖存終始䕶念謂畢萬之後必大何陳掌不侯於今􅌵冷灰而始然回狂瀾於既倒故雖疵戾亦冒使令某敢不銘戴殊知激昻素志再造王室而忠貫日月雖莫賛於元勲肅清宫禁而祗謁寢園或可陪於下客又與馬帥及都統啟漂流異縣徒勤嚮往之心副貳陪都喜有親承之便巳驅車而就道庸占詞而寓誠恭惟某官以非常之才濟兼資之畧鳴劒扺掌而馳伊吾之北誓不俱生平齊下趙而㑹滎陽之西盖其餘事夙典周廬之衛屢書盟府之勲擊楫清中原所願祖鞭之先着登壇拜大將且使漢軍之皆驚以進復於輿圖遂垂休於永世某行乎患難而安之若命志於寥廓而時乎為貧漫浪亡庸侵尋且老再造王室而忠貫日月雖莫賛於元戎肅清宫禁而祗謁寢園尚可陪於末議代賀許拾遺啟伏審眷簡上知任司言責正人顯用歡誦沸騰竊惟分職於諫垣無若拾遺於禁闥朝政得失有闕必規吏治醇疵雖逺必察從容諷議豈惟益日月之明彈擊姦回所願寄雷霆之下若稽古昔遴選公忠自官制之屢更故名稱之或異兹焉肇復僉曰允諧恭惟某官逢君子造道之原全王臣匪躬之故擢繇人望來應時湏出班擬扣於龍墀論事竊卑於瓊室以才鍳見推當世既髙平允之能或除授不由中書肯視紀綱之壊將見歌詠繼樂天之句誥命有元和之風基立太平修和有夏晉躋兩地益闡大猷某夢遶宫牆身縻郡紱諫官之自宸選昔聞簡册之傳明主之登直臣今捧絲綸而喜其為慶幸㒺既剡裁代賀薛補闕啟伏審親簡眷知進司言責衮職有闕補惟藉於仲山聖政弼成效可隆於貞觀盖人君處無過之地必諫臣展盡規之忠事有不便於時言有不聞於上大則廷議小則封事既糾謬以格非右居散騎左居侍中且切問而近對宜無闕事馴致丕平迨官制之屢更故名稱之或異兹焉復始僉曰允諧恭惟某官逢君子造道之原得王臣匪躬之故肆繇人望來應時湏論議炳炳以如丹豈避一時之雷電獻納孜孜而無愧益堅全節之氷霜千載以還一人而巳是用期之進善寄以登賢詔中書善為之辭逺稽於古謂拾遺未𢎞於選並建於今以立邦家之基以壽天下之脉行膺寵渥遂秉政機某夢遶宫牆身縻郡紱諫官之自宸選昔聞簡册之傳明主之登直臣今捧絲綸而喜其為慶幸㒺既剡裁謝江東漕緫啟茲以藉芘使天僣修賔謁伏䝉與進特賜溫言慰勞拊存挈提褒借者倒屣迎王粲初聞一座之盡驚逄人說項斯洊辱片言之誤寵士獲伸於知巳誠敢後於修辭盖聞天下未嘗乏才患在學者無所歸宿自孟氏韓昌黎而降支離將何適從逮歐公蘇文忠而來述作方明本始厯時既久專門並興舉皆昧正始於風變之餘孰能續大雅於詩亡之後廻狂瀾於末俗屹砥柱於中流非五百年有名世之英則二三子患斯文之䘮天降大任於是今捨我公其誰如某者古學未聞塵編漫讀客諸侯而且老無一字之可師屢血指於巧匠之前幾䘮神於大巫之側其所謂文非文也恐重貽賓贄之羞以為可敎則教之庶或預門弟之列豈圗骫骳獲與選掄接以色辭之溫借以齒牙之重譽過乎實愧溢于𠂻兹盖伏遇某官羽翼六經冠冕百代道循循而善誘心休休而有容主張文盟作新善類一經品題便作佳士南州悉藉於陶鎔所餘俸祿皆給故人東閣素多於賢俊克勤小物加惠窮途欲其有所就而底於成是以鍳其誠而與之進故雖敝帚不靳賞音某敢不圗報垕知益勵末學給餉餽不絶粮道方將尅復於神京清宫禁祗謁寢園尚冀作為於露布過此以往未知所裁代楚州司户謝守臣辟差啟再轉為丞未紀藍田之名氏三語曰掾遽騰公府之辟書特勤帝㫖之攽謬玷户曹之選望非所素得之若驚竊惟郡國之建侯允頼官曹而共治自晉宋而下名品雖有異同由隋唐以來簡㧞務先賢俊三絶盡河東之秀空羣必冀北之良韋嵩善判而彦伯文辭既休稱之冠古成瑨坐嘯而宗資畫諾宜歡誦之載塗如某者才品至凡性資甚下雖蠧魚生死不離文字之内而尺鷃飛鳴僅止蒿艾之間頃繇棲枳之卑妄意哦松之樂嚴君董餉適緫江淮兹邑負余空遲歲月擬駕車而就夷路往陪駟馬之後先遇有力而轉清波恐異常鱗之品彚靡俟再三之瀆果䝉特達之知此盖伏遇某官家傳呉起之良謀身佩糓城之秘畧來寛憂顧肅慎邉陲方為官而擇人使坐曹而治事謂得文武之士於幕下湏石生而為媒有問賔客之賢於湖南庶昌黎之可信故雖賤子亦預下僚某敢不銘鏤于𠂻激昻其志號霹靂手知名竊暮於琰之作歡喜詩見賞尚希於杜老代回徽守徐子宜啟伏審左符錫瑞東騎殿邦共理得賢僉言允穆伏惟某官見聞博洽師友淵源讀先秦屋壁之書能明其訓知當時治理之效欲行所言兹出守於侯藩復備陳於民事奏篇剴切訓㫖褒嘉諒藹著於休稱遂横搴於要路尚稽慶問先枉華緘感與愧并意非言盡謝修奉使司轉官啟伏准行在尚書禮部帖承吏部闗牒備坐省劄恭奉聖㫖以某前係特差充高宗皇帝攅宫修奉使司准備使喚特與推賞轉一官收使者設屬宫陵昔綴貟於盛府閔勞役士兹第賞於明庭揣巳奚勝循涯知懼竊以慈皇厭世仙馭上賔聖主念親宸心永慕命緫因山之役時資膚使之賢用期門兵用羽林兵盖自有於制度發近縣卒發内史卒曾靡調於師徒汔全甫竁之工大慰攀髯之望退惟下走曷有微勞居慚濫吹以亡庸敢覬疎榮而示寵兹盖伏遇某官忠貫白日誼薄曽雲親簡上知肅將使指念神州未逺將朝漢殿之衣冠而禹穴相仍姑閟喬山之弓劒暨思陵之復土副威靈之在天故雖執事之微臣亦玷出綸之懋賞恩隆效蔑感劇涕零某敢不誓竭縻捐勉思補報三吐哺而下白屋巳資造化之生成一舉手而轉清波更藉陶鎔於終始庶圖尺寸仰答萬分過此以還未知攸措賀張右史兼吏部侍郎啟伏審螭頭載筆言方紀於聖謨豹尾持荷班巳躋於法從朝有得賢之幸士歆稽古之榮竊以史官權重於宰臣銓部職華於禁近繫日繫時而繫月作經資記事之文或辯或諛而或姦典選頼知人之鍳然措辭未許於㳺夏而稱職惟推於馬裴若非命世之英曷勝兼任之寵恭惟某官行髙今古學探本原羅二十八宿於胷中置五三六經於言外厯觀自昔鏡攷巳行凡天朝委寄之隆皆我公事業之著䇿勲外府則底太倉紅腐之效議禮奉常則小諸生綿蕝之儀詔自上卿命陞右史國政攸繫君舉必書或考制度以示勸懲或紀善惡而為檢戒然人君雖起居修注在朝廷須逺近得人期閥閱之不遺必衣冠之傾屬妙膺帝簡晉陟天官清若玉壺冰諒致權邪之憚賜分金背鏡益彰識鍳之明宜褒賢而賞功遂奮庸而熙載某禀姿極陋知音甚希愁把酒以對新豊敢捫蝨以談當世密邇宫墻之峻誤䝉國士之知月明而烏鵲飛方投林而假蔭厦成而燕雀賀庸修辭而寓誠喜溢于𠂻言不盡意賀太常薛少卿啟伏審榮輟使星晉躋卿月正人登用善類知歸况夙陪東閣之趍奚敢後衆賢之賀恭惟某官剛方而直諒恭遜而溫良表正朝端凛然有莫犯之色識通世務即之皆可用之言頃登四諫之聮力陳萬世之䇿兹從外計入領奉常念禮樂雖百年而興然明良必千載一會故太宗之問元齡莫能對而賈誼之書文帝所未遑宜漢唐之多闕文繇君臣之不相契仰熙朝之列聖振墜典於百王薦之郊丘致天地神示之格用於宗廟豈鐘鼔玉帛之云大而和邦國諧人民小而别尊卑辯同異有秩有叙不僣不差矧太平大備之時啟皇極嚮明之主繼舜以治天下命夷而作秩宗公為時生國實幸甚苐恐事樞之遂秉靡容夙夜以惟寅某東魯諸生新豐逆旅期假館而受業庶附翼以攀鱗掃迂儒聚訟之非儻與聞於末議舉梁父登封之典尚或賛於成功賀侍御張先生啟伏審眷簡凝旒命躋横榻絲綸播告山岳動揺時欣直道之行朝慶真儒之用竊以御史紀綱之地實為天子耳目之司國家利病得以盡言官吏能否從其糾正矧惟憲長是曰臺端炳炳如丹論諫本先於仁義行行且止威名素懾於權豪宜朝陽之一鳴罄昕庭而胥恱恭惟某官閎深而肅括重厚以端方載筆螭坳特書言動持荷豹尾備罄論思修身而獻六言遇主而建長䇿公嘗明目以張膽上必歛袖而動容挈天下之大置諸安信仁人之言利甚溥南床虚席中扆急賢才應時湏國實幸甚鸞鳯冲霄必假羽翼既忠力之是資豺狼當路安問狐狸想論議之尤審將見一臺正而朝廷治庶事康而股肱良潜消魑魅之逄人晉秉機衡而賛化某江湖浪跡籬落卑飛愁把酒以對新豐敢捫蝨以談當世竊喜依歸之有地擬待吹噓而上天去姦邪於雙闕之前方聳聞其風采誦佳句於百僚之上終覬望於陶鎔謝郭殿帥惠湖山葬地啟鼓盆而歌未忍忘情於家室穴地而葬敢希吉卜於湖山恩既逮於存亡感實深於淪浹伏念某新豐覊旅盛世窮民家無儋石之儲老作諸侯之客乍賢乍佞肯從世俗以變遷一死一生始見交情之向背追維賤婦久抱沉疴生兒初曰添丁不幸俱至大故室如懸罄何以辦棺服斂從之儀地乏置錐何以為宅兆安厝之舉人誰憫此公獨念之兹營馬鬛之封復畀牛眠之地龍驤虎伏水秀山明旁可置於萬家送豈徒於千乘昔者滕城之鬰鬰僅有其名今焉蒿冡之纍纍實為之冠雖九原之愈邈奚一念之敢㤀兹盖伏遇某官春風風人而夏雨雨人解衣衣我而推食食我哀窮悼困有始及終誦潘岳悼亡之詩心乎不忍謂王孫臝葬之制古所未聞既寓哀而脫驂且興憐而瘞骨施亦厚矣報其謂何某敢不銘刻于𠂻告語於後衣薪野外既獲逃符氏之譏結草道傍尚力亢杜回之役庶幾一得仰荅萬分杖謝王給事免舡稅錢啟比䝉使府特與蠲免所買舡稅錢者願得扁舟寄餘生於江海輒希大府蠲故例之緡錢方虞冒昧之誅遽拜矜從之命兹意甚厚中心靡忘伏念某與世背馳因人逺役牙檣錦䌫此行敢羡于登仙雨檝風帆佳處惟勤於歸夢盖龍驤萬斛非吾固有而蝸戰兩角所得幾何擬乘太一之蓮未化葛陂之杖行唫澤畔縮手袖間東望夏口西望武昌來訪周郎之赤壁暮逰蒼梧朝逰南越慚無吕氏之青蛇傾書生紙褁之資覓漁父煙波之艇垂綸釣碧將扣舷賡欵乃之歌潄石枕流且濯纓詠滄浪之曲何觸藩莫能進退類推陸不行尋常僉日劵金扼於舡儈故停艫於别浦聊弭棹於晴江儻非高誼之軫憐安得一請而遂去兹盖伏遇某官熙朝柱石善類津梁倡九牧以阜民久著蕃宣之效濟大川而作楫行膺輔相之求念筭及舟車非制之良而山有臺萊惟材是育方求文武之士於幕下及問賔客之賢於湖南欲増破釡九鼎之榮爰畀一壺千金之重某得不問去程而㳙日破巨浪以乘風浮家泛宅於西塞之邉歸詠真卿之德擊檝誓江於中流之際更先祖逖之鞭過此以還未知攸措賀胡知院啟伏審廷揚大號位正元樞揆路増華巖瞻益峻久荷鴻鈞之播輒伸燕賀之私恭惟某官規模繇稷契以來事業卑漢唐而下遭時遇主而建長䇿輿論攸歸修心治國而獻六言至誠不息頃從諫省㕘翊政機凡所罷行審其思斁扶持萬化若泰山而四維障隄百川屹中流之一柱國是既定治功巳成宜邦家立太平之基致上下毋苟且之意擢冠本兵之任實昭論相之公昔韓魏公登庸於嘉祐之初晏元憲得君於寳元之際獨專樞筦協賛廟謨故能使西北二敵逡廵而遁逃且輔成祖宗大業光明而炳燿若稽成憲兹用真儒聞建無窮國實甚幸某逖聞明制喜倍常情自憐樸樕之微曽是錘鑪之舊選車徒而備器械方將尅復於神京清宫禁而謁寢園尚覬形容於盛烈其為抃蹈㒺既剡裁
