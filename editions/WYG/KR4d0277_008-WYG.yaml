body:
  text: 客亭類稿巻八宋楊冠卿撰雜著編二辨疑問治體問治道有本原為治有徑術談者類為是言然詰其所自則懵不知何說有以賞罰為言者則曰賞罰人主之操柄有國者之不可一日無也昔者齊國􅄶小諸侯未之服從一旦威王召即墨大夫而封之召阿大夫而烹之於是羣臣莫敢飾詐務盡其情而齊國大治强於天下賞罰者其治之徑術乎然不賞而勸不令而威帝者之治又未始汲汲於賞罰何耶有以刑名為言者則曰三代以還人漸澆漓故秦任法律漢雜覇道蓋欲化而不能豈能之而不欲刑名者其治之徑術乎然嵗斷死刑纔二十九斗米三四錢外户不閉行旅不齎糧其效乃見於行仁義而刑名不之用又何耶竊意談者之言皆未得其要領所自也恭惟聖天子未明求衣日昃不食恭儉憂勤焦勞圖治十五年於今矣以仁義之道則安而行以賞罰之權則公而當宜其成效大驗視古無愧焉可也然内而朝廷外而郡縣誕謾虚偽奔競苟且今猶昔爾上而百執下而民庶浮靡驕奢越常亂俗今猶昔爾吏員兵藉日益繁多而熙績禦侮之效靡聞法令賦歛既備且極而創例虐征之舉不巳簿書填委文移猥并視之邈如而陳篇奏記請謁覔舉則交馳於道是無怪乎庶事之煩冗習俗之澆漓舍農桑事雕飾棄本逐末日淪於薄而冒法抵憲者紛然莫之禁也詔㫖丁寧廷臣獻納及於此者母慮再三所以告戒者非不切至今乃未能翕然大變其俗何耶豈澆漓之積化而不能而羣臣飾詐莫盡其情所以致然耶是必有定論於此也或曰漸靡之習有不能遽革於振治之暫而庶事之備未嘗不成於積累之餘自武而成成而康驕滛利口之風未殄也自髙而惠惠而文誶語徳色之俗未衰也彼周漢之君亦何嘗切切於是哉漸而化之其終俱底於治似未可以經術之說尤之也曽不知昔之羣冦麕争八方鼎沸而王景畧得其術行之於闗中不朞年而道不拾遺夫道不拾遺三代之所難致景畧且談笑致之孰謂今日有所不能乎諸君幸考古驗今厯陳其說庶有見儒者之通世務云石經聞自秦滅學聖人之經淪於煨燼天下不復見其純全殘編斷簡出於屋壁間頼漢儒收拾其遺而補其缺故聖經於是復明然人自為學家自為師父子異同之論紛然而起甚者至於改蘭臺漆書以合其私文此李巡所以有刻經於石之請而靈帝且詔諸儒讐定之也當時名儒如議郎輩嘗為古文篆𨽻三體書法刋於石碑立之太學門時人謂之石經而天下學士咸所取法固若可尚焉然石經既立議者尚或譏其禮經之失何耶信如其言則諸儒之讐定亦未足為世之法則矣今考之洛陽記其碑之殘缺雖不能全然存者十七八皆可覆而驗也似又不容輕議於其間而唐人乃慨然憫經籍之訛不能刋正力與諸儒討論正其遺失立石於太學以為萬世法又何耶李唐去今猶未逺其載籍所傳皆耳目所接是否尚可究也彼之所正遺失者竟何事其畧亦可得而聞否或曰揚子雲作太元後世必有揚子雲者出然後其書為可傳聖人之經自遭秦火後世亦必待聖人者出然後其經為無疵漢唐諸儒其識見豈及乎此紛紛之論奚益哉我太上皇中興以來崇尚經術親洒宸翰刋之翠珉䕃以豐宇聖人之經固已是正遺缺昭如日月傳諸無窮聖上臨幸兩學思有以盡寶藏尊崇之意又且建為傑閣揭以璇題棟宇翬飛奎壁煥爛窮今亘古未之前聞士生斯時得以聖主為師拭目觀盛典千載一遇何其幸耶竊謂自古帝王有盛徳大業必見於歌頌諸君蒙被教養之日久所謂老於文學者視此其可已乎願摭漢唐石經之得失形容夫今日之盛以待有司之所决擇禮義㢘恥問管仲任政於齊齊桓以霸九合諸侯一匡天下仲之謀也其書八十六篇自劉向校其重複至於今傳焉向謂其務於富國安民而道約言要有合於經今取而讀之初無甚髙難行之說其牧民首篇乃曰守國之度在飭四維四維張則君令行四維不張國乃滅亡彼之所謂四維者禮義㢘恥是也且人而知夫禮則不踰節而上位安矣知夫義則不自進而民無巧詐矣㢘則不蔽惡而行自全恥則不從枉而邪事不生是豈不為治之要術乎竊意齊之所以强桓公之所以覇皆管仲斯言維持效也然唐人之論則曰㢘與恥義之小節也不得與義抗而為維聖人之所以立天下曰仁義蹈之斯為道得之斯為徳履之斯為禮誠之斯為信皆由其所之而異名今管氏所以為維者殆非聖人之所立乎使管子庸人也則為此言管子而少知理道則四維者非管子之言也信如其言則㢘恥由禮義而生禮義之維絶則㢘恥不復存㢘恥之維存則禮義固自若四維者吾見其有二未見其所以為四也管子之言不㡬於贅乎然漢人賈誼則曰亷恥節義以治君子上設㢘恥禮義以遇其臣而臣不以節行報其上者非人類諄諄數百言且有及於管子四維之論又何耶大抵聖人之治天下於此四者不可缺一而為治也誠能厲此以御羣臣則人皆懐徳戮力國家鞏固有金城之勢此誼所以謂厲㢘恥行禮義所致也今而去其二尚可為治乎唐人之論是否果如何識者其必有見於此矣近世之士夫見利則逐見便則奪判於禮義而汨喪㢘恥者十嘗八九若以誼之所謂頑頓亡恥奊詬亡節㢘恥不立者伯仲之相去蓋又逺甚其勢政如痿人之疾駸駸乎日淪於膏肓而莫之振起使管子復生於今視此寧不為之寒心哉即是而論則四維之厲在今日誠不可朝夕緩也聖天子頃下明詔固嘗以無伏節死義為深憂而邇之議臣又欲舉管子之四維而厲風俗勤懇切至誠當世之急務上之人亦可謂無負於天下矣然君子之議尚慮乎忌與怠者其心之所不樂聞且以唐人二維之論為口實而謂夫四維之言非管子之言不足以訓故願與諸友評之幸道其所以然之故母畧求遺書問爻畫肇於包犧文字生於蒼頡圖籍之傳蓋非一朝夕也自秦下焚書之令先代墳典掃地不復存故天下後世始以不見古書為恨而右文之主亦汲汲然惟殘經闕典之求無斁也吁秦之火其酷於書如此哉然書因秦火而亡固也亦有非秦火而亡者試與諸君評之夫書之二典載堯舜之事詳矣康衢之謡南風之歌二典之所宜載者也何為書獨遺之其言乃見於列禦冦書孔子家語耶三皇五帝之書周外史掌之三墳五典之書楚左史讀之而黄帝顓帝之道具在丹書宜若可考而知矣周武何為而不知乃以其道問諸太公耶意者外史之所掌左史之所讀黄帝顓帝之事亦有所闕而不載歟證夏商之禮孔子謂文獻不足闕史借馬之文孔子謂其今亡夏五郭公春秋或以闕文而無所増周班爵禄孟子亦謂籍去而不能詳唐虞成周之時其書未為秦火也書之闕巳如此其於秦也夫何尤說者謂六經之免於秦火者卜筮之易諷誦之詩而已然夏之連山商之歸藏易也二易之書胡為而不傳差以毫釐謬以千里易也易之書胡為而不載南陔白華之詩華黍由庚之詩崇丘由儀之詩詩也又何有其義亡其辭耶即是而言則易之與詩非以秦而存明矣漢之入闗蕭何入秦丞相御史府收秦圖書藏之則是秦自易詩之外復有所謂圖書者存其後挾書之律漢除之獻書之路漢開之或遣謁者求其遺或採闕文補其逸六藝百家之文既已悉上送官而河間所得又皆先秦舊書孔之屋壁魯之淹中亦莫非書之古文禮之古經也書禮宜其蔑有闕遺而汨作九共月令考工等篇或遺而逸或補而全者不可一二數復何歟豈蠧簡之傳寖久而失其真抑史臣所述未足深信也隋人謂書有五厄其論不専咎於秦其亦有見於此乎嗚呼經之遺文秦之古書不可復見矣若河東之三篋西河之漆書汲冢之竹簡無非古書也其書亦可得而聞歟九種七畧之名四類四部之分與夫七志七録之著四庫十二庫之藏亦無非古書也其篇目皆可得而究歟國家垂精藝文求書之詔時時而下聖聖相承皆以是為急務故遺編墜簡雲集京師典章之盛視古無愧太上皇帝南渡以來固亦詔有司搜訪逸文儲之廣内石渠中以傳之無窮然篇籍散亡於兵火之餘視祖宗祕閣三館所藏尚或有所未備今日議者所以復有求遺書之說也然求之當如何將遣使以求之歟則括江淮之使必得人如苗拾遺訪三川之使必得人如庾都官或謂其人未易得也將立賞以求之歟則同光試官減選之法乾徳引驗任職官之法大中祥符賜出身補三班之法似亦未易輕舉也昔人云求訪難知知者吝惜必須誘之以㣲利果爾則優給金帛無恤乎千金易一筆百金償一篇之議可也諸君考古驗今胸中必有成說幸援前所疑者一二條陳之以待上之採擇役法問法之行於天下病於啓民之争心而多怨爭且怨則趨上之役類有怵迫亡聊之意非其心之樂為也吁為法者亦安取乎民之不樂而强之哉古之時有庶人在官之役府史胥徒其是也均人掌均力政凡用民力嵗不過三日故靈臺有子來之衆鼛鼓有弗勝之喜非若後世之不樂於從事之甚也試以役法一事與諸君商之夫保甲之置與夫都副長正之異名不過使之譏鄉井司鬬訟而給公上之役亦周人鄰里相救助之遺意後魏里鄰黨正之故事也行於今日則猾吏髙下其手以啓夫爭端姦民移其産以附之外户雖明察之吏有所不能竟其欺而我獨賢勞偃仰休息不均之弊於是乎生其可無所處於此乎國家嘉祐之前嘗行丁役之法矣一變而為募召熙寧之後嘗行募召之法矣又變而為丁役由丁役之弊則所配不均而中産往往有碎其家而仇其上者民瘼如之何而不恤由召募之弊則游手無頼不足倚仗往往有易姓名而之他郡者公務如之何而不虧是二說可為善後之計否耶主上厲精于治深恤民隠往者綸言之布首以均役法為重務所以寄是責於百吏者勤切且至是以邇者建議之臣獻官民户均差之法田之制也以官品為之限而富强之家與其子若孫俱不得以肆其姦真良法也然一法立一弊生田以官品為限固也為之子若孫則減其半且家得十頃若十子均之則人得其一過是數亦役矣逮夫子又生孫孫又生子數十載之後支分派别則一頃之數均為數十家未艾也是則有官之子孫俱不免於役富厚者連阡亘陌亦與前所謂十頃家之子孫流轉均差是何富者之佚而官户之子孫勞役無已耶是法一行則中下之家皆將碎其産而不可復全又何取乎均役為今欲使官户中産之家與富者流轉均差之法行之悠久而無弊必使公家不乏事人情無怨咨如之何則可不然則官雇募之法義役之法亦可行乎君子之學貴通時務試條陳之母畧府兵之制問鄉遂之制泯然後齊以内政顯内政之法壊然後唐以府兵聞鄉遂内政遼乎邈矣獨府兵為近代之良法蓄材待事於居處教養之日荷戈力穡於倉卒有警之時志史者謂其得古大意信乎其得古之意也然嘗考之謂天下置府八百所而闗中五百此陸敬輿之說也内以十六衛蓄養戎兵外開府五百七十有四此杜牧之說也二子唐人也所論異同如此志唐兵者乃言置府六百三十有四而闗内二百六十有一則又與二子之言大相戾矣其說當孰從歟自夫以彍騎代府衛其弊乃至於不能受甲為之兵者疑若有百奔無一前矣然肅宗之復兩京李郭之平巨盜非復曩時師也而又以成功何耶若然則府衛未必是而彍騎未必非也徳宗慨然有復古之意詢計於李泌者至於再三自其募戍卒耕荒田之䇿行而願耕者十五六請以府兵之法理之似亦可復矣而竟無成功至李徳裕帥劔南家鳩一壯卒緩農急戰號為雄邊子弟則與府兵之法果相逺乎徳宗不能行之於天下而徳裕之區區乃能行之於一路又何耶聖上經畧中原修明軍政御便殿而閱武士詔郡國而選車徒而邊庭戍役則又遣夫禁旅之良貔貅百萬莫匪精强威靈氣熖固足以折遐衝歸侵疆矣然雲屯萬竈張頥待哺者嗷嗷大農饋餉日以不給聞為國逺慮之臣思所以為足兵食之計未得也儒者之學貴通時務其可無說處此乎聖上聰明英武逺過太宗其設施注措嘗欲以太宗為法寓兵於農之制亦可次第舉而行之否今兩淮之民名籍𨽻於官而號為民兵者嵗不知其㡬監司帥臣教閱以時朝廷又間遣使臨之以問其疾苦兹豈徒為文具說哉竊以廟議必將有以用乎此也夫民既𨽻籍以為兵則無事而耕有事而戰亦古制也今欲使之與戍卒耕閑田而無黽勉不得已之意目前之利既足以省運漕而足兵食嵗月之久又可因以理府衛之法是說其果可行乎不然則置屯田者亦能省度支錢二十萬開營田者亦能嵗收粟三十萬斛顧何昔行之之易而今行之之艱耶諸友席珍待聘非一日矣願考古驗今詳究前所疑者併以可行之制為今日邊備獻母借聖言為解而曰軍旅之事未學也墾田問地遺利民遷業大患也無盛以迫之屋粟以病之夫家之征又深懲重困之古之農亦有不出於其所樂趨而必待上之法驅勢禁而後為之耶大司徒頒職事遂人教稼穯里宰田畯之屬又從而勞來勸相之古之吏其誠於為民耶抑亦奉君之意而不得不爾也漢世設力田之員除農民之租而太倉腐紅不旋踵而效形於公私哀痛之餘後周之時蠲官牛之輸租賜田廬為永業而地利數倍之獲未㡬而利於葺屋植木之後夫用力於戞戞乎之初而計功乃如桴鼓之速豈亦法意俱善而然耶抑民之自勉歟其毋乃長吏奉行之䖍出入阡陌有以勸率而然也今之淮楚荆襄與夫湖廣間沃野綿亘不知㡬千百里然禾黍之地鞠為蒿萊肥饒之壤蕩為荒穢耕夫過之掉臂不顧何耶意者土未加辟豪强操契劵以攘之禾未登場有司履畝而稅之農之捐種糧躬襏襫霑體塗足終嵗勤動曽不得粒粟以實其枵腹勢凌虐征已紛乎其前為吏者且漫不加省農亦何苦自納諸罟擭䧟穽而莫之辟也是無惑乎田野不辟家給人足之效蔑如也聖天子力本務農勤懇切至近有以官莊田利病為言者帝且温顔顧問次第行之况淮楚荆襄湖廣之閑田未耕者乎竊意聖心攸屬無日不注想於是也議者謂曩嵗持荆湖節者嘗援乾徳故典請于朝欲見佃者止輸舊稅開墾者永不通檢而安集招誘則責之長吏帝㫖俞允俾其告計搶奪者不容理用心勸誘者議旌賞夫惟利是狥人之情也狹鄉之民駢肩側足以爭㝷常一聞此令其誰不樂趨階書勸農吏之職也旌賞之渥且不忘其功一聞此令其誰不加勸將舉是說飭有司力行之不識可乎昔河南尹招流散而除租稅始也居民不盈百户終於野無曠土荆南留後撫凋殘而課農桑始十有七家終於民冨軍贍兹又勸農之效彰彰者今欲命令之孚而奉行者不視為虚文民吏之相習而安於田畝無狼顧之慮冨給之利上躋周漢不特有河南荆南之風以無負聖上重民事之意蓋有故焉諸君通世務胸中豈無定論考古驗今併陳之母畧
