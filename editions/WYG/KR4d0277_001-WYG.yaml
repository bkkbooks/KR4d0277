body:
  text: 客亭類稿巻一宋楊冠卿撰四六編一表賀皇帝尊號表孝養東朝方奉巵而為夀道尊太極爰鏤玉以陳儀喜溢三宫歡騰萬國臣某中賀恭惟皇帝陛下克繩祖武允恊帝華繼眀以照四方茂衍邦家之慶相授而守一道率先愛敬之規謂大任生此周王故文命承於虞帝爰極形容之美以彰歸報之誠於聖徳其何以加自生民以来未有臣逢時嘉㑹阻逺眀庭登顯冊以揚鴻休方慶母儀之盛介繁禧而緝純嘏更祈帝祉之増代賀皇帝尊號表奉巵為夀肇舉慶儀鏤玉揚休載崇顯號補百王之墜典溢四表之歡聲臣某中賀恭惟皇帝陛下愛敬事親聰眀協帝念天髙地厚雖莫盡於形容而父尊母慈宜益彰於歸報䖍諏上日丕闡彌文簡冊増華典謨未有臣屬采薇之遣戍司細栁之留屯萬夀無疆莫預龍墀之賀百拜稽首敢伸鰲抃之恭冊命皇后代賀太上皇帝表詔錫慈闈厚人倫而正始禮嚴顯冊申帝命以揚庭宗社増榮邦家永頼臣某中賀竊以二南之化雖繫於一人兩儀之生實原於太極大哉神聖得此繼承方將隆内治之功其可後中闈之選恭惟尊號皇帝陛下基圖授舜聰眀似堯謂王假有家以行有恒言有物而天作之合在渭之涘洽之陽從龍亦既有年配極莫先其徳久已孚於衆志兹式正於徽名臣嘉與連簮具宣眀訓羣臣皆稱萬嵗雖阻陪前殿之趨五日一朝上皇祈永膺四海之養賀皇帝表王假有家天立厥配以儷尊於宸極爰錫命於帝庭衆志具孚率土咸慶臣某中賀竊以治欲隆於三代教必首於二南况當鷄鳴問寢之朝宜有闗睢正始之后恭惟皇帝陛下徳侔天地孝通神眀備九州之品以事親簡六宫之賢而佐餕衣無曵地既克著於儉勤寶畀範金庸誕敷於典冊宗祊有喜神人是依臣仰戴隆施欣聞盛舉朝未央而為夀雖莫稱萬夀之觴賡太姒之嗣音願繼上百男之頌謝太上皇帝表執戈衛社蔑有㣲勞錫命自天遽膺殊渥循墻莫避揣已奚勝臣某中謝伏念臣誤辱眷知久提禁旅惟天子羽林之士實王官武備之儀不教而戰是為棄之先事而慮斯謂勇也仲冬大閲肆選練於車徒六郡良家因講習於戰陳君所命爾臣何力焉敢期帝訓之敷俾正兵團之任兹盖伏遇尊號太上皇帝陛下規模宏逺道徳安彊耀神武以事折衝不争善勝貽孫謀以燕翼子垂休無窮故雖一介之臣亦拜非常之寵臣敢不勉策駑蹇思稱龍光移軍以復兩京或陪廟筭置酒而樂前殿願覩慶儀天申節賀表處黄屋以非心降年彌永奉玉巵而為夀曠典肇脩當誕月之載臨宜率土之咸慶臣某中賀恭惟尊號皇帝陛下功成不宰道極難名問至精以遂羣生自得崆峒之妙乗兩儀而御六氣孰窮姑射之神與造物以俱逰雖後天而不老臣馳心魏闕請祝聖人以八千嵗而為春方衍無疆之筭歌萬斯年之介福更申善頌之恭天申節謝賜香表川増栢茂衍慈極之修齡玉潤金堅拜御爐之珍賜臣某中謝恭惟皇帝陛下聰眀作后愛敬事親尊太上皇舉盛儀於漢殿祝聖人夀騰歡頌於華封當星渚之儲休聲羽林而致禱詔傳中侍寵畀寶薫郁郁紛紛與慶雲而協瑞穰穰簡簡来景福以延休臣謬典周廬親承睿渥恩被動植已洽舜孝之隆馨感神眀益慶堯年之永代天申節滿散謝賜香表貝葉飜經方控後天之禱寶奩錫瑞特頒南國之珍歡動羽林聲呼崧嶽臣某中謝恭惟尊號皇帝陛下基圖授舜聰眀似堯協氣薫為太平所施者博大徳必得其夀永孚於休誕彌咸慶於薫脩䞉馥敢希於沾丐兹盖伏遇皇帝陛下謀謨善述清净無為五日一朝恪謹宸廷之養萬有千嵗益祈帝祉之増以一瓣香供無量佛臣敢不對揚休命請祝聖人治馨感於神眀已介無疆之福國夀等乎箕翼更隆不拔之基㑹慶節賀表惟天祐命長發其祥既聖與仁必得其夀臣某中賀恭惟皇帝陛下乾坤合徳厯數在躬如文景之儉以濟民心存兼愛有禹湯之眀而養性道法自然方星渚之流輝宜華封之請祝自今其始於萬斯年臣戍守淮壖心馳魏闕作誕聖繼天之樂雖莫效於唐臣歌宜民受祿之詩願載􅆳於周雅㑹慶節謝賜香表王人寵逮命畀寶薰帝祉増崇歡騰羽衛臣某中謝恭惟皇帝陛下至誠不息眀徳惟馨形聲格天地之和神聖極古今之盛誕彌厥月長發其祥於萬斯年莫知其紀錫御爐之芬郁横協氣以氤氲臣職忝周廬嵗沾䞉馥以香而作佛事既叨君賜之榮稽首而揚王休敢祝聖人之夀代㑹慶節滿散謝賜香表慶集北宫衍脩齡於慈極詔傳中侍錫寶炷於尚方喜溢周廬聲呼崧嶽臣某中謝恭惟至尊夀皇聖帝陛下脱屣萬乗冠徳百王蕩蕩巍巍其有成功宻運至神之化鬱鬱葱葱而占佳氣適臻彌月之祥䖍披貝葉之文忽拜御爐之賜茲盖伏遇皇帝陛下繼治同道篤志事親重華協帝自唐虞於斯為盛化成天下雖詩書所述何加爰以妙真香俾祝聖人夀臣敢不下拜登受稽首對揚治馨感於神眀巳格太和之效帝祉施於孫子更隆奕世之休賀太上皇帝聖夀七十表心非黄屋膺萬夀以無疆懽奉玉巵罄四方而来賀若稽載籍盖未前聞臣某竊以澹漠無為者形乃長生聖神廣運者夀斯必得况脱屣於萬乗獨冠徳於百王心與造物以同逰年雖巧厯而莫計恭惟尊號太上皇帝陛下舉綱命舜成功似堯精一執中清静寡欲訪崆峒之子問至道以遂羣生凝姑射之神乗兩儀而御六氣將見後天而難老豈特從心而不踰有永之年自今其始臣夙叨教育兹幸際逢稽首而揚王休雖莫陪於虎拜請祝而綿聖夀敢竊效於封人慶夀禮成肆赦代賀太上皇帝表聖人因親教愛肇舉慶儀皇極歛福錫民式敷帝訓凡曰含生之類悉霑慈極之仁臣恭惟尊號皇帝陛下徳冠百王夀髙五帝鴻名掀揭昭乎日月以並眀巨典恢張編之詩書而無愧兹迓春祺之吉益祈寶筭之増将金奏以充庭奉玉巵而為夀恩覃四海慶洽兩宫臣適際昌期親逢盛典方千里者九已躋仁域之安呼萬嵗者三更效嵩髙之祝太上皇帝夀八十繳進慶聖夀雅歌表夀臻璇極丕御常珍慶洽中宸交騰善頌欲紀形容之盛敢伸揚厲之誠臣某竊以順帝則而不知謡載康衢於禦冦請聖人而使夀語𫝊封祝於䝉荘故凡大徳之有容或取下臣之歸美矧惟盛舉卓冠前聞編之詩書自開闢以来未有見於歌詠非文學其誰宜為尊號太上皇帝措世隆平宅心廣漠訪崆峒之子問至道以遂羣生凝姑射之神乗兩儀而御六氣甲子方周於五百春秋逺邁於八千無疆惟休自今以始恭惟皇帝陛下聰眀作后愛敬事親與舜同符業業日致其孝以堯為父蕩蕩民無能名聖治益新天休滋至肆登崇於顯號旋修舉於上儀奉萬年之觴方深抃蹈奏九成之樂宜有聲詩慶夀禮成肆赦賀皇帝表慶展九重茂著事親之實恩加四海爰推錫類之仁亘古未聞于今獨見臣恭惟皇帝陛下躬全舜孝性本堯仁歛福錫民期誕敷於帝訓為酒介夀咸祗迓於春祺禮文昭舉於闕庭恵澤徧周於區宇由中及外式舞且歌臣濫戍邉郵恪居官守奉巵而樂前殿雖莫賛於盛儀立春而下寛書幸親逢於慶典紹熈改元代賀皇帝表麗正化下式謹王春定朔改元誕敷帝訓遵兩朝之景爍溢四表之歡聲臣某中賀竊惟三聖之繼興本繇一道以相授思陵恢紹復之業既闡宏規今皇致雍熈之和益隆丕祚宜龍飛之顯號集鳯紀之大成恭惟皇帝陛下厯數在躬聰眀協帝嗣無疆之服受祉既多綿卜世之期自今其始法五要以正事合三統而定名臣謬領守符親承詔旨春朝之會百辟莫造鴛行神筴之増萬年惟深鰲抃冊禮賀夀皇表挈神器而與子尊奉慈闈登顯册以揚休舉行曠典若稽於古莫盛於斯臣某中賀恭惟至尊夀皇聖帝陛下薦禹於天行堯之道脫屣萬乗雖詩書所述何加冠徳百王自開闢以来未有益謹東朝之養鼎新長樂之規揆日陳儀奉巵為夀臣仰禮容之甚煥慶嘉㑹之難逢巍巍其有成功巳協帝華之盛怡怡而奉太后更歌聖徳之詩代都統司重眀節賀表相授而守一道神聖為君繼眀而照四方温恭恊帝誕彌厥月長發其祥臣某中賀恭惟皇帝陛下徳合乾坤行髙今古丕基並授有大而居域中休命誕膺麗正而化天下於赫離眀之象益昭火徳之符光五三六經載籍之傳慶億萬斯年受天之祜臣分戎閫阻簉班庭曰夀曰富而多男竊效華封之請祝卜世卜年而過厯更祈周鼎之延洪代馬軍行司重眀節賀表有大而居域中繼眀而治麗正而化天下協帝之華當彌月之甫臨宜率土之咸慶臣某中賀恭惟皇帝陛下聰眀時乂輝光日新重離以照四方無幽不燭三聖而守一道有永其傳長發之祥自今以始萬斯年而受祜其孚於休八千嵗以為春莫知其極臣謬司騎旅屬逺龍墀㑹前殿以稱觴莫預嵩呼之列祝聖人而使夀惟伸虎拜之忱代重眀節謝賜香表梵宇繙經祝聖神之睿筭寶奩錫瑞屹泰華之小山増煥羽林共深鰲抃臣某中謝恭惟皇帝陛下至誠不息眀徳惟馨薫協氣於太平之時躋斯民於仁夀之域星流電繞適臻彌月之祥玉潤金堅爰畀御爐之寶臣敢不祗承天寵對揚王休治馨之至感於神雖極太和之盛聖徳之大得其夀庸伸善頌之恭代謝賜對衣金帶表躋三衛之華祗承帝寵錫萬釘之寶賁飾身章揣已奚勝折腰知愧臣某中謝伏念臣身名弗稱才畧非長效楚制之短衣久居軍旅頒齊官之三服敢覬恩榮兹叨在笥之珍惟懼終朝之褫茲盖伏遇皇帝陛下聖神廣運賞罰至公垂衣裳而取乾坤已臻極治聴鼓鼙而思将帥爰示殊私臣敢不濡翼是憂書紳惟謹服之無斁益殫衛上之忠帶賜有餘常勵立朝之節代謝落階官表充員衛府久負空餐閲武郊圻遽叨懋賞恩深報蔑感劇涕零臣某中謝伏念臣猥以朴忠誤䝉眷簡執干戈而衛社覬收汗馬之勞援枹鼓則忘身未遂著鞭之願惟聖人有備無患謂天下忘戰必危親屈帝尊躬御戎服蒐乗補卒於輯睦之後治兵振旅於閑暇之時耀神武以折衝有常徳以立事如臣何力而帝念功榮頒一札之書盡略横階之秩兹盖伏遇皇帝陛下威加四海勇正萬邦克壯軍容笑驪山之不整爰驅轡馭陋細栁之徐行成禮而還推能於下臣敢不益抒愚慮仰答睿知備器械而選車徒協贊規恢之舉謁寢園而清宫禁庶圖克復之勲代謝除淛西總管表守戍淮濆久積素餐之咎總兵淛部尚叨眀詔之除退自省循莫知報稱臣某中謝伏念臣性愚不頴器窳亡庸性有孤忠凛如皎日立功名而安邉境既乏能稱嚴誅賞以馭臣隣宜加顯罰敢期易命遂許投閑兹盖伏遇皇帝陛下寛裕有容神武不殺故雖疵戾弗忍棄捐錫以優恩徙之近地臣敢不益堅晚節仰答殊私收之桑榆或奮澠池之翼靖夫區落願焚老上之庭
