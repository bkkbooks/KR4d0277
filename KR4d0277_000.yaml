body:
  text: 提要客亭類稿十四卷别集類三宋臣等謹案客亭類稿十四卷宋楊冠卿撰冠卿字夢錫江陵人宋史不為立傳陳振孫書録解題載有此集而亦不詳冠卿之始末故事迹無可考見今以集中詩文參互考之劉季岑手帖云紹興初假守南徐楊君季洪為理椽後三十年見其子夢錫則冠卿為季洪之子其紀夢詩序云戊戌年四十戊戌為淳熙五年上推四十年則冠卿當生于紹興八年巳未其與傅漕詩有鄉書憶昔獻賢能姓字曽叨天府登句則嘗舉進士其上執政啓云奉命領州奪符而歸又有祭廣東主管衙土地文則嘗出知廣州以事罷職而薑夔贈冠卿詩有長安城中擇幽棲靜退不願時人知句則解官以後又嘗僑寓臨安者也其集世頗罕傳惟浙江採進書中有舊刋客亭類稿為巾箱小字本檢勘尚係元刻分四六編雜著編古律編皆所作詩文惠答客亭書啓編則同時名人酬贈之作不標卷數前後亦無序跋而永樂大典各韻內所收冠卿之文尚有表箋詩餘各數十首皆刋本所未收疑當時本各自為編流傳既久遂有闕脫今據永樂大典所載以刋本參校搜輯補綴諸體始全謹仿原編名目釐為十四卷而惠答書啓編則刪之冠卿才華清雋四六猶流麗渾雅張端義貴耳集載其館九江戎司時趙溫叔罷相帥荆南道由九江守相合宴冠卿作致語云相公倦台鼎喜看繡衮之東歸潯陽無管弦且聽琵琶之舊曲溫叔冉三稱道知其以是體擅長矣又京鏜何異李結諸帖極稱其集杜之工而藁中乃無一篇則必其時有别本單行而今佚之矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:dc7dc4b141231da26354bfa0f7af16ec627a5a6848828dad66d77bf13e6ffa4a
