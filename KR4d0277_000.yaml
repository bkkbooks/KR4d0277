body:
  text: 提要客亭類稿十四巻别集類三宋臣等謹案客亭類稿十四巻宋楊冠卿撰冠卿字夢錫江陵人宋史不為立傳陳振孫書錄解題載有此集而亦不詳冠卿之始末故事蹟無可考見今以集中詩文參互考之劉季岑手帖云紹興初假守南徐楊君季洪為理椽後三十年見其子夢錫則冠卿為季洪之子其紀夢詩序云戊戌年四十戊戌為淳熈五年上推四十年則冠卿當生于紹興八年巳未其與傅漕詩有鄉書憶昔獻賢能姓字曽叨天府登句則嘗舉進士其上執政啟云奉命領州奪符而歸又有祭廣東主管衙土地文則嘗出知廣州以事罷職而姜䕫贈冠卿詩有長安城中擇幽棲静退不願時人知句則解官以後又嘗僑寓臨安者也其集世頗罕傳惟浙江採進書中有舊刋客亭類稿為巾箱小字本檢勘尚係元刻分四六編雜著編古律編皆所作詩文惠答客亭書啟編則同時名人酬贈之作不標巻數前後亦無序䟦而永樂大典各韻内所收冠卿之文尚有表牋詩餘各數十首皆刋本所未收疑當時本各自為編流傳既久遂有闕脱今據永樂大典所載以刋本參校捜輯補綴諸體始全謹仿原編名目釐為十四巻而惠荅書啟編則刪之冠卿才華清雋四六猶流麗渾雅張端義貴耳集載其館九江戎司時趙温叔罷相帥荆南道由九江守相合宴冠卿作致語云相公倦台鼎喜看繡衮之東歸潯陽無管弦且聽琵琶之舊曲温叔冄三稱道知其以是體擅長矣又京鏜何異李結諸帖極稱其集杜之工而藁中乃無一篇則必其時有别本單行而今佚之矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:21ad9be0aa069b1b04ad2e819d60503218138a243639da6a65d80495a5af9e9d
