body:
  text: 客亭類稿卷十二宋楊冠卿撰古律編二古體詩天孫徠原注以下四首上趙丞相珠宫貝闕天女孫膠轕璇璣緯星辰徠遊河漢儷于神神儲嵩嶽生甫申胸中文字覷天巧黼黻帝躬臨下民平郴蠻孽狐鼪鬼嘯篁竹紅綃帕首郴江曲萬牛臠炙甕行酒黨伍穰穰萃林藪牙璋夜半起兵符雲旗驛騎爭馳驅搜原剔藪殱渠魁巢顛子覆苕葦枯虎臣獻凱錫圭組玉帛金錢充棟宇追蹤漢相不言功山河帶礪傳無窮祀明堂總章備物嚴秋饗尊祖合祠規汶上宰臣恭肅相明禋精意潛交通肹蠁殊庭朝薦燎煙升隂雲駮落天日明百神駿奔風馬下休嘉協應年穀成除關征翠華憶昨臨吳津駕言直欲蘇逺民三尺土階茅不剪舜循堯道慈而儉姬公制國有常經什一更除關市征男耕女織餘布粟却笑二吾猶不足天孫吟天孫黼黻文膠轕璇璣外大巧本無為女工卑組繪胡為小兒女纓辨雜環佩庭羅􅊡餌香設祠祈且拜臨池五綵絲更結相連愛仙遊迢迢秋夜長娟娟霜月明隱几觀萬變俯仰周八紘人問厭謫墮翳鳯騎長鯨寥天排雲征髙步撫流星羣仙羅道周有若相逢迎旌羽絇虹霓環珮鏘蔥珩問我來何遲㩦手上玊京陛級扣靈瑣班聮簉紫庭緑章奏封事清問殊哀矜飲之以雲腴錫之以瓊英下拜亟登受倐然雲霧興杳不知其所變化無留形俄頃雙青鸞銜箋報歸程望舒肅前驅徒御了不驚歸時夜未央仰視河漢橫天風西南來隱隱笙竽聲鈞天認帝所昨夢愴難成從李使君假記室吏阿㜷嘔心兒佩囊有奚奴杜陵短褐翁抄詩聼小胥我生味風雅古人思與俱家無儋石儲誰其供指呼主翁居專城鴈鶩紛庭除記史飽餘間願言假一夫授以烏絲襴副之玊蟾蜍晴忩掃桐葉細字蠅頭書倚梧歎白首寄人間萍泛無休日撑腸五千卷豈乏濟時術富貴不可期惆悵難再述日暮倚庭梧寒風聽蕭瑟懷古干將補敝履鉛刀割全牛千金市駿骨鼓車役驊騮薛燭巳云逺伯樂不可求此理難致詰吾其賦歸休冬十月百卉盡芳淳熙戊戌冬十月恰似東風三月時氷霜不變沍寒色溪壑次第回春姿花情柳意巳無耐紅英粉艷爭紛披道傍牛喘不復問欲了公事真癡兒麻姑山東涉千堆壠至射亭宿黃氏新館姑山鎖靈壇千阜如堆玉山回路轉間射亭見新築主人雅好事借我南忩宿一夢到無何夢覺黃粱熟别鄭大用于潯陽子真千載士流風凜然存襟期輩古人喜見雲礽孫客裏青燈連夜語痛飲忘形到爾汝掀髯一笑倚胡床浩歌赤壁凌雲句楓葉荻花秋送客令人愁挽君君不留今日具扁舟我欠蓋頭茅一把何時去結雞豚社澤畔行吟醉復醒共看屬玉雙飛下辛丑殘臘前一日扁舟東歸阻風馬當乞靈祠下維舟桑落洲十日風和雨雨餘江波平山橫眉黛嫵急呼黃帽郎來扣靈真宇椒桂薦芳馨魚龍忽掀舞巨浪拍天浮萬疊震鼉鼓淮洲十里間蜚楫不可渡三老前跪陳珍貝非神豫願言點歸裝勿為神所怒我生窶且貧窮途一羇旅照乘乏明珠落霞有佳句稽首謝龍君放我扁舟去壬寅夏五月將治嚴陵之裝欲用李長吉故事買奚奴負詩囊以歸呈谷隱趙使君少年學書劒矯首睨八荒閶闔記昔遊霞佩髙頡頏一跌下青雲意氣久不揚乞取平頭奴提㩦古錦囊歸釣富春瀨濯纓歌滄浪壬寅仲冬晦日同吳監丞遊延祥宫延祥蓋和靜所居也霜日炫晴晝湖光掠眼明散䇿事幽討出門聊意行柳塘和靜居宫殿若化成霞裾赤城仙笑語相逢迎雲腴飲甘液琅函披內經趺坐縱名談妙處俱忘形須臾啓靈鎖臺沼列萬楹徑路通深杳宫花不知名石泉鳴佩環松篁奏竽笙倣佛如鈞天音韻鏗韺䪫吾皇香案臣筆力雕陽春危亭倚髙寒意氣干青雲飲酣視八極神馳白玊京日月看跳丸羲輪忽西傾歸來十里塘問訊江梅英斷橋流水香一枝疏影橫煙淡月昏黃清於玊壺氷錦囊搜好句山阿紀前盟填維揚原注以下四首投中隱古人肉食無逺謀腰錢騎鶴向揚州春風十里珠簾捲但看竹西歌吹樓天朝選用詩書帥上策公言須自治屏翰堅持保障功江淮益壯金湯勢強敵不敢縱南牧關塞煙迷芳草緑兒童歌舞樂升平一曲梅花細栁營都作院天子除戎戒不虞修車偹器會東都羽林憶昨厭弓矢剡木弦弧兒戲爾我公號令何精明武庫森嚴耀五兵威震天驕奠京邑繇漢以來真鮮及春大閲波澄青海無傳箭我公獻納紆皇眷修嚴武備選車徒天下雖安不忘戰車如流水馬如龍甲耀日兮旌蔽空攙搶熒惑不敢動獨任朔方無限功天威震疊軍聲壯會見龍庭焚老上燕然碣石與天齊為公重勒千丈碑御書東坡雪詩石刻殘更皎月垂半破西鄰促席寒威挫風流玊局老坡仙雪夜清吟躡郊賀流落人間古錦囊帝恐天丁下取將賡歌餘暇染宸翰奎壁昭回龍鳯翔我公稽首拜嘉惠勒以堅珉貽萬世捲旗擬入蔡州城傳呼夜示吳元濟謝人惠油炭青藜照天祿寶炬分金蓮榮遇不可期膏火徒自煎檠短無餘輝囊空無留錢一燈假鄰壁三冬廢塵編殘膏許沾丏繼晷欣窮年隂崖冷徹骨榾柮殘無煙號寒氷氏子炙背思負暄主君惠窮途施豫無所偏爐分天地春力奪造化權和氣與俱遊死灰欣復然楚有􆃤菜色潔而味辛夜對吳監丞飲飲酣薦之以此恍然如在湖湘間山澤有臞儒骨相無食肉平生藜莧腸愧負詩書腹碧澗掇香芹雕盤堆苜蓿艱苦謀一飽未免窮途哭君今食萬錢肥甘非不足味厭五俟鯖嘉蔬列瓊玉云自楚中來芳辛有餘馥一笑下筯空鯨飲薦醽醁吟餘詩思清如行湘水曲湘君不復見直欲跨黃鵠甲辰季冬殘臘大雪主人以糟玉面貍及尊酒為餉南山白額虎暴戾日以滋納諸罟獲中食肉寢其皮文貍外柔順玉面而豐肌與世了無忤奚亦遭危機得非風味殊尊俎之所宜焚山獵獸者是以羅致之主翁厭肥甘鼎食嗤羣兒殷勤築糟丘遣送持酒巵于時臘將殘雪花一尺圍玊樓寒起粟墨突晨未炊得酒且大嚼勿令兒輩知唐劉雲有所思云玉井蒼苔古院深桐花落地無人掃因用其語集古句次韻西征登隴首薄暮有所思所思鬱不見殘雲傍馬飛逢迎少壯非吾道百壺且試開懷抱黃帽青鞋歸去來桐花落地無人掃謝石佛璉大禪人生天地間百年如逆旅榮華風中煙富貴草頭露得喪能幾何俯仰即今古師具正法眼與人一線路紛紛輕薄兒誰解點頭句冥行方索途空滿户外屨我提沒底籃採藥空山去覿面偶相逢舉手便分付彈指了三生無去亦無住寄逺曲用唐人張籍韻江南淡蕩煙波暖蒲萄渌漲春江滿日暮汀洲採白蘋芹牙出水蘭心短美人去矣隔湘江誰其贈我明月璫癸丑仲冬十日蚤晴從中使過蓴湖未幾風雪交作黃岡之北蓴湖東湖光萬頃磨青銅樓船東下佽飛集牙檣十里旌旗紅魚龍震疊馮夷宫雲容倐忽變晴空鬖髿振袂玉妃舞雪花撩亂穿疏篷泊舟富池乞靈祠下大江東南來馮夷此其宫羣山各獻狀奔走如遊龍將軍萬人傑智勇摧姦凶草木知威名旗常紀豐功廟食填兹土樓閣何穹窿我來拜靈祠紅日方曈曨神烏集飛檣雪波捲晴空椒桂薦芳馨精誠冀感通謂言身半百扁舟吾欲東羞作賈胡留願借一帆風題郭季寬曉耕宿釣二圖牛角橫素書春犂破朝雨鴻鵠志安知功名心自許羊裘晦山澤貂蟬等鴻毛直鈎道可行一釣聮六鼇栖霞髙士以詩鳴于時方幸締交而赴玊隆之請鶴馭西去挽之不留臨岐告别為賦二詩大雅久不作正音寂無聞金門栖霞仙𣲖續修水濆學海障鯨波筆力扛龍文我誦錦囊句十年思見君相逢一杯酒和氣蒸春雲去我鼻端堊君其揮郢斤蛟窟蕩羣妖霞帷快飛舉橫江餘鐵鎖中流屹砥柱主人謫仙人道學侔千古紫皇香案前棹頭不肯住亭懸孺子榻簾捲西山雨雞犬許同升我欲騎鯨去公無渡河并引古樂府有公無渡河篇從昔詩人賦詠俱與本意不相侔余謂翁之勇於渡河者特以一壺之力為可恃遂冒險而不之恤曽不知壺之力甚微而河之險不可玩終遂致於淪厥軀茲亦可為後世鑒矣因原其指為作數語用以自警云河流決崑崙微禹其為魚龍門雖巳鑿犀栧孰可踰老翁披髮鬢如絲臨流欲渡將何之嫗止翁留翁勿渡翁不嫗從捨之去中流憑一壺意謂千金俱一壺勢莫支千金淪其軀壺兮壺兮翁之鼉吼鯨吞方得意曲終哀怨寫箜篌鄰女為君雙墮淚以浯溪磨崖頌為友人夀明皇蠧孽妖顛倒由祿兒真人奮靈武羣公任安危笑談收兩京鑾輅還京師廟社喜重安鐘簴曽不移詞臣有元結歌頌鐫浯溪余生千載後每恨不同時半世看墨本長哦山谷詩鳴劔馳伊吾有客噤未施十年客衛府斗粟不療飢君今聮上閣婉畫贊籌帷眷簡隆三宫復始可指期持以為君夀勳名書鼎彛明年奉漢觴重修前殿儀摩挲古崖石更記中興碑嵩髙詩為九江趙使君夀嵩髙維嶽美良守趙公也公以周召間平之才斂大惠于定江越九月政成民和課最南國生申盛旦歌舞誦詠者溢于塗門下貢士揚冠卿揆骫骳蕪陋不足以形容公之盛也採托古詩語韻而歌之九頓首以薦公夀嵩髙維嶽四方之極維嶽降神生此王國綿綿瓜瓞莫莫葛藟周公之孫齊侯之子柔惠且直小心翼翼王親命之南國是式盡瘁以仕不懈于位四方于宣南國之紀之綱之紀允文允武荆舒是懲四方無侮旱既太甚以祈甘雨零雨其濛介我稷黍黍稷彧彧去其螟螣實維豐年我庾維億萬億及秭物其旨矣此邦之人云胡不喜周邦咸喜式歌且舞于時語語厥聲載路其告維何自今以始俾熾而昌既多受祉永錫難老眉夀保魯以佐天子為周室輔我來自東小大稽首是用作歌以介眉夀嵩髙維嶽十二章章四句
