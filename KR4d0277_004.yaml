body:
  text: 客亭類稿巻四宋楊冠卿撰四六編四啟代賀左丞相王冀公啟伏審廷敭大號位冠元台選衆而舉臯陶雖上心之簡在夢帝而賚傅説亦天意之協從揆路増華巖瞻益峻恭惟某官斯民先覺命世大才文章黼黻而日新道術淵源而海富敬王如孟子非仁義不陳於前告后若君陳有謀猷乃順于外蚤際千齡之運徧儀兩地之華徳以施惠刑以止邪無競維烈文能附衆武能威敵克壯其猶基立太平修和有夏十年而至宰相一徳以享天心撫五辰而庶績凝錫九疇而彛倫叙清淨寜一燕基緒於無疆道徳安强措甲兵而不用方將薦勲烈於清廟朝辟公於明堂天子恨無官可醻吾君欲舉國以聽乆積處中之望爰膺虛左之求建為上公啟冀國封彊之舊總領衆職昭鼎司命數之隆一新衮繡之儀増重旂常之載蓋周公有勲勞於天下遂䟽曲阜之封若阿衡實左右於商王乃謂聖人之耦惟公懋徳與古匹休聲名千載而並馳事業殊時而一致由中及外式舞且歌某乆荷生成欣聞播告河如帶而山如礪方觀封爵之崇筆成冢而墨成池莫紀勲庸之盛聊貢得賢之頌少伸賀厦之私喜溢于衷言不盡意又賀右丞相梁儀公啟伏審廷告羣工朝登碩輔人惟求舊雖帝意之所孚民具爾瞻亦師虞之攸屬廟堂増重海宇䝉休恭惟某官寛大而裕和閎深而肅括致主以孟軻之道非堯舜不敢陳於前犯顔髙汲孺之風雖賁育弗能奪其勇頃宅百揆備罄逺猶立一事必曰因民之情進一言必曰稽古之訓以奬㧞賢能為當務之急以修明政敎為致治之原凡所罷行審其思斁朝夕納誨莫非啟沃之忠上下相安宜無苟且之意躋民仁夀措世隆平方言聽而計從乃功成而身退帝念一日不可去良弼公其髙卧何以慰蒼生雖云倡牧以阜民曷若代天而熈載趣介圭而入覲當宣室之受釐遭時遇主而䇿萬世之長脩身治國而獻六言之要當於上意至歛袂而動容置之巖廊遂疇庸而申命詔還舊柄建為上公錫以山川土田作乎股肱耳目屬季秋之大饗蕆熈事於明堂乃眷宗工俾兼使領昭事上帝聿懷多福既資顯相之勞緫領衆職練核羣臣允賴弼諧之益蓋賢臣之用舍係天下之重輕昔裴度還朝尚致兩河之率服周公復相亦聞四海之是皇矧夫神聖之謀謨濟以乆大之徳業方懋非常之舉以永無窮之基鼎鼐一新旗常增煥某鑪錘舊物簮履後塵睽違六符頫仰十載竿牘浸踈於記史夢魂徒遶於宮牆兹聞顯冊之頒喜遂大鈞之託望相君翹材之館雖莫綴於賀賔上聖主得賢之篇敢敬陳於嘉頌代賀左相王冀公啟伏審朝陞宰輔位冠公台親結主知在廷無出其右自任天下得君如彼其專此古所謂社稷臣其閒必有名世者慶流寰海喜溢儒紳竊惟帝王之朝莫盛虞周之際禹臯居左右而輔舜雖翼亮之匪殊姬召為師保以相成於名稱而則異蓋天道尚左有以左為貴故人主論相其於相亦然宜叡聖之有臨於古訓而是式夢帝賚良弼既納誨以代言建爾為上公遂疇庸而申命恭惟某官功熈帝載道覺民先規模由中古以還議論卑兩漢而下措諸事業皆夔龍稷契之所行發為文章有賈馬班揚之不逮蚤膺眷簡出應時須外焉著循良豈弟之稱内焉罄獻納忠嘉之益謀王體而斷國論在公固無甚難移風俗以厚人倫視古可以無愧爰自論思之禁掖進參宥密於幾庭耀神武以折遐衝享天心而有一徳樞柄直紫微之位炳四輔以騰輝靈旗收太一之鋒偃五兵而不試然念乆其事則可臨機而不惑知其要則可應變而不窮洊攽書賛於内朝表正使名於右府恩均宰路象應泰階以昭體貌之殊榮以示安危之注意旋宅百揆基立太平朝野歡娯華夏寧謐上而星緯明潤下而年榖順成鼓鐘竽笙方薦殊休於清廟紘綖衡紞復朝羣后於明堂天子恨無官可醻吾君欲舉國以聽命正乆虚之席詔陞左輔之尊封社圭腴開冀國山河之舊繡裳公衮彰鼎司命數之隆一新簡冊之觀増重旂常之載將見八百餘年之過厯邦其永孚于休豈徒二十四考之中書公有無窮之聞舉世所屬捨公其誰某夙荷知憐欣聞播告望相君翹材之館輒有冀於兼收上聖主得賢之篇敢先形於善頌惟深抃蹈罔既剡裁賀右相梁儀公啟伏審大政諮故老入覲于王舊徳為元龜爰立作相復還柄任益峻巖瞻蓋聞君臣必相與而後孚功業非偶然而可致田千秋一言寤意而相漢竟亦無聞姚元崇十事要說以輔唐乃能有濟惟規模之可乆與志慮之弗移故國是自定國勢自尊而治體以成治功以立苟或隨時而遷就何以措世於隆平此理亂之所由基宜古今因以為戒恭惟某官道尊而徳貴學粹而行醇惟前聖所行是師自中古以還不論頃宅百揆備恢逺圖知變法易政無定慮之亂大謀以聚議進計無成説之為深患大而要者既蚤正而素治詳而略者靡敝精而竭神用一賢則國皆曰賢責其政效之必成出一令則下皆稟令驗之人情而必合非天下至誠孰與此宜吾君舉國以聽焉方侯藩率從强畏而忠懷乃天道是循功成而身退雖曰介圭之錫命咸傒衮衣之來歸蓋裴度之䕶北門蠻夷君長必問天子之用否而司馬之歸洛邑遼夏使人亦及我公之起居故其再領平章則使夫戎敵皆畏威而自臣復相中國則感其邊吏無開隙而生事自昔賢臣之用捨實係朝廷之重輕矧夫操守之堅貞濟以徳業之乆大不動聲色挈神器而措諸安不勞師徒挫天驕而奪之氣方袖經綸之手逺臨侯伯之居中外冀望其用於朝聖神注想以待於上爰興嘆於當饋趣入對於受釐都民罷市而聳觀野老歡傳其再入宰相之職安百姓既人望之具孚春秋之義尊上公宜冊書之申錫屬攷紹興初元之詔再舉皇祐大饗之儀當先甲之肇禋緫前驅而領使紘綖衡紞倡羣后於明堂鼓鐘竽笙薦殊休於清廟神人懽恱宗社安榮然念望之乆則其應也難任之專則其責也重在三王之右而陳五帝之上豈俟空言立千載之功而建萬世之安當無遺筭庶康乃績亦永有辭某簮履後塵詩書餘習遭時遇主而建長䇿公方基於太平修身治國而獻六言愚請事於斯語用醻知遇少答生成心之精微文莫宣究代烏程宰賀湖守顔寳文啟伏審奏計南閩剖符近甸昔臨巖邑閭里猶勤於去思今布藩條襦袴競歌於來暮叨居蔭樾倍激歡悰惟呉興之名邦號浙右之道院帝城不逺適多南陽之近親治效未聞允藉西京之循吏庶幾以詩書禮樂而為政俾足於魚稻蒲蓮而不爭恭惟某官一善服膺而勿忘深造逢原而自得剛而有禮惟公言則萌於心信於其君反諸已而得其正頃以民社循良之最入居天子耳目之官一新儀注於容臺旋罄論思於起部謂膺眷簡進秉事樞乃寓直於中奎俾出將於使指特書異等之效兹有非常之褒申錫賛書易填藩輔先聲載路山嶽動揺東騎殿邦旌旗改觀矧平原之忠骾儼遺像於丹青如烈日嚴霜望之凜然其流風善政猶有存者縁奚斯頌魯之義諒有繼於前脩易元真泛宅之舟豈但親於細務第恐未黔於墨突已聞促治於曹裝某濫厠治民慙無政學跡雖逺於賔閣夢惟遶於宫牆方虞浮食而罔功何幸委身而受察地方百里顧閻閭疾苦以奚知我有二天喜風雨震凌之可免代賀潭帥黄樞密啟伏審力解鈞樞寵臨帥閫折衝萬里既嘗展於經綸偃息一方自不勞於談笑明命誕布歡聲沸騰况夙陪賔閣之遊奚敢後衆人之賀恭惟某官斯民先覺命世大才文章以孔孟為宗每下視班揚之輩事業陋漢唐諸子謂不能堯舜其君非仁義則不陳於前有謀猷則入告于内惟直身而行道不枉已以徇人雖畏塗欲起於風波而素履弗渝於金石單于適南下而牧宣王興北伐之師從西清次對之班進右府本兵之地自得師中之吉果收堂上之竒今皇帝移軍恢復兩京任舊人共政使宅百揆宜居四輔三公之列往專五侯九伯之征何成功而不居且抗章而有請帝念老成之去詔司屛翰之雄豈非將獨賛於化鈞於是必詳試以吏事泰山巖石詎久虛民具之瞻衮衣繡裳諒即播公歸之詠某漂流薄官骯髒餘生幼從郷里之小兒幸識海濵之大老天其或者我有遇焉負縣令之弩前驅兹逆行旌於異郡念吾黨之子狂簡尚覬先生之一言代莫幹賀廣東提刑龔正言啟伏審錫命宸庭觀風嶺嶠先聲所暨信山嶽之可揺不令而嚴知江河之莫犯凡叨蔭樾倍激驩悰恭惟某官斯文以為指南吾道之所寄命胷中浩氣曾不㸃綴於浮雲物外秋毫未始較量於末俗視功名為餘事守節義之大閑頃繇道家蓬萊之山進司天子耳目之寄痛姦回之在側盜名器以招權啟搢紳奔競之風紊朝廷清明之政攖逆鱗而諫謂宜鑒覆轍之車正兩觀之刑幾欲請上方之劒坐致金吾之落膽益隆鐵面之蜚聲旋聞奉常之除亟上封章而去放懷觴詠袖手經綸雖憸人欲鼓於風波而素履益堅於金石兹為蒼生而起來宣直指之威當道埋輪諒必誅於封豕援經折獄豈徒總於祥刑第虞墨突之未黔又促曹裝而入覲某關河墜緒籬落卑飛十五年困州縣之閒尚淪計幕數千里渉川塗之險來赴戍期顧蝸蠅之末所得幾何無田園之歸其窮至此況當内修外攘之際未免行齎居送之勞非有託於帡幪曷可逃於罪悔言如良藥願見枕中鴻寳之書禄必素餐免坐柱後惠文之法代李倅賀湖守趙徽猷啟伏審左符錫瑞東騎易藩宏開刺史之天益近長安之日異數優渥僉言允諧恭惟某官崧嶽儲神天潢毓秀文王之昭武王之穆莊公之子周公之孫處富貴而不驕雅知為善之樂通古今而有補尤髙博物之明憶昨請命於周俾侯于魯其治有異等之效以自結明主之知爰陞延閣之華更畀名邦之重非特遂過家之適抑以榮衣錦之歸歴考熙朝惟重長吏凡分二千石共理之寄必需五百年名世之英兹觀父子之並為實謂衣冠之盛事在彼無惡在此無斁宜臻令譽之攸終俾熾而昌俾夀而臧俱慶侯邦之永保第恐御屏之隔座靡容墨突之已黔某漫浪奚為侵尋且老南陽之勸耕興利昔親召父之賢霅間之泛宅浮家今作真卿之客屬有負薪之疾阻修維梓之恭小大從公雖莫聽鑾聲之噦中和宣化尚覬倣鹿鳴之歌喜溢于𠂻言不盡意代都幹賀平江守王待制啟倡九牧以阜民夙仰榦方之略衞中國而遣戍兹聨賔幕之遊雖分職以甚殊實事賢而為幸冒干齋斧庸貢吏函恭惟某官卓然公輔之姿加以聖賢之學上三道之要諸老生皆未嘗言塵乙夜之觀明天子所恨見晚亟上蓬山而寓直遂陞荷橐之從班屬詔羣工迭更外服謂申甫昔生於崧嶽而頗牧今在於禁林宣力四方汝為則予一人以懌保是南國錫以介圭逮潢池之弄兵有緑林之干紀爰起牙璋之旅命分玉帳之弓元戎十乘啟行罙入其阻王師大獻奏凱式遄其歸冝聞當軸而處中乃復擁麾而出守先一州而後天下在公固無甚難㑹諸侯而選車徒舉世孰尸其任願建乆長之䇿入恢宏逺之圖某漫浪一官侵尋半紀抱膝而唫梁父徒懷憂國之心擊檝而清中原未遂著鞭之願來賛樓船之畫誓然赤壁之舟聞分陜而得召公喜過江而見王導郤匈奴者七百里雖云賢過於長城擢毛遂於十九人或預請行之下客代賀蕭司諫除諫議啟伏審擢自諫垣首司言責大夫視上卿於列國位望益尊天子有爭臣者七人選用兹重知人善任非聖孰能恭惟某官性極誠明道參經緯郎官上應列宿初懷錦帳之香學者仰如泰山旋闡杏壇之敎爰書人主之言動進班宰相之㑹朝補闕拾遺有犯無隱故朝廷推為宿望欣聞諫議之得君謂天下必致太平咸簉延英而言賀眷方虚已以問政至或歛袖而動容既䇿陳萬世之長宜治冠百王之上公有無窮之聞邦其永孚于休某誤辱恩憐每勤宗仰斯民而使共理方叨符竹之分明主之登直臣切奉絲綸而喜其為慶幸罔既剡裁代陳監與常熟知縣啟去田畝而就吏禄濫司關市之征執手版而拜上官行覿宫牆之美欲布姓名之賤庸馳竿牘之誠恭惟某官心造道原識通世務休有令聞揚于清時若髙陽才子不隕其名在漢廷諸公無出其右來臨巖邑宣布敎條鳴琴而不下堂游刃而有餘地為晉國保障既已著於茂功拜褒徳侯封當遂受於重賞某夙勤仰徳兹幸依仁事大夫之賢儻官謗之能免報國士之遇豈私心之敢忘又與兵官啟十舍相望未見君子六聨合治兹同官僚敢以尺書布之下執恭惟某官氣剛而志烈聲蜚而實騰屈臨花縣之封坐息潢池之盜顧計畫有可采者未殫利國之謀謂將軍何以敎之行慶登壇之拜某浮家苕渚馳志伊吾安邊境而立功名莫遂長纓之請登龍斷而罔市利姑為斗粟之圖所期欵奉於誨言或可少逃於罪戾又與交代王監鎮啟覿宫牆之美未契夙心典關市之征兹塵交契已涓辰而就道庸占詞而寓誠恭惟某官才了十人氣呑餘子小試煩劇備見設施數千牛刃若發硎其游恢有餘地九萬里風斯在下而今乃將圖南既騰課最之書宜被褒遷之目某自慚不穎見謂亡庸何幸一官且繼髙躅則其不逺惟賢者善於前修政必告新庶後人沾其賸馥我所願也公其圖之代上户部吕侍郎啟伏審親結主知進司民部賦不加而用足惟公克明源之深而流長自今以始誦傳四逺欣歎一詞惟邦計之甚繁實聖心之攸屬銅楮之幣迭有情偽道路之言方興怨嗟既弊端之益滋奚法禁之可後是必酌古今以為之制因以量貲幣而救於時使無彼輕此重之私庶見利興害除之效疇咨是寄允屬通儒恭惟某官心造道原議明國體論思獻納蓋嘗造膝以盡言盤錯糾分無不迎刃而立解妙膺帝簡式應時須宜未占而已孚致有識之咸慶尚觀渙渥益以車千秋之封豈特紓民異乎東野畢之御某曩遊淮水數拜光儀逺官海壖寖踈聲問乆矣及𤓰而受代兹焉垂橐以來歸甑塵釡魚貧窶莫遑於朝夕天呉紫鳯倒披忍見於兒童徒能書空咄咄奚為哉未知此身漂漂如何耳欣仰士安之鞭筭願彈貢禹之塵冠雖里人何取於效顰諒匠石不遺於琧鼻蓋平生一丘一壑未嘗為世俗道之惟祇今三沐三熏庶㡬從我公遊者恭俟進退以卜窮通代謝提領顔侍郎辟差啟攝官承乏方懷尸素之慙拜命為真遽荷陶鎔之寵得踰望外感越情涯竊惟邦計之原莫重酒酤之㩁魯康立均盧之制蓋慮費財而傷民𢎞羊兼鹽鐵而云亦謂安邊而足用去古既逺流弊益滋分職設屬而每以為難以私害公而弗勝其患不有君子孰清官曹宜需當世之才能俾預有司之出内如某者二中四下百巧千窮敢謂知憐誤加甄擇既與互郷之進復取鬷明之言越尊爼以代庖人方厠具僚之末舉管庫之謂賢者乃騰公府之書退省其私夫何能稱兹蓋伏遇某官羣工冠冕萬事蓍龜昔緫臺綱本仁義而論諫兹提國用知財貨之源流思為官而擇人務遏惡而揚善故雖么䯢不忍棄捐某敢不仰佩恩榮恪勤職守為委吏而㑹計雖無涓埃補報之能依夏屋之帡幪知有風雨震凌之託代幕屬與交代啟伏審顯膺詔㫖密賛臺綱賔帟増華吾黨胥賀恭惟某官世濟其美國皆曰賢聳壑昻霄夙抱楩楠之用籋雲追電尚淹騄驥之馳帝興喬木之思命畀紅蓮之幙錢流地上諒收富國之功人至日邊遂慶蜚郵之召某乆勤嚮慕兹玷交承揚粃在前愧乏告新之政傾蓋如故覬資藏嫉之仁
