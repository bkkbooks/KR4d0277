body:
  text: 客亭類稿卷三宋楊冠卿撰四六編三啓謝臨安趙安撫斷劉忠等人啓伏準使帖斷遣劉忠等人為盜開本家于湖新集改易元文追版入官押出府界者客常何之館亦既有年求相如之文僅存遺藁方與鳩工而鋟木遽聞售偽而假真顧此書不止則不行宜公府必懲而必誡盡去其籍靡踰於時竊惟文籍之興莫甚魯魚之辨銘訛麋夀歐氏特書車改金根昌黎無子眷于湖之逸軌邁漢庭之諸公平生千萬篇垂金薤琳琅之體作詩三百首掩咸池冥默之音詔趨上帝之玉樓公棄奚奴之囊錦微茫手迹流落人間炳若丹青皆可傳之不朽勒諸金石庶有補於將來惟虞震電之取將詎意雌霓之誤讀以冰為凝以鼎為則如鄭亂雅如紫亂朱念謬於逺者由差之毫釐況汨其真者兹十焉八九苟肆行而莫禁則壞亂而不收是須絶去其本根母使難圖於滋蔓紙貴洛陽之市方傳者以爭先雷轟薦福之碑幸應焉而如響兹蓋伏遇某官研窮百氏博極羣書以斯道覺斯民將自任天下之重知其主信其客豈特識河南之賔去取以公是正其失且慮入于彼則出于此又復火其書而廬其居某得不感知已之難逢抱遺編而永嘆作春秋而辭莫措雖絶筆於獲麟得夫子而名益彰尚著鞭而附驥謝友人王時舉惠書啓特迃都騎寵貺長箋借聽於聾求道於盲雖勞謙之過甚樂鷃以鍾載鼷以馬秪眩視以懷慚固自識其不足以補吾子之所須既辱賜又安得不進所有以為答蓋聞君子之學為乎道道原之大出于天曰聖曰賢以是而傳無體無方因心而會是須得於言意之表又豈求諸文字之間昧者不逹本原茫乎莫知畔岸玩歲愒日去道愈邈絺章繪句雖多奚為某求諸日用之常契彼心傳之妙初無甚髙難行之説蓋有悠久不息之誠故雖多見闕殆多聞闕疑豈在十手所指十目所視必也不欺於䦣室居焉無怍於明神對妻子如賔接朋友以信被鶉衣如被黻冕處圭竇如處廟堂富貴不淫而貧賤不移道德為師而仁義為主自然與古人同堂而合席又奚假虛言欺世以盜名賤子於斯從事之久雖未能造道而自得且將以誠意而為先執事幸其接於門牆有意推而納諸閫域世無夫子而欲自晦於門弟之列人非伯樂而謂久辱於奴𨽻之徒請之勤勤教之云云警其昏昏覺其憒憒懼有善而喪厥善復以能而問不能時方蚓蛭之爭鳴聲與蜩螳而競嘒鮮有相愛而不相忌率皆以頌而不以規靜言而思則吾豈敢凡所進左右者貴母一毫之自欺庶來者覽觀焉因以斯言而為戒用酬嘉惠少障狂瀾謝中隱先生授館舍啓挾䇿逺遊尚記從軍之樂曵裾旅進兹聮入幕之賔録孤蹤於江湖寂寞之鄉拜嘉惠於人士覬覦之表望非所素寵至若驚竊以知人之難雖聖猶病凡賔主之交際必聲氣之協同歷觀載籍之所傳鮮有傾蓋而相契故常清竄名於髙仙芝客仙芝止以為庸流而毛遂自薦於平原君門平原不以為竒士況東閣軒裳之盛萃南州冠冕之英蔚乎相扶炳乎相輝智足以謀材足以立志同氣合樂哉川泳以雲飛事至物來燎若燭照而龜卜苟非有擊楫誓江之志擅摛文講劒之名久而熟其行能難以枉其車幣如某者性愚不穎器窳亡庸以辨古今則愧北涯之石生以咨政事則匪河陽之溫造徒能遺外聲利靡厭乎賤貧審知重輕不苟於毫末持此自信戞乎已知未聞匠石過圃而見收肯效頑金躍冶而自獻採姓名之賤敢謂借之齒牙霽斧鉞之威又復假以詞色今者卜日而授使以禮而為羅於東都問處士之廬特招而往如伯樂過冀北之野無留其良得非有意推而納諸陶鎔是以舉手援而出之淵壑特逹如此稱塞謂何兹蓋伏遇某官名重兩朝功蓋一世中書二十四考方自任於安危幕府六十餘人皆可為於將相猶折節以下於士務取人而拔其尤凡有寸長曽不遐棄故雖賤子亦玷後塵某敢不退省其私不負所學羅而致之幕下豈徒拜賜於軍門穎之脫於囊中尚或報知於國士代王教授謝上舍及第并差遣啓多士生王國親策于庭諸侯曰頖宫命修其教斯未能信夫豈敢承蓋聞得賢能立於邦家致逺務先於器識大人之學為乎道豈徒發䇿以決科一卷之書立之師要在習非而勝是自里選賔興之法壞及經明行修之詔頒舉秀才而不知書莫振益偷之俗倡諸儒而反以朴孰回既倒之瀾與古匹休惟今獨盛尊儒術而取道藝之士廣學校以明訓誘之方既栽培封植使之有成宜文雅行義繇此其選一洗萬古之凡馬奚資十駕之疲駑如某者稟姿弗靈涉道甚淺謂科斗之文廢已久時無能知而帝王之制可舉行並受其義探聖賢議論之所不到與盤誥聱牙之所未聞春誦夏弦久矣困虀鹽於太學月書季考兹焉登姓字於儀曹雖三釡及親喜慰於心恐一行作吏便廢此事詎意濫師儒之選乃獲從庠序之遊兹蓋伏遇某官名世耆英甘泉法從髙文華國詩卷常留於天地之間善政宜民邦人自得於湖山之外欲作新於士類共振起於治功凡在提封不忘甄録遂令賤子亦冒殊榮逺勤緹騎之臨且沐兼金之貺某敢不益勵末學思稱所蒙範不範而模不模雖乏誨人之規矩趨亦趨而步亦步尚希受教於門牆代上執政求祠祿啓仰翹材之館莫預下陳上光範之書輒循故事囁嚅冒犯俯伏凌兢伏念某稟生弗靈是古成拙雖曰修名之不立未嘗枉道以求伸病乎在已順乎在天謬云為善之樂薦之吾君致之吾相敢覬非常之知昨奉命以領州將改弦而易轍謂財力殫殘之後與郡政廢弛之餘飢饉洊臻農民告病拯其大當不計其細志乎公宜靡恤乎私凡寓公遊士之須及姦吏猾胥之蠹可以去則去削則削蓋將後所後先所先晝度夜思銖絫寸積旱潦既為之先備兵民亦頗爾相安里閭無愁嘆之聲下皆按堵道路少流離之苦行有裹糧夫何盈篋之書乃肆含沙之毒雖兩怒之言溢惡識者深諒其非然三至而母必疑古人亦將不免果致臺評之及竟奪守符而歸自昔省愆于今越歲於祝網之辰而名絓踈目於可封之代而身為窮人內貽慈親非疾之憂外負宗子維城之訓寒心銷志芒背汗顔念古以知已為難而士以不用為耻妄意解驂而見贖故思引脰而一鳴恭惟某官規模由稷契以來事業卑漢唐而下力扶吾道紓長綆於千仞之艱獨贊化元遂萬物於洪鈞之播不忍匹夫之失所務以至公而為心悼屈哀窮息黥補劓退惟下吏久戴殊私未能報乎不資之恩其誰納諸無過之地願廣匿瑕之惠俾沾從欲之仁修香火之緣儻或遂祠庭之請供菽水之養庶少寬子職之憂誓竭糜捐仰酬造化代謝提刑龔正言舉升陟啓依賔幕之芙蓉素乏元僚之譽種春風之桃李遽叨薦牘之榮荷德不資省躬知懼竊以古人考績三載而辨幽明後世掄材一言而為刺舉因以觀所主觀所為主用能簡厥修簡厥不修此道寖微澆風競扇取之下幕非北涯石則南涯溫置在要津必燕公甥而許公裔靜退有陸沉之患孤平無穎脫之期故晉人興讒諛互市之譏而劉氏著勢利絶交之論眷惟膚使力障頺波宜需名世之英俾預至公之選如某者器凡而近才拙且踈莊樗安所用哉自不中於繩墨魏瓠枵然大也誰與浮之江湖敢期薦引之章重借亷勤之譽兹蓋伏遇某官居今行古以公滅私俗方趨於奔競之秋心獨憐於寂寞之地謂溝中斷木尚或為清廟之樽而爨下焦桐猶可備大韶之樂故雖么髍亦被吹噓某敢不仰佩名言益遵繩檢此日預門人之列肯玷山公異時酬國士之恩敢忘智伯代上執政求知啓采蘋可羞於王公盍盡忱誠之薦伐木不遺於故舊庶興忠厚之風敢誦所聞以陳斯義魯人之附驥尾至有互鄉之難言漢儒之號龍門或以通家而得見惟大雅慈祥而兼聽故髙誼綿邈而獨傳不特斯人齋精而獻能抑俾兹世敦厖而歸善眷惟元宰丕贊太平運甄冶之陶鎔一均造化留蓋帷於犬馬每厚恩私遂令溝瀆之卑亦冒巖廊之峻伏念某關河墜緒籬落卑飛甘棠之笏僅存大瓠之尊何用雖妄意封侯洴澼絖之事誰復知畫史槃礴裸之真念曾點曾參尚對春風而吟詠而顔淵顔路亦逢聖道之本原且父子之學俱得師承而聞望聲名繇千載以並馳況宰輔之賢獨念故家則胚胎涵養宜衆人所不識顧依歸之有地實幸會之自天恭惟某官持悠久不息之誠行大公至正之道悲醉鄉之徒而嘉良臣之烈此時思識其子孫舉羊舌之似而代中尉之軍君子不以為偏黨軫憐寒逺靡間初終念昔先人曽是相門之桃李今兹小子復聨材館之簮紳既辱問其姓名又復假以辭色謂畢萬之後必大何陳掌不侯於今栽培封植而使之有成慰拊矜存而無乎不至退惟下走莫亢衰宗聞華衮片言之褒增弊帚千金之重庸持譜傳進犯等威大鈞坱圠以無垠或與昆蟲而並列蟠木輪囷而為器庶幾宗廟之見收誓畢餘生仰酬大造代九江倅赴任與韓守啓舊聞暴公子知德誼之可尊一識韓荆州雖侯封而匪願何期誤寵俾二專城既脂牽以問塗庸涓辰而奏記恭惟某官斗南人傑山東相家世篤忠貞惟由先正而是式政尚簡易殆非俗吏之所能帝興喬木之思笏軫甘棠之舊疏三接之寵班聨升六院之華提萬貨之平冠帶會百蠻之貢屬朝廷之重外視藩方而選侯出應時須來寬憂顧蝗不入境多黍稌而有豐年民皆奠居安田里而無愁嘆方且洞視萬古隄障末流繼摧陷廓清之功泳􅔿沄澄深之旨一出於正諒回既倒之狂瀾入覲于王遂駕孔修之四牡某衣冠落譜翰墨陳人往赴戍期慚無政學望廬峯之紫翠敢分風月於南樓聽潯陽之管絃姑訪琵琶之舊渚幸主盟於斯道有名世之嗣賢誦昌黎玉潔之文或許親承於規範𢋫西賊膽寒之句庶幾附麗於勳名祈嚮云深剡裁罔既代賀宰執冬至及郊祀禮成啓伏以圭景迎長羣陰屏息郊丘報本熙事備成率土蒙休在庭胥慶恭惟某官至誠育物一德格天形聲協和善政有如桴鼓詠歌不足成功可告神明屬至日之肇禋贊上儀而領使祼鬯清廟日星輝潤以凝祥薰燎璇穹雲物氤氲而霈澤太一貺而天馬下簫韶成而鳯皇儀盛冠古今事光簡册昭事上帝聿懷多福既資顯相之勞總領衆職練核羣臣尤藉弼諧之益凡執籩而在列皆躍冶以就鎔況夙諧東閣之趨其敢後衆人之賀伏念某一收朝迹幾換歲華兹預駿奔實深鼓舞周家仁及草木方斂福以錫民宣室夜問鬼神正受釐而前席仰大鈞之廣播成萬物而弗遺所期陽和一點之恩以回寒谷孤根之暖又代賀正及慶夀禮成啓伏以歲律更端王正謹始慶儀昭舉歡聲沸騰恭惟某官厚德春融元勳鼎盛太平無象風揮而日舒和氣致祥冰解而凍釋方明王孝理天下而華封請祝聖人克贊上儀一新巨典捧巵而稱萬歲領漢殿之羣臣斂福而錫庶民衍箕疇之皇極自開闢以來未有雖詩書所稱何加某委質化鈞逢時亨會範金鏤玉正鋪張於宏休點翰舒箋敢形容於嘉頌代烏程宰上湖守求升陟啓三載考績覬侯邦風月之分一字拔人祈下體菲葑之采方執裾而求鬻庸占辭而寓誠伏念某學昧通方志惟好古自始一命于今幾年涸魚既急於斗升乘鴈可計其上下題名千佛偶玷賢科遷秩中銓謬為令尹雖無輿人我有田疇之誦而有君子必葺牆屋之心蓋百里視民為親與諸侯均土而治小焉簿書期會之集大焉獄訟征賦之繁嚬笑之間戚休所係折腰為米肯懷淵明鄉里之羞學道愛人庶幾武城絃歌之意然資任有序遷之典必守憲以名升於朝政恐寂寥而無聞是以踴躍而自獻恭惟某官吾道之所寄命斯文以為指南學者仰如泰山嘗闡杏壇之教郎官上應列宿遂懷錦帳之香試以臨民與之共理方搜獵於寒畯務主張於材能凡有寸長曽不遐棄退惟下走夙戴殊私一瓣為南豐每勤宗仰四方逐東野莫遂親承兹試邑而罔功幸委身而受察嶔崎可笑雖纍日不離小官毁譽以公喜三代所行直道願借鶚書之寵俾為鴻漸之階庶聞郡吏之皆驚免使門人之不敬又與交代張倅啓推尋譜緒仰華胄以非遙關決邦條繼大賢而何幸榮雖欣於附驥愧實重於續貂恭惟某官鯁亮自其天資設施本乎經術笑談之際才了十人蟠錯之間刃遊餘地蚤贊總儲之畫旋膺民社之除去則見思治焉稱最為晉國保障既已著於茂功拜褒德侯封當遂受於重賞乃迃千里之逸驥來駕二車之左轓鐵騎銀瓶重聽琵琶之舊曲箳篂泥軾因為匡廬而少留二年于兹百廢具舉江山得助豈徒風月之平分邦國不空復繼海沂之歡誦宜應佩刀之約遂登要路之津某猥以孱庸適相先後逺勤一介行李之至賢於十部從事之臨服膺諸大夫之言乃所願學尚期舊令尹之政必以告新庶謹奉於規摹或少逃於罪悔又與江州都統劉御帶啓生李晟於唐室實為社稷之基依劉表於荆州何幸旌麾之託將涓辰而就道喜披霧之有期恭惟某官誼薄雲天忠貫日月單于適南下而牧宣王興北伐之師仗義從君豪傑皆為響應捐軀徇國江淮亦知威名簡在上心立登要路屬采薇之遣戍屯細柳以備邊帝念九江營聨萬騎士卒熟練久焉法制之浸隳號令一攽必也旌旗之改觀爰膺閫寄出總戎行令行禁止而賞罰以公車堅馬良而師徒習教以寬聖主之西顧以制天驕於北門潛消烽燧之驚益壯金湯之勢某系出橫浦世守朴忠擊楫清中原未遂著鞭之願捫蝨談當世每懷憂國之心慨想知音欣逢賞鑒尚幾一見即傾蓋如平生歡敢以尺書預通名於下執事回馮幹啓伏審排雲叫閶闔親結主知泛水依芙蓉來參幕畫兹大丈夫平日所自期者豈妄男子嘗試而幸得之恭惟某官以非常之才濟有用之學崇論閎議皆諸老所未能言犯顔攖鱗宜明主所恨見晚既朝奏而暮召益聲蜚而實騰爰錫美官用彰逺業數百篇皆可為法尚力攄論諫之忠九萬里方將圖南庶及見勳庸之盛代賀楚守向安撫啓伏審左符錫瑞東騎殿藩共理得賢有職胥賀恭惟某官才全而器博實茂而聲閎取一障乘之固非雅志賢長城逺矣蓋有能稱帝念長淮楚為要郡控山東之門户實江左之藩籬必求牧人御衆之才以畀宣化承流之任一麾出守僉曰往哉汝諧十乘啓行聞之喜而不寐第恐靡容於暖席已見入登於要津某久矣聞風兹焉聨事衛中國而遣戌役敢云憂顧之分安邊境而立功名政藉餘波之及
