body:
  text: 客亭類稿巻二宋楊冠卿撰四六編二表代騎帥謝皇帝表充員外閫曽徴副貳之勞分衛周廬遽冒淮河之列恩隆施渥感極涕零臣某中謝伏念臣頃以朴忠誤塵任使鯨波萬里嘗灰赤壁之舟蟻聚三湘復剪潢池之盜幸雖天與才匪時宜居多蹇剥之憂倍費乾坤之造自叨易命来佐成師深虞浮食之罔功敢冀出綸而示寵矧此騎兵之籍總夫龍㨗之軍近城南尺五之天既許親於帷幄借堦前方寸之地亦可罄厥謀猷斯自信之未能實莫知其所措兹盖伏遇皇帝陛下智勇天錫輝光日新謂臣賦分數竒雖乏虎頭之骨相憐臣㨿鞍可用或酬馬革之願言俾聨三衛之華式謹諸騶之訓臣敢不精白承徳展布事君衛社稷而執干戈仰賛規恢之畧脩車馬而備器械更歌復㑹之詩代母封内郡夫人謝表小人有母久託廕於中闈眀命自天兹進封於内郡綸言頫暨蔀室増華臣某中謝伏念臣母某氏運際飛龍光依䄖翟旋慶坤儀之受策嘗叨宸綍以䟽榮敢覬誤恩洊躋名邑兹盖伏遇皇帝陛下至仁天覆盛徳日新推敬老之心而及人以齊家之誠而治國爰頒殊渥首畀外姻臣敢不祗恊母心上承天寵事君親而兩盡恪修臣子之恭兼忠孝而獨全仰副聖神之訓代謝修奉使回叙復永州防禦使表董因山之役誤簡眷知疏出綍之恩遽叨甄復施隆効蔑感劇涕零臣某中謝伏念臣識昧知人法從鎸秩雖歴時之云久曽救過之未能丹去鼎湖命閟衣冠於喬嶽地仍禹穴會臻玉帛於塗山顧領校以何功乃憫勞而示寵懇辭弗獲傴受奚勝兹盖伏遇皇帝陛下賞罰無私黜陟有序謂貶階三等街亭本謬舉之非而置邑萬年櫟陽有囚徒之赦爰載稽於官簿俾復正於兵防臣敢不銘佩恩榮力圖稱塞觀近臣以其所主苟或補於眀時舉其官惟爾之能庶無慙於古訓代謝改除到任表邉徼承流方叨誤寵宸綸易命復畀近州仰睿眷之曲成拊㣲躬而深幸臣某中謝伏念臣愚無一得慮乏寸長罔功莫副於使令薄命且更於憂患詎意掄材之末謬應保障之求望河陽之雲靡遑將母近長安之日仍俾臨民恵大不貲恩深曷報兹盖伏遇皇帝陛下天臨廣宇器使羣工謂臣嘗綰縣章粗知牧養察臣曩将使指或任布宣簡此殊私責之共理臣敢不問民疾苦布政中和務勸農桑少致阜蕃之效俾安田里庶消愁歎之聲代兵帥謝到任表領兵閫外久負空餐典衛巖除遽叨殊渥懇辭莫獲傴受奚勝臣某中謝伏念臣猥以凡才出際興運當慈皇之御極屢玷使令逮上聖之繼眀復膺眷簡兹頒召節入覲昕庭曽無造膝之嘉謀敢覬出綸之誤寵矧惟衛府遴選英豪必求文武之兼資寜許弟兄之相繼孰云隆委併萃一門兹盖伏遇皇帝陛下立武有常知人善任謂臣久居軍旅粗眀訓閲之方察臣有志事功頗謹亷隅之行俾親帷幄獲侍冕旒臣敢不思答龍光益鞭駑蹇脩車馬而備器械恊贊宏規清宫禁而謁寢園力圖後效代池州守謝到任表分郡國之寄已愧罔功辱神聖之知洊叨錫命拜恩甚厚揣分奚勝臣某中謝伏念臣儒業匪優家聲弗紹取平平之策於定逺詭曰治民書下下之考於陽城拙於為政自玷儀曹之第屢懷太守之章當夀皇責實之朝及陛下勵精之日借玉階方寸之地三造眀廷近威顔咫尺之天累勤睿奬銘佩丁寧之訓誓殫撫字之勞惟是池陽甲夫江右方采薇之遣戍有細栁之連營於此承流難乎稱職必威愛久濟無兵民二者之分則上下相安遂湖山千里之樂宜得才能之士以兼御牧之權孰謂臣愚可宣徳意兹葢伏遇皇帝陛下鼎新萬化器使羣工審政理之後先知吏治之得失修内攘外視邦選侯謂臣嘗備於使令察臣粗諳於牧養責之共理因以程能臣敢不勸課農桑奉行詔令問民疾苦既消愁歎於里閭寛上顧憂更盡撫綏扵軍旅庶幾一得仰答萬分代兵帥謝到任表領祥刑之寄洊辱誤㤙分外閫之權遽叨易命退惟忝冒深積凌兢臣某中謝伏念臣末學亡庸孤忠自許鳴劔抵掌而馳伊吾之北誓不俱生平齊下趙而㑹滎陽之西戰思必克粤從去國久負空餐邉徼承流雖粗消於愁歎古誼决獄曽莫著於平反敢期嚴召之臨更畀成師之重眷此池陽之要地控夫江左之上游挈保障而措之安師徒習教挫天驕而奪之氣精神折衝孰謂臣愚可司兵柄兹盖伏遇皇帝陛下規恢逺畧並用羣才謂臣久在兵間粗眀戰守察臣曩将使指靡憚馳驅簡此殊私錫之茂渥臣敢不䖍脩武備仰答睿知安邉境以立功名或庶幾於良将謁寢園而清宫禁尚克復於神京代邉帥謝賜銀合夏藥表六月徂暑念兹玉塞之連營一札細書錫以寶奩之名劑拜恩甚渥揣分奚勝臣某中謝伏念臣猥以凡才誤膺遴選功名未立惟期馬革以褁屍齒髪寖衰詎知鴻寶之為秘敢意眷懐之厚特頒御府之珍兹盖伏遇皇帝陛下以徳行仁對時育物寓均調於藥石均休戚於臣工屬當三伏之炎歊爰逮萬金之殊品臣敢不恪勤職守思報恩榮推君賜而慰士心仰副睿慈之訓共武服以定王國冀成薄伐之勲代邉帥謝賜銀合蠟藥表郵傳綸命恩賁寶奩當此祁寒錫之靈劑祗荷殊常之眷益増小已之榮臣某中謝伏念臣兵昧十全慮無一得屬歌采薇而遣戍俾屯細栁以備邉䕶風寒如七尺之軀思以上策而自治陋疾病求三年之艾不知先事以為圖方憂臣力之㣲敢希君賜之寵兹盖伏遇皇帝陛下規恢逺畧並用羣才謂臣無薏苡之疑夙勵飲氷之節而年乏昌陽之助或有負薪之憂藥膏盲於未然之前延齒髪於将衰之際臣敢不欽承褒詔上體眷懐彊輔精神與士卒而同甘苦力圖報効安邉境以立功名牋賀皇太后加上尊號牋聖子愛親謹慈闈之定省神孫繼志奉顯冊以尊榮振古未聞於斯為盛臣某中賀恭惟夀聖皇太后殿下徳齊天極厚合坤元蕩蕩難名有成功於堯帝亹亹不巳生令聞之文王母儀備著於三朝内治廣刑於四海綏多福而緝純嘏延洪有道之孫建顯號而施尊名揚厲無前之績慶儀昭舉歡聲沸騰臣領戍陪都逢時亨㑹眉夀無有害願𢋫魯侯燕喜之詩大徳必得名更誦戴記中庸之義冊寶禮畢賀皇太后牋受帝祉施於孫尊居太極有聖徳得其夀昭揭鴻名典冊誕敷臣民胥賀中賀恭惟皇太后殿下輔成内治宏濟中興厯數無疆方衍東朝之慶福慈兼備肇新長樂之儀端䇲卜龜䖍諏上日範金鏤玉舖張閎休亘古昔以未聞編詩書而無愧臣叨居戎閫阻逺闕庭與羣臣前殿奉巵莫陪班列歌億載萬年為母惟有聲詩慶夀禮成賀太上皇后牋寶冊對揚方増崇於顯號玉巵親捧爰肇舉於慶儀喜溢宫庭歡騰海宇竊以天地合徳悠久無疆日月齊眀照臨不息五百年聖人乃出三萬嵗慈母亦然恭惟尊號太上皇后殿下尊恊宸居厚隆坤載思齊所以聖豈惟繼太姒之音天保莫不増将克配周王之夀太上有從心之適慈闈偕難老之祥垂休無窮自今以始臣濫分邉寄阻造闕廷建有極錫厥庶民祗仰贍於徳教受介福於其王母願益固於夀祺皇后受冊命代張帥賀太上皇后牋主王化之基必先内治錫家齊之訓首正中闈中賀竊以文母興周至子孫而受帝祉虞嬪居汭繇厯數之在舜躬稽盛事於前聞幸今日之親見恭惟太上皇后殿下徳齊天極慶衍宗祊母儀昔奉於東朝備罄旨甘之養道化兹行於南國悉因付託之規爰贊睿謀以詔嘉禮臣叨分戍役適際㑹通嗣其徽音喜頌思齊之聖錫之純嘏更歌燕喜之詩賀皇后受冊禮牋儷尊宸極正位宫闈顯冊對揚徽音益振臣某中賀恭惟皇后殿下發祥於逺作合自天車輿加重翟之華寶鈕賁範金之飾謁見祖廟喜諧神人臣適際昌期祗深善頌二南正始已基立於太平萬夀無疆永輔佐於君子代賀皇后牋重華恊帝誕受丕基太姒嗣音尊崇儷極中賀恭惟皇后殿下順承乾徤徳合坤柔成孝敬而厚人倫以婦道而化天下輔佐君子舖張閎休修至養於東朝揭隆名於重慶若稽載籍盖未前聞臣阻逺眀庭欣逢盛舉不一書而止方闡彌文呼萬嵗者三敢伸善頌賀夀成皇后牋贊與子之謀宻傳神器盡事親之道昭揭隆名亘古未聞於今獨見臣某中賀恭惟夀成皇后殿下慈儉為寶清眀在躬思念憂勤輔成孝敬謂堯綱命舜本一道以相承而文母興周有徽音之是嗣章至尊而舒盛徳登顯冊以揚鴻休喜溢宫闈歡騰海宇臣際熈朝之極治覩盛事之殊常燕翼子以貽謀已慶皇圖之永有大徳而必夀更祈帝祉之増代謝皇太子賜頥真二字牋前星炳煥光賁琳宫片語褒嘉寵膺衮字臣某中謝伏念某見聞甚淺朴野亡庸修身其徳乃真固所願學觀頥養正則吉豈曰能為敢覬特書俾名寓宇兹盖伏遇皇太子殿下多能天縱懋徳川冲推其土苴之餘見於文辭之表筆精墨妙卓冠羣倫色正芒寒下飾萬物故雖一介亦被殊榮某敢不寶為不朽之傳用答非常之眷刻之金石以昭河洛之禎祥藏諸山川當使鬼神而訶䕶
