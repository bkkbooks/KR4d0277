body:
  text: 客亭類稿卷十四宋楊冠卿撰樂府編如夢令滿院落花春寂風絮一簾斜日翠䄂晚寒輕獨倚鞦韆無力無力無力蹙破逺山愁碧生查子原註聞鶯用竹坡韻嬌鶯恰恰啼過水翻回去欲共訴芳心故遶池邉樹人去綺忩閑絃斷􅌙筝柱百囀聽新聲總是傷情處前調原註忠甫持梅水仙砑牋索詞消瘦不勝寒獨立江南路羅韈暗生塵不見凌波歩蘭珮解鳴璫往事憑誰訴一紙綵雲牋好寄青鸞去賦湘妃鼓瑟牋湘妃泛蓮葉上有片雲擎月瀟湘日暮時倚櫂蒹葭浦不見獨醒人愁對湘妃語璧月送歸雲一葉蓮舟舉寳瑟奏清商波底魚龍舞浣溪紗洞口春深長薜蘿幽棲地僻少經過一溪新綠漲晴波驚夢覺来啼鳥近惜春歸去落花多東風獨倚頼愁何前調原註次韓户侍銀葉香銷暑簟清枕鴛醉倚玉釵横起来紅日半忩明多病情懐無可耐惜花天氣惱餘酲瑶琴誰弄曉鶯聲霜天曉角原註次韻李次山提舉漁社詞漁舟簇簇西塞山前宿流水落紅香逺春江漲蒲萄緑蘄竹奏新曲驚回幽夢獨却把魚竿逺去騎鯨背釣璜玉卜算子原註秋晚集杜句弔賈傅蒼生喘未蘇賈筆論孤憤文采風流今尚存毫髪無遺恨凄惻近長沙地僻秋將盡長使英雄淚滿襟天意髙難問垂絲釣翠簾晝捲庭花日影初轉酒力未銷眉黛斂還停歌扇背畫欄倚遍情無限悵韶華又晚錦韉去後愁寛珠袖金釧碧雲信逺難託西樓鴈空寫銀筝怨腸欲㫁更落紅萬㸃菩薩蠻原注春日呈安國舍人飛雲障碧江天暮杏花簾幕黄昏雨翠袖怯春寒有人愁倚欄天涯芳草路目送征鴻去人逺玉闗長尺書誰寄将前調原註春日西湖用吳監簿韻春山愁對修眉緑春衫誰為裁氷縠日暮倚欄干不禁烟霧寒湖邉歸去路猶記傳觴處徃事等空花客心驚嵗華前調氷肌玉襯香綃薄無言獨倚欄干角相見又還休可堪歸去愁碧波溪上路㡬陣黄昏雨歸去斷人腸紗厨枕簟凉前調原註雪中呈李常川玉妃夜讌瑶池冷翩然飛下霓旌影天濶水雲長風飄舞袖香姑山人似舊清壓紅梅瘦同凭玉欄干光摇銀海寒好事近原註代人書扇晚起倦梳粧斜嚲翠鬟雲鬢手撚花枝輙笑問青鸞音信綉簾慵捲玉鈎垂風篁奏餘韻燈火黄昏院落報雕鞍人近前調細雨落簷花簾捲金泥紅濕樓外逺山横翠染修眉愁碧舊遊春夢了無痕香塵暗瑶瑟凴仗青鸞飛去問新来消息謁金門原註春暮有感傷漂泊負了花前期約寒食清明都過却愁懐無處着晴日桞隂池閣風絮斜穿簾幕簾外鞦韆閑綵索腸斷人寂寞憶秦娥原註雪中擁琴對梅花寓言東風惡雪花亂舞穿簾幙穿簾幙寒侵綠綺音斷絃索宫梅巳破香紅蕚梅粧想稱伊梳掠十分全似舊時京洛前調雲垂幙江天雪似楊花落楊花落翠衾不煖曉寒偏覺起來獨倚西樓角客懐無耐傷離索蠻箋欲寄塞鴻難託清平樂翠團嘉樹杜宇呼春去簾捲金泥凝望處㡬㸃紅薇香雨等閑過了花時殷勤來問酴醾恰有一枝春在畫樓紅日林西桞梢青原註詠芍藥紅藥翻堦天香國艶輝映樓臺解語渾如三千粉黛十二金釵青鞋踏破蒼苔趂舞蝶遊蜂去來宿粉偷香也應難似年少情懐前調原註詠鴛鴦菊菊白而雙心秋晚始開金蘂飄殘江城秋晚月冷霜寒一種幽芳雕氷鏤玊舞鳯翔鸞悠然静對南山笑瓊沼鴛飛翠瀾小玉驚呼太眞嬌困俯檻慵看前調原註為丁明仲紀夣歸夢迢迢分明曾見舞遍雲韶解道相思愁寛金釧瘦損宫腰覺來情緒無聊正戍角聲翻麗譙楚塞山長巫陽人逺斗悵香消西江月原註秋晩白菊叢開有傲視氷霜之興李漁社賦長短句云若将花卉論行藏合在凌烟閣上因次其韻妙墨龍蛇蜚動新詞雪月交光論文齒頰帶氷霜鳯閣從来官様夀菊叢開三徑清姿髙壓羣芳折花聊爾問行藏㑹見横飛直上前調羅襪浪傳仙子宫梅休寫華光人言夀客飽經霜不趂凡花入様萬玉森羅素節一枝䞉有餘芳孤髙肯使蝶蜂藏持立甘泉頂上前調原註詠黄菊昨夢鈞天帝所曽陪奏賦明光玉除金蘂映秋霜盡道宫花别様嬌額塗黄半就金蓮襯歩齊芳舞鸞儀鳯巧難藏羞殺繁紅陌上東坡引原註癸丑季秋廿六日夜夢至一亭子牓曰朝雲見二少年公子云乆誦公樂章願得從容笑語因舉似離筵舊作稱賛久之余謝以不能公子咈然不樂命小史呼姝麗十數軰至圍一方臺而立相與羣唱聲甚凄楚俄頃歌者取金花青牋所書詞展於臺上熟視字畫乃余作也讀未竟一歌者從傍攫取詞置袖中舉酒相勞苦云釵分金半股之句朝夕誦之胡為念不及此耶公子云左驗如此奚事多遜抵掌一笑而寤恍然不曉所謂戱用其語綴東坡引歌之渌波芳草路别離記南浦香雲剪贈青絲縷釵分金半股釵分金半股陽闗一曲聲凄楚惹起離筵愁緒夢魂擬逐征鴻去行雲無定㨿行雲無定㨿鷓鴣天原註次韻寶溪探梅未放嵗月如馳烏免飛情懐着酒强支持經年不見宫粧面醲碧誰斟翡翠巵江路晩夕陽低奚奴空負錦嚢歸欲慿驛使傳芳信未放東風第一枝小重山一笑囬眸百媚生嬌羞佯不語艶波横緩移蓮歩繞堦行凝情乆幽怨託銀箏些事那囬曽水晶䨇枕冷簟紋平窺人燕子苦無情驚夢斷何處覔雲行蝶戀花原註次張俊韻舞處曽看花滿面獨倚東風徃事思量遍綠怨紅愁春不管天涯芳草人腸斷一紙雲牋魚鴈逺歸鳯求凰誰識琴心怨臂枕香消眉黛歛也應為我寛金釧前調月冷花寒宫漏促人在虚簷玉體温無粟絃斷鸞膠還再續嬌雲時霎情難足解道䨇鴛愁獨宿宿翠偎紅蛺蝶元相逐蓬海路遥天六六終湏伴我騎黄鵠水調歌頭原註春日行舟春漲一篙綠江濶暮濤寒龍驤萬斛蜚舉鯨飲酒盃寛醉倚柁樓清嘯目送孤鴻杳靄景意與俱閑恍若馭風去蓬島舊家山記吾廬環翠竹拱蒼官碧雲信杳誰為日日報平安桂櫂桃溪歸後流水落紅香寂春事想闌珊頼有錦囊句寫向此中㸔前調原註贈維揚夏中五形勝訪淮楚騎鶴到揚州春風十里簾幙香靄小紅樓樓外長江今古誰是濟川舟檝烟浪拍天浮喜見紫芝宇儒雅更風流氣呑虹才倚馬爛銀鈎功名年少餘事鵰鶚㡬横秋行演絲綸天上環侍玉皇香案仙袂揖浮丘落筆驚風雨潤色煥皇猷前調原註次吳斗南登雲海亭年少青雲客懐抱百憂寛北忩醉卧春曉歸夢趂吳帆来訪鴟夷仙跡極目平湖烟浪萬象一毫端雲海渺空濶咫尺是蓬山佩蜚霞囊古錦㡬憑欄赤城應有居士鳯舉更龍蟠待向玉霄東望相與神遊八極身未似雲閑長劒倚天外功業鏡頻㸔前調原註歸自羅浮舟過于湖哭張安國至采石弔李謫仙悼今昔二賢豪之不復見也月夜酧酒江漬慨然而去作長短句曵杖羅浮去遼鶴正南翔青鸞為報消息巖壑乆相望無柰漁溪欵乃喚起蘋洲昨夢風雨趂歸航萬里家何許天濶水雲長歴五湖轉湘楚下三江興亡千古遺恨収拾付詩囊重到燃犀磯渚不見騎鯨仙子客意轉凄凉舉酒酹江月襟䄂淚淋浪水龍吟原註金陵作渡江天馬龍飛翠華小駐興王地石城鐘阜雄依天塹鼎安神噐鳷鵲樓髙建章宫濶玉繩低墜望鬰葱佳氣非烟非霧方呈瑞璇霄際貔虎雲屯羽衛壮金湯更隆國勢天驕膽落狼烽晝熄玉門宴閉祇謁陵園長安不逺中興可兾笑六朝舊事空隨流水千古恨無人記賀新郎原註秋日乘風過垂虹時與一羽士俱因泛言弱水蓬萊之勝傍有溪童具能歌張仲宗目盡青天等句音韵洪暢聽之慨然戲用仲宗韻呈張君量府判薄暮垂虹去正江天殘霞冠日亂鴻遵渚萬頃雲濤風浩蕩笑整羽輪蜚渡問弱水神仙何處翳鳯騎麟思徃事記朝元金殿聞鐘鼔環珮響翠鸞舞夢中失却江南路待西風長城飲馬朔庭征虜目盡青天何時到贏得兒童好語悵未復長陵杯土西子五湖歸去後泛仙舟尚許尋盟否風袂逐片帆舞
