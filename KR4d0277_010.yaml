body:
  text: 客亭類稿巻十宋揚冠卿撰雜著編四疏文韶州曹溪南華寺修造疏救世醫王鉢囊猶在無塵明鏡針芥相投信器宻傳宗風益振歸卧曹溪深處静聽韶石遺音栢子枝頭已㑹祖師之來意梅花嶺上任傳春信於行人遂令東土兒孫盡識真身面目逮長蛇之肆毒暨囬禄之興妖碓磨沉淪俱化荆榛之域鐘魚寂寞僅餘瓦礫之場棟宇一新龍象咸慶惟兹器用之餙與夫埏埴之工計匠何啻百金為山尚虧一簣衆力成就如令九仭廢井及泉末後慇懃更㸔羣兒聚沙成塔原註劉禹錫云逹磨救世如大醫王請僧住北塢五思庵疏佳城葱鬱籜龍千尺欲參天紺宇靚深𤣥豹一班方隠霧副兹虚席得最上乗某人熟世諦而萬法皆圎悟真空而一塵不染鴈沉寒水影奚礙於去留月映碧潭光無分於表裏眷北塢之泉石拱西山之煙雲不須露影藏身便好逢場作戯粥魚齋鼓豈惟香火之一新襌版蒲團自可晨昏而穩坐當仁不讓毋事牢辭鷗盟先生王彦和疏并引鷗盟先生王彦和年八十餘老矣詩益王而身益貧病卧馬頭村家四壁立啼號之聲相聞友人楊某為作數語謁鄉里朋從及名公巨卿之髙義者庶㡬聞而興念激餘波沾丐之俾延桑榆之暮景云竊以作北牎之唫不及杯水緩西江之激其枯鮒魚鷗盟先生家乏儋儲室如懸罄瓊琚玉佩雖大放於厥辭紫鳯天吳或倒披於短褐年餘八十老矣誰與升斗活之草真卿乞米之書實艱懃之末濟為魯肅指囷之舉尚富貴之毋忘髙義不遺交情斯見㛰書代陳季海荅張氏書䕃聨桑梓欽一時閥閱之隆契合金蘭本累世婚姻之舊洊䝉嘉好詎敢固辭伏承某人師友淵源見聞博洽而某女某人習專絲枲秀乏閨房豈若而人能配君子卜齊姜之育既誤聞龜筮之從依張耳之賢庶永遂門墻之託代姚澗叟回王計議書將之儒雅夙欽王謝之家重以婚姻兹結劉范之好雖幸得東牀之俊自慙非北里之豪誤諧鳴鳯之占逺辱朶雲之貺以幣帛箱篚將其意益増圭篳之光無榛栗棗脩告乎䖍終愧瓊瑶之報徒深感佩罔既剡裁代趙應之回蘇經略書令德有後遹追孔李之盟同官為僚載結潘楊之睦時方多故曰未有家庸先馳尺素之書庶早遂終身之託乃勤幣帛増賁衡茅婚姻以時已合好於二姓歡欣如一尚偕老於百年喜溢于衷言不盡意為帳幹與王氏書儒雅醖藉夙欽王謝之家兄弟婚姻兹結潘楊之睦合好二姓徼福前人伏承令女某人姆訓素嫻閨門挺秀某弟某勲名未立湖海倦遊方採蘋興南澗之思而坦腹與東牀之選齊大非吾偶也雖莫遂於牢辭平固長貧者乎或可酬於垕德又代王户與李司理書同官為僚方遂聨於王事二姓合好兹乃締於姻盟託契云初占辭敢後伏承某人素嫻姆訓挺秀閨門而某第幾男某㓜讀父書粗聞詩禮雖際有家之願實深非耦之慚諾重百金既協鳯占之吉幣陳五兩庸修鴈奠之恭誠意是將凟尊為懼祭文代永思陵修奉使副正月六日渡江祭江神文充員修奉䕶役園陵提兵吏渉江自今以始惟神受職相兹役事俾徃來善濟無驚波之虞則亦惟神之休又代修奉司櫕宫路祭文赤符受命黄屋非心退居大庭之間訪道崆峒之上得青丘之真訣方茂介於夀祺乗白雲於帝鄉遽遐躋於霄極聖心永慕孝思無窮日月有時灞水象漢陵之制人徒不變稽山惟禹穴之仍仙域肇新神靈警侍臣等䝉恩䕶役庇職罔功建地因山寅奉制言之懇懇踰梁下阪忍瞻羽衛之煌煌望龍髯而莫攀抱烏號而抆涕又梓宫發引路祭文德盛五帝功冠百王基緒重興厯服無疆退居大庭尊為上皇漢殿稱觴其樂未央非心黄屋乗雲帝鄉弓劔遐遺臣民感傷衣冠閟藏喬山之陽萬嵗千秋皇圖永昌又代鄂渚路祭文國有大憂朝晡臨于庭臣子之義當然也屬者慈極上賔誥遺萬國臣方典兵闑外不即奔趨大行前今兹靈駕在塗羣心永慕潔涓之薦臣又弗克躬親執事睇瞻喬山龍髯莫攀哀摧肺肝涕零如雨向夫人啟靈祭文三月而葬禮之經也逺日恊吉攅于郊坰升自西階送形而徃祭奠於庭而哀離於其室者兹又人子之念母示不忘親也嗚呼柩不暮宿涓休夙興旂旐翩飜笳鼓悲鳴即襄大事妥安明靈靈兮顧歆以燕及後之人又同日至板橋攅殯祭文日月有期將徇戴經之制山川云逺未遑蜀道之歸即此丘園營夫宅兆其葬也不封不樹雖務權宜然事之如生如存敢忘盡孝洋州寒食祭文春秋祭祀人子所以致時思於其親也霜露既降怵惕于中匏繫一官不果躬親即事顧瞻飛雲逺馳敬恭心焉感傷涕零如雨冊寳禮成追封三代代焚黄祭文父太師坤儀受冊祗拜殊恩渙號疏榮追崇先德睠惟我父實大吾門勲庸紀述於旂常畏愛流行於郡國兹晉維垣之秩式昭贈典之華其命惟新欲報罔極妣母兮鞠我垂休無窮子之慕親欲報罔極兹受坤儀之冊晉疏秦國之封焚告墓庭增光泉壤莫罄晨昏之養惟深霜露之悲祖太傅鏤玉陳儀厚人倫而正始明綸錫命嘉世德以追榮衍慶吾門實繇王父爰陞華於公傅俾焚告於墓庭尚克顧歆以承休寵祖妣位奠中闈恩霑外族追榮祖妣夙著姆儀爰膺信國之封載錫宸庭之命尚欽承於帝寵以衍慶於孫枝曽祖太保祖德之修其來也逺慶源之衍所報必豐兹儷極於九重爰疏榮於三族晉躋公保賁飾幽扄雖逈隔於松阡庸祗焚於綸告尚承新渥以燕後昆曽祖妣涓休受冊位奠中闈正始厚倫恩霑外族爰追榮於三世用加賁於九原晉疏崇國之封載錫宸庭之命惟祗承於殊寵以祐助於後人歸謁五世神座祝文五世祖祖妣表正六宫恩霑五世奕奕寢廟妥安神靈涓吉陳儀躬行祗謁髙祖祖妣奕世載德建聞無窮廟饗于家國有彞制尚承殊渥以佑後人曽祖祖妣聲聞鄴中積有餘慶詔封王爵廟饗家庭歸謁容儀躬行盛典祖祖妣寢廟翬飛涓辰祗謁惟予祖德衍慶孫枝疊拜王封尚承天寵考妣二南正始王化之基欲厚人倫首頒命數祗謁寢廟孝思無窮春孟祭五世神座祝文五世祖祖妣奕奕寢廟妥安神靈嵗律肇新王春兹始䖍修祀事庸展時思髙祖祖妣春秋祭祀典禮之常廟饗于家元正伊始潔蠲以薦神其格斯曽祖祖妣聲聞鄴中積有餘慶詔封王爵廟饗家庭春令告新䖍修祀事祖祖妣寢廟翬飛王封載錫青陽布令祀典肇修備物薦誠用伸追逺考妣天令循環孝思罔極春王正月時祭敢忘籩豆静嘉陳儀寢廟又秋孟祭享祀文五世祖祖妣五世之廟嵗祀有常執矩司秋農乃登穀因時致祭備物陳儀髙祖祖妣德全鄉社慶流後昆秋祭曰嘗順時而祀奕奕寢廟如將見之曽祖祖妣孟秋之月寢廟薦新國有彞章禮均外族爰修嵗祀以厚人倫祖祖妣春秋匪懈祭祀以時祖廟翬飛豆籩森列薦其嘗事尚克顧歆考妣星火西流霜露將降是用孝享參之以時凄愴于衷欲報罔極郊祀禮成及歸謁追封王爵焚黄祝文曽祖澶淵之役磁相被兵力剉天驕屹全鄉社慶流來裔位奠中闈熈事告成躬行歸謁詔繇公保命錫王封永衛之邦古為大國服兹茂渥佑我後人曽祖妣我曽大父有聲鄴中克相其成實繇懿德郊丘霈澤祖廟陳儀唐魏真封小君美號庸彰隂報昭示殊榮靈兮顧歆祗承天寵祖考祗荷帝恩正位坤極澤敷郊畤詔謁廟庭命畀王封用彰祖德信為名邑鄭實大邦申錫褒綸増光幽穸宜承眷渥永燕雲仍祖妣圜丘錫類寢廟追榮祖與妣同恩隆眷渥詔升大國位正小君自周而秦洊頒宸綍明靈如在帝寵其承考功在王室銘書旂常天鑒其忠慶綿于後郊丘大賚寢廟告成帝命追榮王封再錫厯陽古郡全閩㑹藩綸綍一頒神人胥悦凛然生氣尚克欽承妣母兮鞠我顧復恩隆屬際飛龍命加䄖翟靈壇蕆事寢廟告新爰舉彞章晉封大國商邑翼翼魯山巖巖誥演金葩光賁泉壤兹誠曠典式慰母慈祭顯慶義禪師文師之一心等乎太虚浮雲莫滓體常自如我昔兒時泪其𤣥珠師以至言啟關發樞二十年間載而與俱日用飲食無欠無餘嗚呼師今已矣誰其起予奠以生芻淚盈我裾代劉運使伯和秋祭本衙土地文春秋祭祀典禮之常擊鼓迎寒霜露將降用涓吉日走于羣祠維神之靈芘兹公宇殽核不腆恭荅神休神其顧歆無忘終惠祭廣東主管衙土地文萬里落南黄茅間作兹依神芘疾既有瘳牲酒肥香用荅靈貺神其終恵俾奠攸居所願無餘終還嶺北祭諸廟祈雨文四月維夏庶草繁廡嗟我農夫俶載南畝浸彼稻田以祈甘雨工祝致告神之聼之油然作雲隂雨膏之有功於民何日忘之祈晴祭文壟畝如雲既方既早暴以秋陽乃克堅好既窘隂雨將害于成閔此農功惟神聰明擴以澄霽俾就豐登代謝落階官祭祖廟祝文某領兵衛府越五六年時方戢干戈無尺寸以紹先烈迺者天子親御鞍馬閱武近郊叨被恩綸命正兵團之秩退循非據惴惴懼弗能勝惟我祖我父克相於後之人是以登于兹繼自今敢不益自奮勵思稱所䝉用以為報代祭謝舍人文惟公負抱才猷噤不得施出賛戎機僅越嵗時云胡一疾遽爾淪棄天不憗遺而止於斯乎嗚呼哀哉公從予遊十年於兹蠟屐登山臨流賦詩一觴一咏相與追隨琳琅金薤之書璀璨瓊琚之辭前無古人誰其似之召記玉樓翩然言歸公不我畱我心傷悲嗚呼哀哉日月有期時將葬矣奠以生芻薦之芳醴巫陽下招魂兮徠只代焚黄祭文乙巳冬天子祀南郊誕敷恵澤在庭百執皆得追榮其親我先君爰自廉車而授洋川之鉞先夫人肈膺封邑而加蓬國之華咸被賛書俾光泉壤某等恪居官次不克躬親即事哀榮之感惻怛于衷揆日㳙休焚告墓下惟我考妣服此湛恩以垂祐於後代寒食祭文二三釡之禄貴及於親風木纒悲日月逾邁兹修嵗祀以致時思遥睇松楸寸心摧折謬司羽衛逺去祠庭春秋祭祀敬薦蘋蘩惟我考妣來顧來歆以垂祐于後之人
